function JayaSwarm({ palette: p }) {
  const [running, setRunning] = React.useState(true);
  const [popSize, setPopSize] = React.useState(30);
  const [crossover, setCrossover] = React.useState(0.4);
  const [seed, setSeed] = React.useState(1);
  const [pop, setPop] = React.useState(null);
  const [gen, setGen] = React.useState(0);

  // landscape: f(x, y) = -((x-0.7)^2 + (y-0.4)^2). Best at (0.7, 0.4) → fitness 0.
  const target = { x: 0.7, y: 0.4 };
  const fit = React.useCallback((c) => -((c.x - target.x) ** 2 + (c.y - target.y) ** 2), []);

  // (re)seed population whenever popSize or seed changes
  React.useEffect(() => {
    let s = seed * 9001 + 17;
    const r = () => { s = (s * 1103515245 + 12345) % 2147483647; return s / 2147483647; };
    const next = Array.from({ length: popSize }, () => ({ x: r(), y: r() }));
    setPop(next);
    setGen(0);
  }, [popSize, seed]);

  // step the JAYA + crossover update on a 90ms tick when running
  React.useEffect(() => {
    if (!running || !pop) return;
    const id = setInterval(() => {
      setPop(prev => {
        if (!prev) return prev;
        let bestI = 0, worstI = 0, bestF = -Infinity, worstF = Infinity;
        for (let i = 0; i < prev.length; i++) {
          const f = fit(prev[i]);
          if (f > bestF) { bestF = f; bestI = i; }
          if (f < worstF) { worstF = f; worstI = i; }
        }
        const xb = prev[bestI], xw = prev[worstI];
        return prev.map((c, i) => {
          // JAYA update on each coordinate
          const r1x = Math.random(), r2x = Math.random();
          const r1y = Math.random(), r2y = Math.random();
          let nx = c.x + r1x * (xb.x - Math.abs(c.x)) - r2x * (xw.x - Math.abs(c.x));
          let ny = c.y + r1y * (xb.y - Math.abs(c.y)) - r2y * (xw.y - Math.abs(c.y));
          // single-point crossover with a random partner, fired with probability `crossover`
          if (Math.random() < crossover) {
            const partner = prev[(i + 1 + Math.floor(Math.random() * (prev.length - 1))) % prev.length];
            // swap one coordinate at random
            if (Math.random() < 0.5) nx = partner.x; else ny = partner.y;
          }
          return {
            x: Math.max(0.02, Math.min(0.98, nx)),
            y: Math.max(0.02, Math.min(0.98, ny)),
          };
        });
      });
      setGen(g => g + 1);
    }, 90);
    return () => clearInterval(id);
  }, [running, pop, crossover, fit]);

  const W = 420, H = 260;
  const rings = [0.08, 0.18, 0.28, 0.4];
  const bestFitness = pop ? Math.max(...pop.map(fit)) : 0;
  const ctrlInputStyle = { width: "100%", accentColor: p.accent };
  const ctrlLabelStyle = { fontFamily: "var(--f-mono)", fontSize: 10, color: p.muted, letterSpacing: "0.04em", display: "flex", justifyContent: "space-between", marginBottom: 2 };
  const ctrlBlock = { marginBottom: 12 };

  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "1rem", alignItems: "start" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 240, background: `color-mix(in oklch, ${p.paper} 88%, white)`, border: `1px solid ${p.line}` }}>
        {rings.map((r, i) => (
          <ellipse key={i} cx={target.x * W} cy={(1 - target.y) * H} rx={r * W * 0.9} ry={r * H * 0.9} fill="none" stroke={p.muted} strokeOpacity={0.18} strokeDasharray="2 4" />
        ))}
        <circle cx={target.x * W} cy={(1 - target.y) * H} r="4" fill={p.accent} />
        <text x={target.x * W + 8} y={(1 - target.y) * H + 4} fontFamily="var(--f-mono)" fontSize="9" fill={p.accent}>x_b</text>
        {pop && pop.map((pt, i) => (
          <circle key={i} cx={pt.x * W} cy={(1 - pt.y) * H} r="3" fill={p.ink} opacity={0.7} style={{ transition: "all 240ms var(--ease-out)" }} />
        ))}
        <text x="10" y={H - 8} fontFamily="var(--f-ui)" fontSize="10" fill={p.muted} className="mono">gen {gen}</text>
      </svg>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 12, lineHeight: 1.5, color: p.ink }}>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 10 }}>Controls</div>

        <div style={ctrlBlock}>
          <div style={ctrlLabelStyle}><span>population</span><span style={{ color: p.ink }}>{popSize}</span></div>
          <input type="range" min={10} max={60} step={2} value={popSize} onChange={e => setPopSize(+e.target.value)} style={ctrlInputStyle} />
        </div>

        <div style={ctrlBlock}>
          <div style={ctrlLabelStyle}><span>crossover</span><span style={{ color: p.ink }}>{crossover.toFixed(2)}</span></div>
          <input type="range" min={0} max={1} step={0.05} value={crossover} onChange={e => setCrossover(+e.target.value)} style={ctrlInputStyle} />
        </div>

        <div style={{ display: "flex", gap: 6, marginTop: 14, marginBottom: 14 }}>
          <button onClick={() => setRunning(r => !r)} style={{ flex: 1, fontFamily: "var(--f-mono)", fontSize: 10, padding: "4px 6px", border: `1px solid ${p.line}`, background: "transparent", color: p.accent, cursor: "pointer", letterSpacing: "0.06em" }}>{running ? "PAUSE" : "RUN"}</button>
          <button onClick={() => setSeed(s => s + 1)} style={{ flex: 1, fontFamily: "var(--f-mono)", fontSize: 10, padding: "4px 6px", border: `1px solid ${p.line}`, background: "transparent", color: p.accent, cursor: "pointer", letterSpacing: "0.06em" }}>RESEED</button>
        </div>

        <div className="mono" style={{ borderTop: `1px solid ${p.line}`, paddingTop: 10, fontSize: 10, display: "grid", gridTemplateColumns: "auto 1fr", columnGap: 8, rowGap: 4, color: p.ink }}>
          <span style={{ color: p.muted }}>best f</span><span>{bestFitness.toFixed(4)}</span>
          <span style={{ color: p.muted }}>gen</span><span>{gen}</span>
        </div>
      </div>
    </div>
  );
}

function FeatureSelectionViz({ palette: p }) {
  const [running, setRunning] = React.useState(true);
  const [gen, setGen] = React.useState(0);
  const [tradeOff, setTradeOff] = React.useState(0.55); // slope of trade-off line
  const [dragging, setDragging] = React.useState(false);
  const svgRef = React.useRef(null);

  // seeded population: subset-size (x) vs accuracy (y)
  const [pop, setPop] = React.useState(null);
  const [seed, setSeed] = React.useState(1);

  React.useEffect(() => {
    let s = seed * 7919 + 13;
    const r = () => { s = (s * 1103515245 + 12345) % 2147483647; return s / 2147483647; };
    const next = Array.from({ length: 36 }, () => ({
      x: 0.1 + r() * 0.85, // subset fraction 0.1..0.95
      y: 0.2 + r() * 0.7,  // accuracy 0.2..0.9
    }));
    setPop(next);
    setGen(0);
  }, [seed]);

  // Pareto-optimal direction: move toward lower x (smaller subset) and higher y (better accuracy)
  React.useEffect(() => {
    if (!running || !pop) return;
    const id = setInterval(() => {
      setPop(prev => {
        if (!prev) return prev;
        return prev.map(c => {
          // nudge toward the Pareto front: lower-left → upper-left
          const target = { x: 0.08 + Math.random() * 0.15, y: 0.75 + Math.random() * 0.18 };
          const nx = c.x + (target.x - c.x) * (0.03 + Math.random() * 0.04);
          const ny = c.y + (target.y - c.y) * (0.03 + Math.random() * 0.04);
          // add noise so they don't all converge to one point
          return {
            x: Math.max(0.05, Math.min(0.95, nx + (Math.random() - 0.5) * 0.02)),
            y: Math.max(0.15, Math.min(0.95, ny + (Math.random() - 0.5) * 0.02)),
          };
        });
      });
      setGen(g => g + 1);
    }, 90);
    return () => clearInterval(id);
  }, [running, pop]);

  const W = 380, H = 280;
  const left = 44, right = W - 14, top = 16, bottom = H - 30;
  const px = (v) => left + v * (right - left);
  const py = (v) => bottom - v * (bottom - top);

  // trade-off line: y = tradeOff + slope * (1 - x)  — points ABOVE survive
  const lineY = (x) => tradeOff * 0.6 + (1 - x) * tradeOff * 0.7;
  const survives = (c) => c.y > lineY(c.x);
  const surviving = pop ? pop.filter(survives).length : 0;

  const onPointer = (e) => {
    if (!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const sy = ((e.clientY - rect.top) / rect.height) * H;
    const v = 1 - (sy - top) / (bottom - top);
    setTradeOff(Math.max(0.2, Math.min(0.9, v)));
  };

  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "1rem", alignItems: "start" }}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 260, cursor: dragging ? "grabbing" : "default", userSelect: "none", touchAction: "none" }}
           onPointerMove={(e) => { if (dragging) onPointer(e); }} onPointerUp={() => setDragging(false)} onPointerLeave={() => setDragging(false)}>
        <line x1={left} y1={bottom} x2={right} y2={bottom} stroke={p.muted} strokeWidth="1" />
        <line x1={left} y1={top} x2={left} y2={bottom} stroke={p.muted} strokeWidth="1" />
        <text x={right} y={bottom + 16} textAnchor="end" fontFamily="var(--f-ui)" fontSize="10" fill={p.muted}>subset size →</text>
        <text x={left - 6} y={top - 4} textAnchor="end" fontFamily="var(--f-ui)" fontSize="10" fill={p.muted}>accuracy ↑</text>
        {/* trade-off line */}
        <line x1={px(0)} y1={py(lineY(0))} x2={px(1)} y2={py(lineY(1))} stroke={p.accent} strokeWidth="1.4" strokeDasharray="5 4" opacity="0.7" />
        {/* drag hit area */}
        <rect x={left} y={top} width={right - left} height={bottom - top} fill="transparent" style={{ cursor: "ns-resize", touchAction: "none" }} onPointerDown={(e) => { e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId); setDragging(true); onPointer(e); }} />
        {/* drag handle on the line's left end */}
        <circle cx={px(0)} cy={py(lineY(0))} r={6} fill={p.paper} stroke={p.accent} strokeWidth="1.5" pointerEvents="none" />
        <circle cx={px(0)} cy={py(lineY(0))} r={2.5} fill={p.accent} pointerEvents="none" />
        {/* candidates */}
        {pop && pop.map((c, i) => {
          const alive = survives(c);
          return <circle key={i} cx={px(c.x)} cy={py(c.y)} r={alive ? 4 : 2.5} fill={alive ? p.accent : p.muted} opacity={alive ? 0.85 : 0.3} style={{ transition: "all 240ms var(--ease-out)" }} />;
        })}
        <text x={left + 6} y={bottom - 6} fontFamily="var(--f-mono)" fontSize="9" fill={p.muted}>gen {gen}</text>
        <text x={right - 4} y={top + 14} textAnchor="end" fontFamily="var(--f-mono)" fontSize="8" fill={p.accent}>↑ above line = selected</text>
      </svg>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 12, lineHeight: 1.55, color: p.ink }}>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 10 }}>Controls</div>
        <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
          <button onClick={() => setRunning(r => !r)} style={{ flex: 1, fontFamily: "var(--f-mono)", fontSize: 10, padding: "4px 6px", border: `1px solid ${p.line}`, background: "transparent", color: p.accent, cursor: "pointer", letterSpacing: "0.06em" }}>{running ? "PAUSE" : "RUN"}</button>
          <button onClick={() => setSeed(s => s + 1)} style={{ flex: 1, fontFamily: "var(--f-mono)", fontSize: 10, padding: "4px 6px", border: `1px solid ${p.line}`, background: "transparent", color: p.accent, cursor: "pointer", letterSpacing: "0.06em" }}>RESEED</button>
        </div>
        <div className="mono" style={{ borderTop: `1px solid ${p.line}`, paddingTop: 10, fontSize: 10, display: "grid", gridTemplateColumns: "auto 1fr", columnGap: 8, rowGap: 4, color: p.ink }}>
          <span style={{ color: p.muted }}>gen</span><span>{gen}</span>
          <span style={{ color: p.muted }}>selected</span><span>{surviving} / {pop ? pop.length : 0}</span>
          <span style={{ color: p.muted }}>trade-off</span><span>{tradeOff.toFixed(2)}</span>
        </div>
        <div style={{ marginTop: 12, fontSize: 10, color: p.muted, lineHeight: 1.5 }}>Drag the dashed line to change the trade-off. Higher = stricter on accuracy. Candidates above the line survive.</div>
      </div>
    </div>
  );
}

function ThresholdMethods({ palette: p }) {
  const markers = [
    { id: "cd66b", label: "CD66b", shape: "bimodal", valley: 0.42 },
    { id: "cd4",   label: "CD4",   shape: "skew-right", valley: 0.38 },
    { id: "cd8",   label: "CD8",   shape: "bimodal-wide", valley: 0.44 },
    { id: "ctla4", label: "CTLA-4", shape: "flat", valley: 0.35 },
    { id: "cd56",  label: "CD56",  shape: "right-tail", valley: 0.40 },
    { id: "cd20",  label: "CD20",  shape: "sharp-peak", valley: 0.30 },
  ];
  const methods = [
    { id: "pathologist", label: "Pathologist", color: p.ink, dash: "" },
    { id: "otsu",    label: "Otsu",    color: p.accent, dash: "" },
    { id: "isodata", label: "IsoData", color: "#5B7A4F", dash: "" },
    { id: "gmm",     label: "GMM",     color: "#8B5A89", dash: "4 3" },
  ];
  const [activeMarker, setActiveMarker] = React.useState("cd66b");
  const [hover, setHover] = React.useState(null);

  // seeded PRNG for reproducible synthetic histograms
  const histData = React.useMemo(() => {
    const out = {};
    markers.forEach(mk => {
      let s = mk.id.charCodeAt(0) * 137 + 31;
      const rng = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
      // box-muller helper
      const gauss = (mu, sd) => { const u1 = Math.max(1e-6, rng()), u2 = rng(); return mu + sd * Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2); };
      const bins = new Array(40).fill(0);
      const N = 600;
      for (let i = 0; i < N; i++) {
        let v;
        if (mk.shape === "bimodal") { v = rng() < 0.65 ? gauss(0.22, 0.09) : gauss(0.68, 0.11); }
        else if (mk.shape === "bimodal-wide") { v = rng() < 0.55 ? gauss(0.25, 0.12) : gauss(0.72, 0.14); }
        else if (mk.shape === "skew-right") { v = rng() < 0.70 ? gauss(0.20, 0.08) : gauss(0.60, 0.15); }
        else if (mk.shape === "flat") { v = gauss(0.38, 0.22); }
        else if (mk.shape === "right-tail") { v = rng() < 0.78 ? gauss(0.18, 0.07) : gauss(0.65, 0.18); }
        else { v = rng() < 0.82 ? gauss(0.15, 0.06) : gauss(0.55, 0.10); }
        const bin = Math.max(0, Math.min(39, Math.floor(v * 40)));
        bins[bin]++;
      }
      // method thresholds (synthetic, plausible, NOT real)
      const base = mk.valley;
      const spread = mk.shape === "flat" ? 0.12 : 0.04;
      out[mk.id] = {
        bins, max: Math.max(...bins),
        thresholds: {
          pathologist: base,
          otsu: base + (mk.shape === "flat" ? -0.08 : 0.01),
          isodata: base + (mk.shape === "flat" ? 0.05 : -0.01),
          gmm: base + (mk.shape === "flat" ? 0.10 : 0.02),
        },
      };
    });
    return out;
  }, []);

  const mk = markers.find(m => m.id === activeMarker);
  const hd = histData[activeMarker];
  const W = 420, H = 220;
  const left = 30, right = W - 10, bottom = H - 30, top = 16;
  const barW = (right - left) / 40;

  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "1rem", alignItems: "start" }}>
      <div>
        <div style={{ display: "flex", gap: 4, marginBottom: 8, flexWrap: "wrap" }}>
          {markers.map(m => (
            <button key={m.id} onClick={() => setActiveMarker(m.id)} style={{ all: "unset", cursor: "pointer", fontFamily: "var(--f-mono)", fontSize: 10, padding: "2px 8px", border: `1px solid ${activeMarker === m.id ? p.accent : p.line}`, color: activeMarker === m.id ? p.accent : p.muted, letterSpacing: "0.04em", transition: "all 240ms var(--ease-out)" }}>{m.label}</button>
          ))}
        </div>
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 220 }}>
          {hd.bins.map((count, i) => {
            const x = left + i * barW;
            const h = hd.max > 0 ? (count / hd.max) * (bottom - top) : 0;
            return <rect key={i} x={x} y={bottom - h} width={barW - 1} height={h} fill={p.muted} opacity={0.3} />;
          })}
          {methods.map(m => {
            const tx = hd.thresholds[m.id];
            const px = left + tx * (right - left);
            const isHov = hover === m.id;
            return (
              <g key={m.id} onMouseEnter={() => setHover(m.id)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }}>
                <line x1={px} y1={top} x2={px} y2={bottom} stroke={m.color} strokeWidth={isHov ? 2.4 : 1.4} strokeDasharray={m.dash} opacity={isHov ? 1 : 0.7} style={{ transition: "all 240ms var(--ease-out)" }} />
                <text x={px} y={top - 3} textAnchor="middle" fontFamily="var(--f-mono)" fontSize="8" fill={m.color} opacity={isHov ? 1 : 0.6}>{m.id === "pathologist" ? "PATH" : m.id.toUpperCase()}</text>
              </g>
            );
          })}
          <line x1={left} y1={bottom} x2={right} y2={bottom} stroke={p.muted} strokeWidth="1" />
          <text x={right} y={bottom + 16} textAnchor="end" fontFamily="var(--f-ui)" fontSize="10" fill={p.muted}>intensity →</text>
          <text x={left} y={bottom + 16} fontFamily="var(--f-ui)" fontSize="10" fill={p.muted}>0</text>
        </svg>
      </div>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 12, lineHeight: 1.55 }}>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 8 }}>Methods · hover to highlight</div>
        {methods.map(m => (
          <div key={m.id} onMouseEnter={() => setHover(m.id)} onMouseLeave={() => setHover(null)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0", cursor: "pointer", color: hover === m.id ? m.color : p.ink, transition: "color 240ms var(--ease-out)" }}>
            <span style={{ width: 16, height: 2, background: m.color, display: "inline-block", opacity: hover === m.id ? 1 : 0.6 }} />
            <span style={{ fontSize: 11 }}>{m.label}</span>
          </div>
        ))}
        <div style={{ marginTop: 12, fontSize: 10, color: p.muted, lineHeight: 1.5 }}>
          {mk.shape === "flat"
            ? "CTLA-4: no valley. The methods scatter — each guesses differently."
            : mk.shape === "bimodal"
            ? "Clean bimodal valley. All methods converge within a narrow band."
            : "Methods agree roughly, but small differences shift populations."}
        </div>
      </div>
    </div>
  );
}

function CtlaDistribution({ palette: p }) {
  const [hover, setHover] = React.useState(null); // "cd66b" | "ctla4" | null
  // synthetic histograms — CD66b (clean bimodal) vs CTLA-4 (flat/ambiguous)
  const data = React.useMemo(() => {
    const mkHist = (seed, gen) => {
      let s = seed;
      const rng = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
      const gauss = (mu, sd) => { const u1 = Math.max(1e-6, rng()), u2 = rng(); return mu + sd * Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2); };
      const bins = new Array(32).fill(0);
      for (let i = 0; i < 500; i++) {
        const v = gen(rng, gauss);
        const bin = Math.max(0, Math.min(31, Math.floor(v * 32)));
        bins[bin]++;
      }
      return bins;
    };
    return {
      cd66b: mkHist(42, (r, g) => r() < 0.6 ? g(0.18, 0.07) : g(0.72, 0.09)),
      ctla4: mkHist(77, (r, g) => g(0.36, 0.20)),
    };
  }, []);

  const methodLines = {
    cd66b: [
      { label: "Otsu", x: 0.41, color: p.accent },
      { label: "IsoData", x: 0.43, color: "#5B7A4F" },
      { label: "GMM", x: 0.44, color: "#8B5A89" },
    ],
    ctla4: [
      { label: "Otsu", x: 0.25, color: p.accent },
      { label: "IsoData", x: 0.40, color: "#5B7A4F" },
      { label: "GMM", x: 0.52, color: "#8B5A89" },
    ],
  };

  const W = 480, H = 200;
  const drawPanel = (bins, key, xOff, panelW) => {
    const max = Math.max(...bins);
    const barW = (panelW - 20) / bins.length;
    const bottom = H - 30, tp = 30;
    const isHov = hover === key;
    const lines = methodLines[key];
    return (
      <g style={{ opacity: hover && !isHov ? 0.4 : 1, transition: "opacity 240ms var(--ease-out)" }}>
        <text x={xOff + panelW / 2} y={18} textAnchor="middle" fontFamily="var(--f-mono)" fontSize="11" fill={isHov ? p.accent : p.ink}>{key === "cd66b" ? "CD66b" : "CTLA-4"}</text>
        <text x={xOff + panelW / 2} y={H - 6} textAnchor="middle" fontFamily="var(--f-ui)" fontSize="9" fill={p.muted}>{key === "cd66b" ? "clean valley — methods converge" : "no valley — methods scatter"}</text>
        <rect x={xOff} y={tp} width={panelW} height={bottom - tp} fill="none" stroke={p.line} strokeWidth="0.5" onMouseEnter={() => setHover(key)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }} />
        {bins.map((count, i) => {
          const x = xOff + 10 + i * barW;
          const h = max > 0 ? (count / max) * (bottom - tp - 10) : 0;
          return <rect key={i} x={x} y={bottom - h} width={barW - 0.5} height={h} fill={p.muted} opacity={0.3} />;
        })}
        {lines.map((ln, j) => {
          const px = xOff + 10 + ln.x * (panelW - 20);
          return (
            <g key={j}>
              <line x1={px} y1={tp + 4} x2={px} y2={bottom} stroke={ln.color} strokeWidth="1.4" strokeDasharray="3 3" />
              <text x={px} y={tp + 2} textAnchor="middle" fontFamily="var(--f-mono)" fontSize="7" fill={ln.color}>{ln.label}</text>
            </g>
          );
        })}
      </g>
    );
  };

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 200 }}>
      {drawPanel(data.cd66b, "cd66b", 0, 228)}
      <line x1="238" y1="40" x2="238" y2={H - 35} stroke={p.line} strokeDasharray="2 4" />
      {drawPanel(data.ctla4, "ctla4", 248, 228)}
    </svg>
  );
}

function GateSensitivity({ palette: p }) {
  const [thresh, setThresh] = React.useState(0.44); // normalised 0..1
  const [dragging, setDragging] = React.useState(false);
  const svgRef = React.useRef(null);

  // synthetic CD4-like distribution: skewed bimodal
  const bins = React.useMemo(() => {
    let s = 55;
    const rng = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    const gauss = (mu, sd) => { const u1 = Math.max(1e-6, rng()), u2 = rng(); return mu + sd * Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2); };
    const b = new Array(50).fill(0);
    for (let i = 0; i < 800; i++) {
      const v = rng() < 0.68 ? gauss(0.22, 0.09) : gauss(0.62, 0.13);
      const bin = Math.max(0, Math.min(49, Math.floor(v * 50)));
      b[bin]++;
    }
    return b;
  }, []);

  const total = bins.reduce((a, b) => a + b, 0);
  const threshBin = Math.floor(thresh * 50);
  const pos = bins.slice(threshBin).reduce((a, b) => a + b, 0);
  const neg = total - pos;
  const posPct = total > 0 ? (pos / total * 100) : 0;
  const negPct = 100 - posPct;

  const W = 420, H = 250;
  const left = 36, right = W - 10, bottom = 160, top = 20;
  const barW = (right - left) / 50;
  const max = Math.max(...bins);

  const onPointer = (e) => {
    if (!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const sx = ((e.clientX - rect.left) / rect.width) * W;
    const v = (sx - left) / (right - left);
    setThresh(Math.max(0.05, Math.min(0.95, v)));
  };

  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "1rem", alignItems: "start" }}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 250, cursor: dragging ? "grabbing" : "default", userSelect: "none", touchAction: "none" }}
           onPointerMove={(e) => { if (dragging) onPointer(e); }} onPointerUp={() => setDragging(false)} onPointerLeave={() => setDragging(false)}>
        {bins.map((count, i) => {
          const x = left + i * barW;
          const h = max > 0 ? (count / max) * (bottom - top) : 0;
          const isPos = i >= threshBin;
          return <rect key={i} x={x} y={bottom - h} width={barW - 0.5} height={h} fill={isPos ? p.accent : p.muted} opacity={0.45} style={{ transition: "fill 120ms" }} />;
        })}
        {/* threshold line + drag handle */}
        {(() => {
          const tx = left + thresh * (right - left);
          return (
            <g>
              <line x1={tx} y1={top} x2={tx} y2={bottom} stroke={p.accent} strokeWidth="1.6" strokeDasharray="4 3" />
              <rect x={tx - 14} y={top} width={28} height={bottom - top} fill="transparent" style={{ cursor: "ew-resize", touchAction: "none" }} onPointerDown={(e) => { e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId); setDragging(true); onPointer(e); }} />
              <circle cx={tx} cy={(top + bottom) / 2} r={6} fill={p.paper} stroke={p.accent} strokeWidth="1.5" pointerEvents="none" />
              <circle cx={tx} cy={(top + bottom) / 2} r={2.5} fill={p.accent} pointerEvents="none" />
              <text x={tx} y={top - 4} textAnchor="middle" fontFamily="var(--f-mono)" fontSize="9" fill={p.accent}>gate = {(thresh * 10).toFixed(2)}</text>
            </g>
          );
        })()}
        <line x1={left} y1={bottom} x2={right} y2={bottom} stroke={p.muted} strokeWidth="1" />
        <text x={right} y={bottom + 14} textAnchor="end" fontFamily="var(--f-ui)" fontSize="10" fill={p.muted}>CD4 intensity →</text>
        {/* population bars */}
        <rect x={left} y={bottom + 26} width={(right - left) * negPct / 100} height={10} fill={p.muted} opacity={0.5} style={{ transition: "width 120ms" }} />
        <rect x={left + (right - left) * negPct / 100} y={bottom + 26} width={(right - left) * posPct / 100} height={10} fill={p.accent} opacity={0.6} style={{ transition: "all 120ms" }} />
        <text x={left} y={bottom + 50} fontFamily="var(--f-mono)" fontSize="9" fill={p.muted}>negative {negPct.toFixed(1)}%</text>
        <text x={right} y={bottom + 50} textAnchor="end" fontFamily="var(--f-mono)" fontSize="9" fill={p.accent}>positive {posPct.toFixed(1)}%</text>
      </svg>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 12, lineHeight: 1.55 }}>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 8 }}>Gate position · drag the line</div>
        <div className="mono" style={{ borderTop: `1px solid ${p.line}`, paddingTop: 10, fontSize: 10, display: "grid", gridTemplateColumns: "auto 1fr", columnGap: 8, rowGap: 6, color: p.ink }}>
          <span style={{ color: p.muted }}>gate</span><span>{(thresh * 10).toFixed(2)}</span>
          <span style={{ color: p.muted }}>positive</span><span>{pos} cells · {posPct.toFixed(1)}%</span>
          <span style={{ color: p.muted }}>negative</span><span>{neg} cells · {negPct.toFixed(1)}%</span>
        </div>
        <div style={{ marginTop: 12, fontSize: 10, color: p.muted, lineHeight: 1.5 }}>Drag the gate by half a unit — watch the positive count shift.</div>
      </div>
    </div>
  );
}

function ViolationNetwork({ palette: p }) {
  const [active, setActive] = React.useState(null); // clicked node
  const [pulseKey, setPulseKey] = React.useState(0); // reset pulse animation
  const nodes = [
    { id: "CD66b",  angle: -90  },
    { id: "CD56",   angle: -30  },
    { id: "CD8",    angle: 30   },
    { id: "CD20",   angle: 90   },
    { id: "CTLA-4", angle: 150  },
    { id: "CD4",    angle: 210  },
  ];
  const cannotLink = [
    ["CD66b", "CD4"], ["CD66b", "CD8"], ["CD66b", "CD20"], ["CD56", "CD20"],
  ];
  const lessLikely = [
    ["CD4", "CD8"], ["CD66b", "CD56"],
  ];
  const W = 420, H = 300;
  const cx = W / 2, cy = H / 2, radius = 95;
  const pos = Object.fromEntries(nodes.map(n => [n.id, {
    x: cx + Math.cos(n.angle * Math.PI / 180) * radius,
    y: cy + Math.sin(n.angle * Math.PI / 180) * radius,
  }]));

  const isInvolved = (nodeId) => {
    if (!active) return false;
    return cannotLink.some(([a, b]) => (a === active || b === active) && (a === nodeId || b === nodeId))
        || lessLikely.some(([a, b]) => (a === active || b === active) && (a === nodeId || b === nodeId));
  };

  const handleClick = (id) => {
    setActive(prev => prev === id ? null : id);
    setPulseKey(k => k + 1);
  };

  // edge-tracing pulse: animated circle travelling along constraint edges from the active node
  const pulseEdges = React.useMemo(() => {
    if (!active) return [];
    const edges = [];
    cannotLink.forEach(([a, b]) => {
      if (a === active || b === active) {
        const from = a === active ? a : b;
        const to = a === active ? b : a;
        edges.push({ from, to, type: "cannot", color: "#C2452A" });
      }
    });
    lessLikely.forEach(([a, b]) => {
      if (a === active || b === active) {
        const from = a === active ? a : b;
        const to = a === active ? b : a;
        edges.push({ from, to, type: "less", color: "#C68A4F" });
      }
    });
    return edges;
  }, [active]);

  // pulse animation keyframes (injected once)
  const pulseStyle = `@keyframes vn-pulse { 0% { offset-distance: 0%; opacity: 1; } 80% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }`;

  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "1rem", alignItems: "start" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 280 }}>
        <style>{pulseStyle}</style>
        {cannotLink.map(([a, b], i) => {
          const pa = pos[a], pb = pos[b];
          const isActive = active && (active === a || active === b);
          return <line key={`c${i}`} x1={pa.x} y1={pa.y} x2={pb.x} y2={pb.y} stroke="#C2452A" strokeWidth={isActive ? 2.4 : 1.4} opacity={isActive ? 0.9 : 0.35} style={{ transition: "all 240ms var(--ease-out)" }} />;
        })}
        {lessLikely.map(([a, b], i) => {
          const pa = pos[a], pb = pos[b];
          const isActive = active && (active === a || active === b);
          return <line key={`l${i}`} x1={pa.x} y1={pa.y} x2={pb.x} y2={pb.y} stroke="#C68A4F" strokeWidth={isActive ? 2.4 : 1.4} strokeDasharray="5 4" opacity={isActive ? 0.9 : 0.35} style={{ transition: "all 240ms var(--ease-out)" }} />;
        })}
        {/* animated pulse dots along edges from active node */}
        {pulseEdges.map((edge, i) => {
          const pa = pos[edge.from], pb = pos[edge.to];
          const pathD = `M ${pa.x} ${pa.y} L ${pb.x} ${pb.y}`;
          return (
            <g key={`pulse-${pulseKey}-${i}`}>
              <path id={`vn-path-${pulseKey}-${i}`} d={pathD} fill="none" stroke="none" />
              <circle r="5" fill={edge.color} opacity="0" style={{ offsetPath: `path("${pathD}")`, animation: `vn-pulse 500ms ${i * 120}ms ease-out forwards` }} />
              <circle r="3" fill={edge.color} opacity="0" style={{ offsetPath: `path("${pathD}")`, animation: `vn-pulse 500ms ${i * 120 + 100}ms ease-out forwards` }} />
            </g>
          );
        })}
        {nodes.map(n => {
          const pt = pos[n.id];
          const isActive = active === n.id;
          const involved = isInvolved(n.id);
          return (
            <g key={n.id} onClick={() => handleClick(n.id)} onMouseEnter={() => !active && setActive(n.id)} onMouseLeave={() => !active && setActive(null)} style={{ cursor: "pointer" }}>
              <circle cx={pt.x} cy={pt.y} r={isActive ? 24 : 20} fill={p.paper} stroke={isActive ? p.accent : involved ? p.ink : p.muted} strokeWidth={isActive ? 2.4 : 1.2} style={{ transition: "all 240ms var(--ease-out)" }} />
              {isActive && <circle cx={pt.x} cy={pt.y} r={28} fill="none" stroke={p.accent} strokeWidth="1" opacity="0.3" style={{ transition: "all 240ms var(--ease-out)" }} />}
              <text x={pt.x} y={pt.y + 4} textAnchor="middle" fontFamily="var(--f-mono)" fontSize="9" fill={isActive ? p.accent : p.ink} style={{ pointerEvents: "none" }}>{n.id}</text>
            </g>
          );
        })}
        <text x={cx} y={cy + 4} textAnchor="middle" fontFamily="var(--f-ui)" fontSize="9" fill={p.muted}>{active ? `${active} constraints` : "click a marker"}</text>
      </svg>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 12, lineHeight: 1.55 }}>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 8 }}>Constraint types</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0" }}>
          <span style={{ width: 16, height: 2, background: "#C2452A", display: "inline-block" }} />
          <span style={{ fontSize: 11, color: p.ink }}>cannot co-express</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0" }}>
          <span style={{ width: 16, height: 2, background: "#C68A4F", display: "inline-block", borderBottom: "1px dashed #C68A4F" }} />
          <span style={{ fontSize: 11, color: p.ink }}>unlikely to co-express</span>
        </div>
        <div style={{ marginTop: 12, fontSize: 10, color: p.muted, lineHeight: 1.5 }}>
          {active
            ? `${active}: ${cannotLink.filter(([a,b]) => a===active||b===active).length} cannot-link, ${lessLikely.filter(([a,b]) => a===active||b===active).length} less-likely. Click again to deselect.`
            : "Click a marker to see its constraints animate. CD66b has the most — neutrophils can't be lymphocytes."}
        </div>
      </div>
    </div>
  );
}

function ConstraintEffect({ palette: p }) {
  const [view, setView] = React.useState("before"); // "before" | "after"
  // synthetic 2-D scatter: cells with cluster assignments
  const cells = React.useMemo(() => {
    let s = 33;
    const rng = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    const gauss = (mu, sd) => { const u1 = Math.max(1e-6, rng()), u2 = rng(); return mu + sd * Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2); };
    const out = [];
    // cluster 0: "no marker" — tight, bottom-left
    for (let i = 0; i < 40; i++) out.push({ x: gauss(0.18, 0.05), y: gauss(0.18, 0.05), before: 0, after: 0 });
    // cluster 1: CD4+ — mid-left
    for (let i = 0; i < 25; i++) out.push({ x: gauss(0.35, 0.06), y: gauss(0.55, 0.07), before: 1, after: 1 });
    // cluster 2: CD8+ — mid-right
    for (let i = 0; i < 22; i++) out.push({ x: gauss(0.65, 0.06), y: gauss(0.50, 0.07), before: 2, after: 2 });
    // cluster 3: CD66b — top-right
    for (let i = 0; i < 18; i++) out.push({ x: gauss(0.75, 0.05), y: gauss(0.80, 0.05), before: 3, after: 3 });
    // "violation" cells — before: wrongly merged with cluster 1; after: correctly split out
    for (let i = 0; i < 8; i++) out.push({ x: gauss(0.42, 0.04), y: gauss(0.70, 0.05), before: 1, after: 4 });
    // outlier cells — before: in cluster 0; after: reassigned or flagged
    for (let i = 0; i < 5; i++) out.push({ x: gauss(0.50, 0.08), y: gauss(0.22, 0.04), before: 0, after: 5 });
    return out;
  }, []);

  const clusterColors = [p.muted, "#5B7A4F", p.accent, "#C68A4F", "#C2452A", "#4F7A8B"];
  const clusterLabels = ["no marker", "CD4+", "CD8+", "CD66b", "violation (split)", "outlier (flagged)"];
  const W = 360, H = 280;
  const px = (v) => 30 + v * (W - 50);
  const py = (v) => H - 30 - v * (H - 50);

  const activeClusters = view === "before" ? [0, 1, 2, 3] : [0, 1, 2, 3, 4, 5];

  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "1rem", alignItems: "start" }}>
      <div>
        <div style={{ display: "flex", gap: 6, marginBottom: 8, fontFamily: "var(--f-mono)", fontSize: 10 }}>
          {[["before", "standard"], ["after", "constraint-aware"]].map(([id, label]) => (
            <button key={id} onClick={() => setView(id)} style={{ all: "unset", cursor: "pointer", padding: "2px 8px", border: `1px solid ${view === id ? p.accent : p.line}`, color: view === id ? p.accent : p.muted, letterSpacing: "0.04em" }}>{label}</button>
          ))}
        </div>
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 260 }}>
          {cells.map((c, i) => {
            const k = view === "before" ? c.before : c.after;
            const isViolation = view === "after" && (k === 4 || k === 5);
            return (
              <circle key={i} cx={px(c.x)} cy={py(c.y)} r={isViolation ? 4 : 3} fill={clusterColors[k]} opacity={0.8} stroke={isViolation ? p.ink : "none"} strokeWidth={isViolation ? 0.8 : 0} style={{ transition: "all 300ms var(--ease-out)" }} />
            );
          })}
          {view === "before" && (
            <g>
              <ellipse cx={px(0.38)} cy={py(0.60)} rx={55} ry={45} fill="none" stroke="#C2452A" strokeWidth="1.2" strokeDasharray="4 3" opacity="0.6" />
              <text x={px(0.38) + 58} y={py(0.60)} fontFamily="var(--f-mono)" fontSize="8" fill="#C2452A">violation?</text>
            </g>
          )}
          <text x={px(0)} y={H - 6} fontFamily="var(--f-ui)" fontSize="9" fill={p.muted}>UMAP dimension 1 →</text>
        </svg>
      </div>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 12, lineHeight: 1.55 }}>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 8 }}>Clusters · toggle view</div>
        {activeClusters.map(k => (
          <div key={k} style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 0" }}>
            <span style={{ width: 10, height: 10, borderRadius: "50%", background: clusterColors[k], flexShrink: 0 }} />
            <span style={{ fontSize: 11, color: p.ink }}>{clusterLabels[k]}</span>
          </div>
        ))}
        <div style={{ marginTop: 10, fontSize: 10, color: p.muted, lineHeight: 1.5 }}>
          {view === "before"
            ? "Standard clustering merges biologically impossible cells into the CD4+ group. The dashed ring marks the violations."
            : "Constraint-aware clustering splits violations out and flags outliers. The biology is respected."}
        </div>
      </div>
    </div>
  );
}

function MethodRanking({ palette: p }) {
  const [hover, setHover] = React.useState(null);
  const methods = [
    { id: "agg",      label: "Agglomerative",  score: 0.82, note: "Simple hierarchy. Best overall — no constraints needed.", color: "#5B7A4F" },
    { id: "ours",     label: "Our approach",    score: 0.74, note: "Constraint-aware spectral. Beat most, not the simplest.", color: p.accent },
    { id: "spectral", label: "Spectral",        score: 0.66, note: "Good at non-convex shapes. Sensitive to kernel tuning.", color: "#8B5A89" },
    { id: "birch",    label: "BIRCH",           score: 0.62, note: "Fast. Tends to over-split in marker space.", color: "#C68A4F" },
    { id: "kmeans",   label: "KMeans",          score: 0.55, note: "Assumes spherical clusters. Immune data is not spherical.", color: "#4F7A8B" },
    { id: "meanshift",label: "Mean-Shift",      score: 0.48, note: "Bandwidth-sensitive. Missed small populations.", color: p.muted },
    { id: "hdbscan",  label: "HDBSCAN",         score: 0.40, note: "Density-based. Labelled too many cells as noise.", color: p.muted },
  ];
  const W = 460, H = 240;
  const left = 140, right = W - 30, top = 20, rowH = 28;

  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "1rem", alignItems: "start" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 240 }}>
        <text x={left - 4} y={14} textAnchor="end" fontFamily="var(--f-mono)" fontSize="9" fill={p.muted}>method</text>
        <text x={right} y={14} textAnchor="end" fontFamily="var(--f-mono)" fontSize="9" fill={p.muted}>relative performance →</text>
        <line x1={left} y1={top} x2={left} y2={top + methods.length * rowH} stroke={p.line} strokeWidth="0.5" />
        {methods.map((m, i) => {
          const y = top + i * rowH + rowH / 2;
          const barEnd = left + m.score * (right - left);
          const isHov = hover === m.id;
          const isOurs = m.id === "ours";
          return (
            <g key={m.id} onMouseEnter={() => setHover(m.id)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }}>
              <text x={left - 8} y={y + 4} textAnchor="end" fontFamily="var(--f-ui)" fontSize={isOurs ? 11 : 10} fill={isHov ? m.color : isOurs ? p.accent : p.ink} fontWeight={isOurs ? 600 : 400} style={{ transition: "fill 240ms" }}>{m.label}</text>
              <line x1={left} y1={y} x2={barEnd} y2={y} stroke={m.color} strokeWidth={isHov || isOurs ? 3 : 2} strokeLinecap="round" opacity={isHov ? 1 : 0.7} style={{ transition: "all 240ms var(--ease-out)" }} />
              <circle cx={barEnd} cy={y} r={isHov || isOurs ? 5 : 3.5} fill={m.color} opacity={isHov ? 1 : 0.85} style={{ transition: "all 240ms var(--ease-out)" }} />
            </g>
          );
        })}
      </svg>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 12, lineHeight: 1.55 }}>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 8 }}>Ranking · hover for detail</div>
        <div style={{ minHeight: 60, fontSize: 11, color: hover ? p.ink : p.muted, transition: "color 200ms", lineHeight: 1.5 }}>
          {hover ? methods.find(m => m.id === hover).note : "Hover a method to see what it got right — and what it missed."}
        </div>
        <div style={{ marginTop: 10, fontSize: 10, color: p.muted, lineHeight: 1.5 }}>Scale is relative, not absolute. Our method sits second — ahead of the textbooks, behind the simplest hierarchy.</div>
      </div>
    </div>
  );
}

function RecEngineSwarm({ palette: p }) {
  const W = 480, H = 320;
  const cx = W / 2, cy = H / 2;
  const engines = [
    { id: "lyrics", label: "Lyrics-Transformer",  short: "LYR", angle: -90, color: p.accent },
    { id: "vae",    label: "Audio VAE (384→16D)", short: "VAE", angle: -30, color: "#8B5A89" },
    { id: "graph",  label: "Graph node2vec",      short: "GRP", angle: 30,  color: "#5B7A4F" },
    { id: "ncf",    label: "Neural Collab",       short: "NCF", angle: 90,  color: "#C68A4F" },
    { id: "ssl",    label: "Contrastive SSL",     short: "SSL", angle: 150, color: "#4F7A8B" },
    { id: "ens",    label: "Ensemble (weighted)", short: "ENS", angle: 210, color: p.ink },
  ];
  const [enabled, setEnabled] = React.useState(() => Object.fromEntries(engines.map(e => [e.id, true])));
  const [hover, setHover] = React.useState(null); // song idx or null
  const radius = 110;

  const titles = [
    "All Too Well (10 Min)", "Cruel Summer", "August", "Cardigan", "Anti-Hero",
    "Mirrorball", "Style", "Out of the Woods", "Champagne Problems", "The 1",
    "Daylight", "Exile", "Willow", "Lavender Haze",
  ];

  const songs = React.useMemo(() => {
    let s = 13;
    const r = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    const out = [];
    for (let i = 0; i < titles.length; i++) {
      const a = r() * Math.PI * 2;
      out.push({
        x: cx + Math.cos(a) * (radius + 50 + r() * 30),
        y: cy + Math.sin(a) * (radius + 40 + r() * 30),
        title: titles[i],
      });
    }
    return out;
  }, [cx, cy]);

  // each engine connects deterministically to a fixed subset of songs
  const linksByEngine = React.useMemo(() => Object.fromEntries(engines.map((e, ei) => {
    const set = new Set();
    for (let k = 0; k < 5; k++) set.add((ei * 3 + k * 2 + 1) % songs.length);
    return [e.id, [...set]];
  })), [songs.length]);

  // votes per song = count of currently-enabled engines that surface it
  const votes = songs.map((_, idx) => engines.reduce((acc, e) => acc + (enabled[e.id] && linksByEngine[e.id].includes(idx) ? 1 : 0), 0));

  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "1rem", alignItems: "start" }}>
      <div style={{ position: "relative" }}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 300, background: `color-mix(in oklch, ${p.paper} 88%, white)`, border: `1px solid ${p.line}` }}>
          {engines.map(e => {
            if (!enabled[e.id]) return null;
            const ex = cx + Math.cos(e.angle * Math.PI / 180) * radius;
            const ey = cy + Math.sin(e.angle * Math.PI / 180) * radius;
            return (
              <g key={e.id} style={{ transition: "opacity 240ms" }}>
                {linksByEngine[e.id].map((sIdx, j) => (
                  <line key={j} x1={ex} y1={ey} x2={songs[sIdx].x} y2={songs[sIdx].y} stroke={e.color} strokeWidth={votes[sIdx] >= 2 ? 1.4 : 0.6} strokeOpacity={hover === sIdx ? 0.9 : 0.45} />
                ))}
              </g>
            );
          })}
          <circle cx={cx} cy={cy} r="14" fill={p.paper} stroke={p.ink} strokeWidth="1.5" />
          <text x={cx} y={cy + 4} textAnchor="middle" fontFamily="var(--f-mono)" fontSize="9" fill={p.ink}>q</text>
          {engines.map(e => {
            const ex = cx + Math.cos(e.angle * Math.PI / 180) * radius;
            const ey = cy + Math.sin(e.angle * Math.PI / 180) * radius;
            const on = enabled[e.id];
            return (
              <g key={e.id} onClick={() => setEnabled(s => ({ ...s, [e.id]: !s[e.id] }))} style={{ cursor: "pointer", opacity: on ? 1 : 0.3, transition: "opacity 220ms" }}>
                <line x1={cx} y1={cy} x2={ex} y2={ey} stroke={p.muted} strokeOpacity={0.25} />
                <circle cx={ex} cy={ey} r="14" fill={on ? p.paper : "transparent"} stroke={e.color} strokeWidth="1.6" />
                <text x={ex} y={ey + 3} textAnchor="middle" fontFamily="var(--f-mono)" fontSize="8" fill={e.color}>{e.short}</text>
              </g>
            );
          })}
          {songs.map((s, i) => votes[i] === 0 ? null : (
            <g key={i} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }}>
              <circle cx={s.x} cy={s.y} r={votes[i] >= 2 ? 4.5 : 3} fill={votes[i] >= 2 ? p.accent : p.muted} opacity={hover === i ? 1 : 0.85} />
              {hover === i && <circle cx={s.x} cy={s.y} r={9} fill="none" stroke={p.accent} strokeWidth="1" strokeOpacity="0.6" />}
            </g>
          ))}
        </svg>
        <div className="mono" style={{ position: "absolute", left: 8, bottom: 8, fontSize: 10, color: hover === null ? p.muted : p.ink, padding: "2px 6px", background: `color-mix(in oklch, ${p.paper} 92%, white)`, border: `1px solid ${p.line}`, minWidth: 180 }}>
          {hover === null ? "hover a song · click an engine to toggle" : `♪ ${songs[hover].title} · ${votes[hover]}/${engines.filter(e => enabled[e.id]).length} surfaced`}
        </div>
      </div>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 12, lineHeight: 1.55 }}>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 8 }}>Engines · click to toggle</div>
        {engines.map(e => (
          <div key={e.id} onClick={() => setEnabled(s => ({ ...s, [e.id]: !s[e.id] }))} style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 0", cursor: "pointer", color: enabled[e.id] ? p.ink : p.muted, transition: "color 220ms" }}>
            <span style={{ width: 12, height: 12, border: `1px solid ${e.color}`, background: enabled[e.id] ? e.color : "transparent", flexShrink: 0, position: "relative" }} />
            <span style={{ flex: 1, fontSize: 11, textDecoration: enabled[e.id] ? "none" : "line-through" }}>{e.label}</span>
          </div>
        ))}
        <div style={{ marginTop: 10, fontSize: 10, color: p.muted, lineHeight: 1.5 }}>Filled songs = surfaced by ≥2 enabled engines. Toggle one off and the consensus shifts.</div>
      </div>
    </div>
  );
}

function EnsembleConsensus({ palette: p }) {
  const engineDefs = [
    { id: "lyrics", label: "Lyrics",       color: p.accent },
    { id: "vae",    label: "Audio VAE",    color: "#8B5A89" },
