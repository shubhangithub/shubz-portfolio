<html lang="en">

<style>
/* ========== BASE — shared across all variations ========== */

:root {
  /* Type */
  --f-display: "Fraunces", "Times New Roman", serif;
  --f-body: "Source Serif 4", "Georgia", serif;
  --f-ui: "IBM Plex Sans", ui-sans-serif, sans-serif;
  --f-mono: "JetBrains Mono", ui-monospace, monospace;

  /* Motion */
  --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

  /* Measure */
  --measure: 64ch;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: var(--f-body);
  font-size: 20px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "kern", "liga", "calt", "onum";
}

/* Display headlines use optical-size via font-variation-settings */
.display {
  font-family: var(--f-display);
  font-variation-settings: "opsz" 144, "SOFT" 50, "WONK" 0;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.02;
  text-wrap: balance;
}

/* UI labels */
.ui {
  font-family: var(--f-ui);
  font-feature-settings: "ss01", "ss02", "cv05";
}

.mono {
  font-family: var(--f-mono);
  font-size: 0.78em;
  letter-spacing: 0.02em;
}

.caps {
  font-family: var(--f-ui);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-size: 0.72em;
  font-weight: 500;
}

/* Shared link treatment — each variation overrides */
a { color: inherit; text-decoration: none; }

/* Hanging punctuation via margin trick */
.hang { hanging-punctuation: first last; }

/* Pull quote */
.pull-quote {
  font-family: var(--f-display);
  font-variation-settings: "opsz" 144;
  font-weight: 300;
  font-style: italic;
  font-size: 2.1rem;
  line-height: 1.2;
  letter-spacing: -0.01em;
  text-wrap: balance;
  margin: 3rem 0;
  padding-left: 1.2rem;
  border-left: 1px solid currentColor;
}

/* Drop cap */
.drop-cap::first-letter {
  font-family: var(--f-display);
  font-variation-settings: "opsz" 144, "SOFT" 100;
  font-weight: 500;
  font-size: 5.2em;
  float: left;
  line-height: 0.88;
  padding: 0.08em 0.12em 0 0;
  margin-right: 0.02em;
}

/* Custom scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: color-mix(in oklch, currentColor 30%, transparent);
  border-radius: 10px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
::-webkit-scrollbar-thumb:hover {
  background: color-mix(in oklch, currentColor 55%, transparent);
  background-clip: padding-box;
  border: 2px solid transparent;
}

/* Reading-I-beam cursor over prose */
.prose { cursor: text; }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* View transitions */
::view-transition-old(root),
::view-transition-new(root) {
  animation-duration: 450ms;
  animation-timing-function: cubic-bezier(0.25, 0.1, 0.25, 1);
}

/* Letter reveal animation */
@keyframes letter-in {
  from { opacity: 0; transform: translateY(0.35em); filter: blur(4px); }
  to { opacity: 1; transform: translateY(0); filter: blur(0); }
}

.letter-reveal > span > span {
  display: inline-block;
  opacity: 0;
  animation: letter-in 620ms var(--ease-out) forwards;
  will-change: transform, opacity, filter;
}

/* Link underline from left */
.link-underline {
  position: relative;
  display: inline-block;
}
.link-underline::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -2px;
  height: 1px;
  background: currentColor;
  transform-origin: left;
  transform: scaleX(0);
  transition: transform 380ms var(--ease-out);
}
.link-underline:hover::after { transform: scaleX(1); }

/* Sidenote (Tufte) */
.sidenote {
  float: right;
  clear: right;
  width: 18rem;
  margin-right: -20rem;
  margin-top: 0.3rem;
  font-family: var(--f-ui);
  font-size: 0.82rem;
  line-height: 1.5;
  color: color-mix(in oklch, currentColor 65%, transparent);
}
.sidenote-number {
  font-family: var(--f-ui);
  font-size: 0.7em;
  vertical-align: super;
  cursor: help;
  padding: 0 0.1em;
}
@media (max-width: 1100px) {
  .sidenote { float: none; width: auto; margin: 0.6rem 0 1.1rem 0; padding-left: 0.9rem; border-left: 1px solid currentColor; }
}

/* Marginalia anchor */
.marginalia {
  font-family: var(--f-ui);
  font-size: 0.78rem;
  line-height: 1.45;
  letter-spacing: 0.01em;
}

/* Math block */
.math-block {
  font-family: "KaTeX_Main", "Source Serif 4", serif;
  font-size: 1.05em;
  padding: 0.8rem 0;
  text-align: center;
  font-style: italic;
}

/* Figure caption */
figure { margin: 2.4rem 0; }
figcaption {
  font-family: var(--f-ui);
  font-size: 0.82rem;
  line-height: 1.5;
  color: color-mix(in oklch, currentColor 55%, transparent);
  margin-top: 0.6rem;
}

/* Utility */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); border: 0;
}

::selection { background: #B85C3C; color: #F4ECDD; }
body { transition: background 600ms cubic-bezier(0.25, 0.1, 0.25, 1); }

/* Touch & accessibility — global (any viewport) */
* { -webkit-tap-highlight-color: transparent; }
:focus-visible { outline: 2px solid #1F3DBF; outline-offset: 2px; border-radius: 1px; }
.skip-link {
  position: absolute; left: 0.5rem; top: -100px;
  padding: 0.5rem 0.9rem; background: #0F1320; color: #F2F1EC;
  font-family: var(--f-ui); font-size: 13px; font-weight: 500;
  z-index: 100; transition: top 180ms var(--ease-out);
}
.skip-link:focus { top: 0.5rem; }

/* Press feedback on touch — opacity-only, no layout shift */
@media (hover: none) {
  a:active, button:active { opacity: 0.55; transition: opacity 80ms; }
}

/* ========== RESPONSIVE — phones (≤ 768px) ==========
   Strategy: tag desktop 12-col grids with .v4-grid (auto-stacks on mobile),
   tag rails-to-disappear with .v4-rail-hide. !important needed because layout
   grids are set via inline JSX styles. */
@media (max-width: 768px) {
  body { font-size: 18px; line-height: 1.65; }

  /* Stack any 12-col grid on mobile */
  .v4-grid { grid-template-columns: 1fr !important; gap: 1.2rem !important; }
  .v4-grid > * { grid-column: 1 / -1 !important; text-align: left !important; position: static !important; max-width: 100% !important; }

  /* Hide rails entirely (IndexRail, right-side cite/sources, fig.01 summary) */
  .v4-rail-hide { display: none !important; }

  /* Pull-quote: lose the negative margin that pushes off the viewport */
  .pull-quote { margin: 2rem 0 !important; padding-left: 1rem !important; font-size: 1.5rem !important; }
  blockquote { margin-left: 0 !important; margin-right: 0 !important; }

  /* Drop-cap: smaller on narrow */
  .drop-cap::first-letter { font-size: 4em !important; padding: 0.06em 0.1em 0 0 !important; }

  /* Display headlines: tighter on mobile */
  h2.display { font-size: clamp(1.35rem, 5.5vw, 1.9rem) !important; }

  /* Diagram + legend pairs: stack on mobile */
  .v4-diagram-pair { grid-template-columns: 1fr !important; gap: 1rem !important; }

  /* Diagram captions + axis labels — bump from 9-10px → 11px on mobile */
  .v4-diagram-pair text { font-size: 11px !important; }
  .v4-diagram-pair .mono { font-size: 11px !important; }

  /* Sliders + buttons inside diagrams: bigger touch targets */
  .v4-diagram-pair input[type="range"] { height: 28px; accent-color: #1F3DBF; }
  .v4-diagram-pair input[type="range"]::-webkit-slider-thumb { width: 22px; height: 22px; }
  .v4-diagram-pair input[type="range"]::-moz-range-thumb { width: 22px; height: 22px; border: none; }
  .v4-diagram-pair button { min-height: 32px; }

  /* Tap-target audit — scoped: nav, footer, mono, caps. Doesn't touch inline prose links. */
  nav a, footer a, .mono a, .caps a { min-height: 32px; display: inline-flex; align-items: center; }
}

<script>
// Preview asset auth: forward the iframe's `?t=...` token to relative
// asset requests so the served files don't 401.
(function () {
  try {
    const url = new URL(location.href);
    const token = url.searchParams.get("t");
    if (!token) return;
    const append = (src) => {
      if (!src) return src;
      if (/^([a-z]+:|data:|blob:|#|\/)/i.test(src)) return src;
      const sep = src.includes("?") ? "&" : "?";
      return src + sep + "t=" + encodeURIComponent(token);
    };
    // patch existing <img> tags as soon as they appear
    const patch = (img) => {
      const raw = img.getAttribute("src");
      if (raw && !raw.includes("t=" + token)) img.src = append(raw);
    };
    new MutationObserver((muts) => {
      muts.forEach(m => m.addedNodes.forEach(n => {
        if (n.nodeType !== 1) return;
        if (n.tagName === "IMG") patch(n);
        n.querySelectorAll && n.querySelectorAll("img").forEach(patch);
      }));
    }).observe(document.documentElement, { subtree: true, childList: true });
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll("img").forEach(patch);
    });
  } catch (e) { console.warn("token shim:", e); }
})();
</script>

<body>
<div id="root"></div>
<script type="text/babel">


/* ===== components/motif.jsx ===== */
/* global React */
const { useEffect, useRef, useState } = React;

/* =======================================================================
   FourierMotif
   Live physics: a chain of rotating circles (epicycles) tracing a target
   shape. Visible trails. Pencil-stroke aesthetic, not CAD.
   Props:
     shape: "hex" | "orion" | "initials"
     size: px
     strokeColor
     trailColor
     density: N of circles (fewer = looser hand-drawn feel)
     speed: 0..1
     cursorReactive: bool  (nudges phase based on cursor distance)
     pausedWhileReading: bool
   ======================================================================= */

// --- target paths as signed-distance samples -> Fourier DFT coefficients ---
function samplePath(shape, N = 256) {
  const pts = [];
  if (shape === "hex") {
    // H3 hexagon (pointy-top) with gentle handwobble
    for (let i = 0; i < N; i++) {
      const t = i / N;
      // walk 6 edges
      const edge = Math.floor(t * 6);
      const u = (t * 6) - edge;
      const a1 = (edge / 6) * Math.PI * 2 - Math.PI / 2;
      const a2 = ((edge + 1) / 6) * Math.PI * 2 - Math.PI / 2;
      const r = 1 + (Math.sin(t * Math.PI * 12) * 0.012); // subtle wobble
      const x1 = Math.cos(a1) * r, y1 = Math.sin(a1) * r;
      const x2 = Math.cos(a2) * r, y2 = Math.sin(a2) * r;
      pts.push({ x: x1 + (x2 - x1) * u, y: y1 + (y2 - y1) * u });
    }
  } else if (shape === "orion") {
    // Stylized Orion constellation as polyline segments (Betelgeuse, Bellatrix,
    // belt stars Alnitak/Alnilam/Mintaka, Saiph, Rigel). We trace a closed loop
    // through them with bezier-like interpolation for motif feel.
    const stars = [
      [0.55,-0.95],[-0.55,-0.85],[-0.55,-0.15],[-0.12,-0.05],[0.22,0.05],
      [0.55,0.15],[0.75,0.85],[-0.65,0.95],[-0.35,0.3],[0.38,0.35]
    ];
    for (let i = 0; i < N; i++) {
      const t = i / N * stars.length;
      const k = Math.floor(t) % stars.length;
      const nk = (k + 1) % stars.length;
      const u = t - Math.floor(t);
      const s = u * u * (3 - 2 * u); // smoothstep
      pts.push({
        x: stars[k][0] + (stars[nk][0] - stars[k][0]) * s,
        y: stars[k][1] + (stars[nk][1] - stars[k][1]) * s,
      });
    }
  } else if (shape === "initials") {
    // "SS" stylized single-stroke, walked along a figure-eight-ish path
    for (let i = 0; i < N; i++) {
      const t = i / N;
      const a = t * Math.PI * 2;
      const r = 0.95;
      pts.push({
        x: r * Math.sin(a) * (1 - 0.35 * Math.cos(a * 2)),
        y: r * Math.sin(a * 2) * 0.7,
      });
    }
  } else {
    for (let i = 0; i < N; i++) {
      const a = (i / N) * Math.PI * 2;
      pts.push({ x: Math.cos(a), y: Math.sin(a) });
    }
  }
  return pts;
}

function dft(samples) {
  const N = samples.length;
  const out = [];
  for (let k = 0; k < N; k++) {
    let re = 0, im = 0;
    for (let n = 0; n < N; n++) {
      const phi = (2 * Math.PI * k * n) / N;
      re += samples[n].x * Math.cos(phi) + samples[n].y * Math.sin(phi);
      im += samples[n].y * Math.cos(phi) - samples[n].x * Math.sin(phi);
    }
    re /= N; im /= N;
    const freq = k <= N / 2 ? k : k - N;
    const amp = Math.sqrt(re * re + im * im);
    const phase = Math.atan2(im, re);
    out.push({ freq, amp, phase });
  }
  out.sort((a, b) => b.amp - a.amp);
  return out;
}

function FourierMotif({
  shape = "hex",
  size = 260,
  strokeColor = "currentColor",
  trailColor,
  epicycleColor,
  density = 18,
  speed = 0.08,
  cursorReactive = true,
  paused = false,
  className = "",
  style = {},
}) {
  const canvasRef = useRef(null);
  const rafRef = useRef(0);
  const cursorRef = useRef({ x: 0.5, y: 0.5, near: 0 });
  const tRef = useRef(0);
  const trailRef = useRef([]);
  const reduced = useRef(false);

  useEffect(() => {
    reduced.current = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);

    const samples = samplePath(shape, 256);
    const coefs = dft(samples).slice(0, density);

    const cx = size / 2, cy = size / 2;
    const radius = size * 0.36;

    function handleCursor(e) {
      if (!cursorReactive) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      const dx = x - 0.5, dy = y - 0.5;
      const dist = Math.sqrt(dx * dx + dy * dy);
      cursorRef.current = { x, y, near: Math.max(0, 1 - dist * 1.8) };
    }
    window.addEventListener("mousemove", handleCursor);

    function draw() {
      const t = tRef.current;
      ctx.clearRect(0, 0, size, size);

      // subtle paper noise via blend
      ctx.save();

      // epicycle chain
      let x = cx, y = cy;
      const near = cursorRef.current.near;
      const phaseBoost = near * 0.4;

      ctx.lineWidth = 0.6;
      ctx.strokeStyle = epicycleColor || "rgba(0,0,0,0.14)";

      for (let i = 0; i < coefs.length; i++) {
        const c = coefs[i];
        const theta = c.freq * t * speed + c.phase + phaseBoost * (i / coefs.length);
        const r = c.amp * radius;
        const nx = x + Math.cos(theta) * r;
        const ny = y + Math.sin(theta) * r;
        if (i > 0) {
          // circle outline (epicycle)
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.stroke();
          // arm
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(nx, ny);
          ctx.stroke();
        }
        x = nx; y = ny;
      }

      // append trail point (x,y) is the tip
      trailRef.current.push({ x, y });
      if (trailRef.current.length > 420) trailRef.current.shift();

      // draw trail with pencil-like texture: varied alpha + width
      ctx.lineCap = "round";
      const trail = trailRef.current;
      for (let i = 1; i < trail.length; i++) {
        const a = i / trail.length;
        ctx.strokeStyle = trailColor || `rgba(0,0,0,${0.18 + a * 0.55})`;
        ctx.lineWidth = 0.9 + a * 1.3;
        ctx.beginPath();
        ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
        ctx.lineTo(trail[i].x, trail[i].y);
        ctx.stroke();
      }

      // tip dot
      ctx.fillStyle = strokeColor;
      ctx.beginPath();
      ctx.arc(x, y, 1.8, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      if (!paused && !reduced.current) {
        tRef.current += 1;
      }
      rafRef.current = requestAnimationFrame(draw);
    }

    draw();

    return () => {
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener("mousemove", handleCursor);
    };
  }, [shape, size, density, speed, cursorReactive, paused, strokeColor, trailColor, epicycleColor]);

  return (
    <canvas
      ref={canvasRef}
      width={size}
      height={size}
      className={className}
      style={{ width: size, height: size, display: "block", ...style }}
      aria-hidden="true"
    />
  );
}

/* =======================================================================
   DoublePendulum - small, top-corner, chalk-feel
   ======================================================================= */
function DoublePendulum({ size = 140, strokeColor = "currentColor", style = {} }) {
  const canvasRef = useRef(null);
  const stateRef = useRef({ a1: Math.PI / 2, a2: Math.PI / 2 + 0.2, w1: 0, w2: 0 });
  const trailRef = useRef([]);
  const rafRef = useRef(0);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);

    const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const L1 = size * 0.22, L2 = size * 0.22, m1 = 1, m2 = 1, g = 0.4;
    const cx = size / 2, cy = size * 0.38;

    function step() {
      const s = stateRef.current;
      // equations of motion
      const num1 = -g * (2 * m1 + m2) * Math.sin(s.a1);
      const num2 = -m2 * g * Math.sin(s.a1 - 2 * s.a2);
      const num3 = -2 * Math.sin(s.a1 - s.a2) * m2 * (s.w2 * s.w2 * L2 + s.w1 * s.w1 * L1 * Math.cos(s.a1 - s.a2));
      const den = L1 * (2 * m1 + m2 - m2 * Math.cos(2 * s.a1 - 2 * s.a2));
      const a1acc = (num1 + num2 + num3) / den;

      const num4 = 2 * Math.sin(s.a1 - s.a2);
      const num5 = s.w1 * s.w1 * L1 * (m1 + m2) + g * (m1 + m2) * Math.cos(s.a1) + s.w2 * s.w2 * L2 * m2 * Math.cos(s.a1 - s.a2);
      const den2 = L2 * (2 * m1 + m2 - m2 * Math.cos(2 * s.a1 - 2 * s.a2));
      const a2acc = (num4 * num5) / den2;

      s.w1 += a1acc * 0.18; s.w2 += a2acc * 0.18;
      s.w1 *= 0.9996; s.w2 *= 0.9996;
      s.a1 += s.w1 * 0.18; s.a2 += s.w2 * 0.18;
    }

    function draw() {
      const s = stateRef.current;
      const x1 = cx + L1 * Math.sin(s.a1);
      const y1 = cy + L1 * Math.cos(s.a1);
      const x2 = x1 + L2 * Math.sin(s.a2);
      const y2 = y1 + L2 * Math.cos(s.a2);

      trailRef.current.push({ x: x2, y: y2 });
      if (trailRef.current.length > 180) trailRef.current.shift();

      ctx.clearRect(0, 0, size, size);
      // trail
      ctx.lineCap = "round";
      for (let i = 1; i < trailRef.current.length; i++) {
        const a = i / trailRef.current.length;
        ctx.strokeStyle = `rgba(0,0,0,${0.08 + a * 0.35})`;
        ctx.lineWidth = 0.7 + a;
        ctx.beginPath();
        ctx.moveTo(trailRef.current[i - 1].x, trailRef.current[i - 1].y);
        ctx.lineTo(trailRef.current[i].x, trailRef.current[i].y);
        ctx.stroke();
      }
      // rods
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.moveTo(cx, cy); ctx.lineTo(x1, y1); ctx.lineTo(x2, y2);
      ctx.stroke();
      // masses
      ctx.fillStyle = strokeColor;
      ctx.beginPath(); ctx.arc(x1, y1, 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x2, y2, 2.8, 0, Math.PI * 2); ctx.fill();
      // pivot
      ctx.beginPath(); ctx.arc(cx, cy, 1.6, 0, Math.PI * 2); ctx.fill();

      if (!reduced) step();
      rafRef.current = requestAnimationFrame(draw);
    }
    draw();
    return () => cancelAnimationFrame(rafRef.current);
  }, [size, strokeColor]);

  return <canvas ref={canvasRef} width={size} height={size} style={{ width: size, height: size, display: "block", ...style }} aria-hidden="true" />;
}

/* =======================================================================
   WaveField - subtle interference reacting to cursor
   ======================================================================= */
function WaveField({ width = 720, height = 260, color = "currentColor", style = {}, density = 60 }) {
  const canvasRef = useRef(null);
  const rafRef = useRef(0);
  const mouseRef = useRef({ x: width / 2, y: height / 2, active: 0 });

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);
    const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function handle(e) {
      const r = canvas.getBoundingClientRect();
      mouseRef.current = { x: e.clientX - r.left, y: e.clientY - r.top, active: 1 };
    }
    canvas.addEventListener("mousemove", handle);
    canvas.addEventListener("mouseleave", () => (mouseRef.current.active = 0));

    let t = 0;
    function draw() {
      ctx.clearRect(0, 0, width, height);
      ctx.strokeStyle = color;
      ctx.lineWidth = 0.8;
      const cols = density;
      const rows = Math.floor(density * (height / width));
      const sx = width / (cols - 1);
      const sy = height / (rows - 1);
      const mx = mouseRef.current.x, my = mouseRef.current.y;

      for (let j = 0; j < rows; j++) {
        ctx.beginPath();
        for (let i = 0; i < cols; i++) {
          const x = i * sx;
          const y0 = j * sy;
          const dx = x - mx, dy = y0 - my;
          const d = Math.sqrt(dx * dx + dy * dy);
          const pulse = Math.cos(d * 0.09 - t * 0.1) * (12 / (1 + d * 0.03)) * mouseRef.current.active;
          const baseWave = Math.sin((i + j) * 0.5 + t * 0.04) * 1.6;
          const y = y0 + baseWave + pulse;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.globalAlpha = 0.25 + 0.45 * (j / rows);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      if (!reduced) t += 1;
      rafRef.current = requestAnimationFrame(draw);
    }
    draw();
    return () => { cancelAnimationFrame(rafRef.current); canvas.removeEventListener("mousemove", handle); };
  }, [width, height, color, density]);

  return <canvas ref={canvasRef} width={width} height={height} style={{ width, height, display: "block", ...style }} aria-hidden="true" />;
}

Object.assign(window, { FourierMotif, DoublePendulum, WaveField });


/* ===== components/quantum-cat.jsx ===== */
/* global React */
/* =======================================================================
   SchrödingerCat
   A real two-state quantum system rendered as a single-line cat.

   Math:
     |ψ⟩ = α|alive⟩ + β|dead⟩    with |α|² + |β|² = 1
     α, β ∈ ℂ   (we track real + imag parts so phase is real)

   Free evolution:  Hamiltonian H = (ℏω/2) σ_x  (a small Rabi rotation),
   so amplitudes oscillate between |alive⟩ and |dead⟩ — the box rocks
   between life and death over ~12s when nobody is looking.

   "Observation" (mouse hover/down on the box):
     We perform continuous weak measurement. Each frame we pull the
     state vector toward whichever pointer is currently winning, with a
     measurement strength k that scales with how long you've held.
     A small stochastic kick decides which outcome you get — biased by
     the live |α|², |β|². Releasing the cursor restores unitary
     evolution (the cat re-superposes).

   Visual:
     We draw both cats simultaneously as single-line strokes; their
     opacities are exactly |α|² and |β|².  When the system is in true
     superposition both are ~50% visible — the cat is *literally both*.
     A live wavefunction trace runs along the box floor (Re(ψ) and
     Im(ψ) as two phasors).  A meter at the bottom reads the live
     probabilities to two decimals.
   ======================================================================= */

// useEffect/useRef/useState are imported by motif.jsx at top of bundle

// --- complex helpers ---
function cmul(a, b) { return { re: a.re * b.re - a.im * b.im, im: a.re * b.im + a.im * b.re }; }
function cadd(a, b) { return { re: a.re + b.re, im: a.im + b.im }; }
function cscale(a, s) { return { re: a.re * s, im: a.im * s }; }
function cabs2(a) { return a.re * a.re + a.im * a.im; }

function SchrodingerCat({
  width = 260,
  height = 220,
  strokeColor = "currentColor",
  mutedColor = "rgba(0,0,0,0.35)",
  accentColor = "#3F4B7E",
  paperColor = "transparent",
  onStateChange,
}) {
  const svgRef = useRef(null);
  const stateRef = useRef({
    alpha: { re: 1 / Math.SQRT2, im: 0 },
    beta:  { re: 1 / Math.SQRT2, im: 0 },
    measureStrength: 0,   // 0 = unitary, 1 = projective
    pointerNear: 0,       // 0..1 — proximity / hold strength
    collapsedTo: null,    // 'alive' | 'dead' | null
    holdTime: 0,
    lastT: performance.now(),
    psiTrace: [],         // history of (Re α, Im α, Re β, Im β)
  });
  const [, force] = useState(0); // rerender driver
  const [ariaState, setAriaState] = useState("superposed");

  // pointer handling — proximity, click, hold
  const interactRef = useRef({ inside: false, down: false });
  useEffect(() => {
    const svg = svgRef.current;
    if (!svg) return;
    const onEnter = () => { interactRef.current.inside = true; };
    const onLeave = () => { interactRef.current.inside = false; interactRef.current.down = false; };
    const onDown = () => { interactRef.current.down = true; };
    const onUp = () => { interactRef.current.down = false; };
    const onMove = (e) => {
      const r = svg.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width;
      const y = (e.clientY - r.top) / r.height;
      const dx = x - 0.5, dy = y - 0.5;
      const dist = Math.sqrt(dx * dx + dy * dy);
      stateRef.current.pointerNear = Math.max(0, 1 - dist * 1.6);
    };
    svg.addEventListener("mouseenter", onEnter);
    svg.addEventListener("mouseleave", onLeave);
    svg.addEventListener("mousedown", onDown);
    window.addEventListener("mouseup", onUp);
    svg.addEventListener("mousemove", onMove);
    // touch
    const onTouchStart = () => { interactRef.current.inside = true; interactRef.current.down = true; };
    const onTouchEnd = () => { interactRef.current.down = false; interactRef.current.inside = false; };
    svg.addEventListener("touchstart", onTouchStart, { passive: true });
    svg.addEventListener("touchend", onTouchEnd);
    return () => {
      svg.removeEventListener("mouseenter", onEnter);
      svg.removeEventListener("mouseleave", onLeave);
      svg.removeEventListener("mousedown", onDown);
      window.removeEventListener("mouseup", onUp);
      svg.removeEventListener("mousemove", onMove);
      svg.removeEventListener("touchstart", onTouchStart);
      svg.removeEventListener("touchend", onTouchEnd);
    };
  }, []);

  // simulation loop
  useEffect(() => {
    let raf = 0;
    const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function tick(now) {
      const s = stateRef.current;
      let dt = (now - s.lastT) / 1000;
      s.lastT = now;
      if (dt > 0.1) dt = 0.1;

      // --- target measurement strength based on interaction ---
      let target = 0;
      if (interactRef.current.down) target = 1;
      else if (interactRef.current.inside) target = 0.45;
      else target = s.pointerNear * 0.18;

      // hold time grows the longer you're pressing — increases collapse rate
      if (interactRef.current.down) s.holdTime = Math.min(2, s.holdTime + dt);
      else s.holdTime = Math.max(0, s.holdTime - dt * 0.8);

      s.measureStrength += (target - s.measureStrength) * Math.min(1, dt * 4);

      // --- 1. Unitary evolution under H = (ω/2) σ_x ---
      // d/dt |ψ⟩ = -i H |ψ⟩
      // For σ_x: dα/dt = -i (ω/2) β,   dβ/dt = -i (ω/2) α
      const omega = 0.55; // rad/s — slow, contemplative
      const dAlpha = cscale(cmul({ re: 0, im: -omega / 2 }, s.beta), dt);
      const dBeta  = cscale(cmul({ re: 0, im: -omega / 2 }, s.alpha), dt);
      let alpha = cadd(s.alpha, dAlpha);
      let beta  = cadd(s.beta, dBeta);

      // also a tiny phase precession on each (σ_z term) for visual life
      const phaseRot = (theta) => ({ re: Math.cos(theta), im: Math.sin(theta) });
      alpha = cmul(alpha, phaseRot(0.7 * dt));
      beta  = cmul(beta,  phaseRot(-0.4 * dt));

      // --- 2. Continuous weak measurement (Lindblad-ish, simplified) ---
      // If we're observing, push the state toward an eigenstate of σ_z
      // with strength k. Pick which eigenstate stochastically each frame
      // weighted by the live probabilities — this is faithful to weak
      // measurement (a quantum trajectory).
      const k = s.measureStrength;
      if (k > 0.01) {
        const pA = cabs2(alpha), pB = cabs2(beta);
        // outcome — sample once we've passed a threshold
        if (k > 0.94 && s.collapsedTo === null) {
          s.collapsedTo = Math.random() < pA / (pA + pB) ? "alive" : "dead";
        }
        // pull amplitudes
        const targetState = s.collapsedTo || (pA > pB ? "alive" : "dead");
        const pull = k * dt * 6;
        if (targetState === "alive") {
          alpha = cscale(alpha, 1 + pull);
          beta  = cscale(beta, 1 - pull);
        } else {
          alpha = cscale(alpha, 1 - pull);
          beta  = cscale(beta, 1 + pull);
        }
      } else {
        s.collapsedTo = null;
      }

      // --- 3. Renormalize so |α|² + |β|² = 1 ---
      const norm = Math.sqrt(cabs2(alpha) + cabs2(beta));
      if (norm > 0) {
        alpha = cscale(alpha, 1 / norm);
        beta  = cscale(beta, 1 / norm);
      }

      s.alpha = alpha;
      s.beta = beta;

      // record trace for the wavefunction strip
      s.psiTrace.push({ aRe: alpha.re, aIm: alpha.im, bRe: beta.re, bIm: beta.im });
      if (s.psiTrace.length > 80) s.psiTrace.shift();

      // aria — only update when category changes
      const pA = cabs2(alpha);
      const newAria = pA > 0.97 ? "alive" : pA < 0.03 ? "dead" : "superposed";
      if (s._lastAria !== newAria) {
        s._lastAria = newAria;
        setAriaState(newAria);
      }
      // throttle parent state-change callbacks to 4Hz
      s._lastReport = s._lastReport || 0;
      if (now - s._lastReport > 250) {
        if (onStateChange) onStateChange({ pAlive: pA, pDead: 1 - pA, observed: k > 0.5 });
        s._lastReport = now;
      }

      // throttle re-render to 30Hz
      s._lastFrame = s._lastFrame || 0;
      if (now - s._lastFrame > 33) {
        force(n => (n + 1) % 1024);
        s._lastFrame = now;
      }
      if (!reduced) raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []); // eslint-disable-line

  const s = stateRef.current;
  const pA = cabs2(s.alpha);
  const pB = 1 - pA;
  const observing = s.measureStrength > 0.4;
  const certain = pA > 0.97 || pB > 0.97;

  // --- rendering ---
  const W = width, H = height;
  const boxX = 18, boxY = 18, boxW = W - 36, boxH = H - 70;

  return (
    <div style={{ position: "relative", width, fontFamily: "var(--f-ui)", fontSize: 11 }}>
      <svg
        ref={svgRef}
        width={W}
        height={H}
        viewBox={`0 0 ${W} ${H}`}
        style={{ display: "block", cursor: observing ? "grabbing" : "grab", touchAction: "none", userSelect: "none" }}
        role="img"
        aria-label={`Schrödinger's cat — currently ${ariaState}. Click and hold to observe.`}
      >
        {/* background */}
        {paperColor !== "transparent" && <rect x="0" y="0" width={W} height={H} fill={paperColor} />}

        {/* probability cloud — only visible when superposed */}
        <ProbabilityCloud x={boxX} y={boxY} w={boxW} h={boxH} pA={pA} pB={pB} observing={observing} accent={accentColor} />

        {/* dashed observation box (the literal box) */}
        <rect
          x={boxX} y={boxY} width={boxW} height={boxH}
          fill="none"
          stroke={mutedColor}
          strokeWidth="1"
          strokeDasharray={observing ? "0" : "4 3"}
          style={{ transition: "stroke-dasharray 240ms ease" }}
        />
        {/* corner ticks */}
        {[[boxX,boxY],[boxX+boxW,boxY],[boxX,boxY+boxH],[boxX+boxW,boxY+boxH]].map(([x,y],i)=>(
          <g key={i} stroke={strokeColor} strokeWidth="1">
            <line x1={x-3} y1={y} x2={x+3} y2={y} />
            <line x1={x} y1={y-3} x2={x} y2={y+3} />
          </g>
        ))}

        {/* the cats themselves — both drawn, opacities are |α|² and |β|² */}
        <g transform={`translate(${boxX + boxW/2 - 60}, ${boxY + boxH/2 - 40})`}>
          <CatGlyph state="alive" stroke={pA > 0.5 ? strokeColor : accentColor} opacity={pA} />
          <CatGlyph state="dead"  stroke={pB > 0.5 ? strokeColor : accentColor} opacity={pB} />
        </g>

        {/* wavefunction trace — Re(α) and Im(α) over time, runs along the floor */}
        <PsiTrace trace={s.psiTrace} x={boxX} y={H - 38} w={boxW} h={20} stroke={accentColor} muted={mutedColor} />

        {/* hold ring — appears while measuring */}
        {observing && (
          <circle cx={boxX + boxW/2} cy={boxY + boxH/2} r={Math.max(boxW, boxH) * 0.42}
                  fill="none" stroke={accentColor} strokeOpacity={s.measureStrength * 0.5}
                  strokeWidth="0.8" strokeDasharray="2 4" style={{ pointerEvents: "none" }} />
        )}
      </svg>

      {/* meter */}
      <div className="mono" style={{ display: "grid", gridTemplateColumns: "auto 1fr auto", gap: 6, alignItems: "center", color: mutedColor, fontSize: 10, marginTop: 2, padding: "0 18px" }}>
        <span>P(alive) {pA.toFixed(2)}</span>
        <span style={{ display: "block", height: 4, background: "rgba(0,0,0,0.06)", position: "relative" }}>
          <span style={{ position: "absolute", inset: 0, width: `${pA * 100}%`, background: pA > 0.5 ? strokeColor : accentColor, transition: "background 200ms ease" }} />
          <span style={{ position: "absolute", left: "50%", top: -2, bottom: -2, width: 1, background: mutedColor, opacity: 0.6 }} />
        </span>
        <span>P(dead) {pB.toFixed(2)}</span>
      </div>

      {/* status line */}
      <div className="mono" style={{ marginTop: 6, padding: "0 18px", color: mutedColor, fontSize: 10, display: "flex", justifyContent: "space-between" }}>
        <span>|ψ⟩ = α|alive⟩ + β|dead⟩</span>
        <span style={{ color: certain ? strokeColor : accentColor }}>
          {observing ? (certain ? `collapsed → ${pA > 0.5 ? "alive" : "dead"}` : "observing…") : "unitary"}
        </span>
      </div>
      <div className="mono" style={{ padding: "2px 18px 0", color: mutedColor, fontSize: 10, opacity: 0.7 }}>
        click + hold the box to open it
      </div>
    </div>
  );
}

/* ----- cat glyphs: single-stroke SVG paths -----
   Both fit in a 120×80 area. I drew these by hand to keep the
   "fourier motif" aesthetic — one continuous stroke each. */

function CatGlyph({ state, stroke, opacity }) {
  // alive: standing, ears up, tail up, eye open, whiskers
  const alive = "M 14 60 C 14 50 18 44 22 42 C 18 38 18 30 22 26 C 24 30 28 34 32 36 C 40 30 56 30 64 36 C 68 34 72 30 74 26 C 78 30 78 38 74 42 C 78 44 82 50 82 60 L 82 64 L 14 64 Z M 82 60 C 92 56 100 48 104 38 M 36 44 C 38 46 40 46 42 44 M 60 44 C 62 46 64 46 66 44 M 30 50 L 22 50 M 30 52 L 22 54 M 66 50 L 74 50 M 66 52 L 74 54 M 46 52 L 50 56 L 54 52";
  // dead: lying flat, X eyes, tail down, tongue out (subtle)
  const dead = "M 8 56 C 8 50 14 46 22 46 C 26 42 32 40 38 40 C 50 38 64 40 76 44 C 86 46 96 50 100 56 C 100 60 96 62 92 62 L 14 62 C 10 62 8 60 8 56 Z M 30 50 L 36 54 M 36 50 L 30 54 M 60 50 L 66 54 M 66 50 L 60 54 M 44 56 L 48 58 M 100 56 C 102 58 104 60 104 64";
  return (
    <g style={{ opacity, transition: "opacity 80ms linear" }}>
      <path d={state === "alive" ? alive : dead} fill="none" stroke={stroke} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" />
    </g>
  );
}

/* ----- probability cloud: noisy speckle inside the box, density ∝ uncertainty ----- */
function ProbabilityCloud({ x, y, w, h, pA, pB, observing, accent }) {
  // uncertainty H(p) = -p log p - (1-p) log(1-p), max 1 at p=0.5
  const eps = 1e-6;
  const H = -(pA * Math.log2(pA + eps) + pB * Math.log2(pB + eps));
  const N = Math.floor(H * 80); // up to ~80 dots
  const dots = [];
  // deterministic-ish noise so it shimmers but doesn't seizure
  const t = Math.floor(performance.now() / 80);
  for (let i = 0; i < N; i++) {
    const seed = i * 9301 + 49297 + t;
    const rx = ((seed * 1103515245 + 12345) % 2147483647) / 2147483647;
    const ry = ((seed * 1664525 + 1013904223) % 2147483647) / 2147483647;
    dots.push({ x: x + rx * w, y: y + ry * h, r: 0.6 + (rx + ry) * 0.6, a: 0.18 + ry * 0.45 });
  }
  return (
    <g style={{ opacity: observing ? 0.25 : 1, transition: "opacity 240ms ease" }}>
      {dots.map((d, i) => (
        <circle key={i} cx={d.x} cy={d.y} r={d.r} fill={accent} fillOpacity={d.a * H} />
      ))}
    </g>
  );
}

/* ----- ψ trace: shows Re(α) and Re(β) as two oscillating lines ----- */
function PsiTrace({ trace, x, y, w, h, stroke, muted }) {
  if (trace.length < 2) return null;
  const N = trace.length;
  const px = (i) => x + (i / (N - 1)) * w;
  const py = (v) => y + h / 2 - v * (h / 2 - 1);
  const aPath = trace.map((p, i) => `${i === 0 ? "M" : "L"} ${px(i).toFixed(1)} ${py(p.aRe).toFixed(1)}`).join(" ");
  const bPath = trace.map((p, i) => `${i === 0 ? "M" : "L"} ${px(i).toFixed(1)} ${py(p.bRe).toFixed(1)}`).join(" ");
  return (
    <g>
      <line x1={x} x2={x + w} y1={y + h/2} y2={y + h/2} stroke={muted} strokeWidth="0.5" strokeDasharray="2 3" />
      <path d={aPath} fill="none" stroke={stroke} strokeWidth="0.9" strokeOpacity="0.55" />
      <path d={bPath} fill="none" stroke={stroke} strokeWidth="0.9" strokeOpacity="0.25" strokeDasharray="2 2" />
    </g>
  );
}

function SeasonalSpecimen({ width = 200, height = 180, accent = "#1F3DBF", ink = "#0F1320", muted = "#6E7488", line = "#D5D6DC" }) {

  React.useEffect(() => {

    const loop = (now) => {

      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);

  const theme = SEASONAL_THEMES[month];
  const monthName = new Date(2026, month, 1).toLocaleString("en", { month: "long" });

      </svg>

        {theme.why}

  );
}

const SPECIMEN_VARIANTS = {
  quantum: ({ w, h, t, accent, muted, line }) => {
    const N = 70, tau = t * 0.05, pts = [];
    for (let i = 0; i < N; i++) {

// Custom cursor - small warm dot, scales near interactive elements, morphs to I-beam over prose
function CustomCursor({ color = "#B85C3C" }) {
  const dotRef = useRef(null);
  const [mode, setMode] = useState("default"); // default | link | text | hidden
  const pos = useRef({ x: 0, y: 0 });
  const target = useRef({ x: 0, y: 0 });
  const rafRef = useRef(0);

  useEffect(() => {
    if ("ontouchstart" in window) return; // desktop only
    const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    function onMove(e) {
      target.current.x = e.clientX;
      target.current.y = e.clientY;
      const el = document.elementFromPoint(e.clientX, e.clientY);
      if (!el) { setMode("default"); return; }
      const interactive = el.closest("a, button, [role='button'], input, textarea, select, label");
      const prose = el.closest(".prose, p, h1, h2, h3, li, blockquote");
      if (interactive) setMode("link");
      else if (prose) setMode("text");
      else setMode("default");
    }
    function tick() {
      const lag = reduced ? 1 : 0.22;
      pos.current.x += (target.current.x - pos.current.x) * lag;
      pos.current.y += (target.current.y - pos.current.y) * lag;
      if (dotRef.current) {
        dotRef.current.style.transform = `translate3d(${pos.current.x}px, ${pos.current.y}px, 0)`;
      }
      rafRef.current = requestAnimationFrame(tick);
    }
    window.addEventListener("mousemove", onMove);
    rafRef.current = requestAnimationFrame(tick);
    return () => { window.removeEventListener("mousemove", onMove); cancelAnimationFrame(rafRef.current); };
  }, []);

  if (typeof window !== "undefined" && "ontouchstart" in window) return null;

  const size = mode === "link" ? 22 : mode === "text" ? 2 : 10;
  const width = mode === "text" ? 2 : size;
  const height = mode === "text" ? 22 : size;

  return (
    <div
      ref={dotRef}
      style={{
        position: "fixed", top: 0, left: 0,
        width, height,
        marginLeft: -width / 2, marginTop: -height / 2,
        background: color,
        borderRadius: mode === "text" ? 0 : "50%",
        mixBlendMode: "multiply",
        pointerEvents: "none",
        zIndex: 9999,
        transition: "width 240ms var(--ease-spring), height 240ms var(--ease-spring), border-radius 240ms var(--ease-out), background 180ms ease, opacity 180ms",
      }}
    />
  );
}

// Letter-by-letter reveal on mount (once per session)
function LetterReveal({ children, className = "", delay = 0, stagger = 28, as: Tag = "span" }) {
  const text = typeof children === "string" ? children : "";
  return (
    <Tag className={`letter-reveal ${className}`} aria-label={text}>
      {text.split("").map((ch, i) => (
        <span
          key={i}
          aria-hidden="true"
          style={{ animationDelay: `${delay + i * stagger}ms` }}
        >
          {ch === " " ? "\u00A0" : ch}
        </span>
      ))}
    </Tag>
  );
}

// A link that reveals a tiny signature flourish on hover (used in prose cards)
function FlourishLink({ href, onClick, children, color = "currentColor", flourish = "dot" }) {
  return (
    <a href={href} onClick={onClick} className="flourish-link" style={{ position: "relative", display: "inline-flex", alignItems: "center", gap: "0.35em" }}>
      <span className="link-underline">{children}</span>
      <span className="flourish" style={{
        display: "inline-block",
        width: 8, height: 8,

        transition: "opacity 260ms var(--ease-out), transform 320ms var(--ease-out)",

}

// Reading ruler (proportional bar) - appears during article scroll
function ReadingRuler({ color = "currentColor", enabled = true }) {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    if (!enabled) return;
    function onScroll() {
      const doc = document.documentElement;
      const total = doc.scrollHeight - window.innerHeight;
      setProgress(total > 0 ? Math.min(1, Math.max(0, window.scrollY / total)) : 0);
    }
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, [enabled]);
  if (!enabled) return null;
  return (
    <div aria-hidden="true" style={{ position: "fixed", left: 24, top: 24, bottom: 24, width: 16, display: "flex", flexDirection: "column", alignItems: "center", gap: 6, zIndex: 80, pointerEvents: "none", opacity: progress > 0.01 ? 1 : 0, transition: "opacity 320ms var(--ease-out)" }}>
      {Array.from({ length: 22 }).map((_, i) => {
        const k = i / 21;
        const active = k <= progress;
        return <div key={i} style={{ width: active ? 14 : 7, height: 1, background: color, opacity: active ? 0.9 : 0.25, transition: "width 220ms var(--ease-out), opacity 220ms" }} />;
      })}
    </div>
  );
}

// Fade + rise-in when entering viewport
function ScrollReveal({ children, delay = 0, y = 16, as: Tag = "div", style = {}, className = "" }) {
  const ref = useRef(null);
  const [on, setOn] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setOn(true); obs.disconnect(); } }, { threshold: 0.12 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <Tag ref={ref} className={className} style={{
      transform: on ? "translateY(0)" : `translateY(${y}px)`,
      opacity: on ? 1 : 0,
      transitionDelay: `${delay}ms`,
      transition: "transform 620ms var(--ease-out), opacity 620ms var(--ease-out)",
      ...style
    }}>{children}</Tag>
  );
}

// Variable-font weight that responds to cursor proximity
function HoverWeight({ children, as: Tag = "span", base = 400, hover = 700, className = "", style = {} }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    function onMove(e) {
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      const dx = e.clientX - cx, dy = e.clientY - cy;
      const d = Math.sqrt(dx * dx + dy * dy);
      const maxDist = 280;
      const t = Math.max(0, 1 - d / maxDist);
      const w = base + (hover - base) * t;
      el.style.fontVariationSettings = `"opsz" 144, "wght" ${w.toFixed(0)}, "SOFT" 50`;
    }
    window.addEventListener("mousemove", onMove);
    return () => window.removeEventListener("mousemove", onMove);
  }, [base, hover]);
  return <Tag ref={ref} className={className} style={style}>{children}</Tag>;
}

// Now-strip (lightweight, page-agnostic, color-in-context)
function NowStrip({ palette }) {

    <div className="now-strip" style={{ fontFamily: "var(--f-ui)", fontSize: 13, lineHeight: 1.6, display: "grid", gridTemplateColumns: "auto 1fr", gap: "1.2rem", alignItems: "start", color: palette.muted }}>

        </span>
      </div>

  );
}

const { useEffect: useEff, useRef: useR, useState: useS } = React;

function Article({ slug, palette, onNavigate, setCursorColor }) {

        <div className="ui caps" style={{ color: p.accent, marginBottom: "1.2rem" }}>Essay · Physics &amp; skating · Spring 2026</div>
        <h1 className="display" style={{ fontSize: "clamp(3.4rem, 8vw, 7.2rem)", margin: 0, fontWeight: 380, lineHeight: 0.94, letterSpacing: "-0.025em" }}>
          <LetterReveal stagger={32}>Edges</LetterReveal>
        </h1>
        <p style={{ fontSize: "1.35rem", lineHeight: 1.5, marginTop: "1.6rem", maxWidth: "44ch", color: p.muted, fontStyle: "italic" }}>
          Why figure skating is applied physics, and what a single millimeter of steel teaches me about precision.
        </p>
        <div style={{ marginTop: "2rem", display: "flex", gap: "2.4rem", alignItems: "center", fontFamily: "var(--f-ui)", fontSize: 13, color: p.muted, flexWrap: "wrap" }}>
          <span><span style={{ color: p.ink }}>Shubhangi Sharma</span> · April 2026</span>
          <span>7 minute read</span>
          <span className="mono">~ 1,840 words</span>
        </div>
      </header>

      {/* Body — column with hanging marginalia */}
      <article className="prose" style={{ maxWidth: 1100, margin: "0 auto", padding: "2rem 2rem 4rem", position: "relative" }}>
        <div style={{ maxWidth: "64ch", marginLeft: "min(120px, 6%)" }}>

          <p className="drop-cap" style={{ fontSize: "1.18rem", lineHeight: 1.72, margin: "0 0 1.2rem" }}>
            An edge is a single millimeter of steel in contact with ice. Shift your ankle by two degrees and you are tracing a different curve.<span className="sidenote-number" style={{ color: p.accent }}>1</span> Lean too far and you fall.
            <span className="sidenote">
              <strong style={{ color: p.accent }}>1.</strong> Two degrees is not a metaphor. The blade has an inside edge and an outside edge, separated by a hollow ground into the steel — typically <span className="mono">7/16″</span>. Most of the geometry of a turn is determined by which edge is loaded.
            </span>
            The whole sport rests on this: sharpened metal and the physics of yielding surfaces.
          </p>

          <p>
            When I started skating seriously, I stopped being able to read papers the same way. Every figure became a shape I could trace with my boot. A Fourier decomposition is just a bunch of circles teaching a curve how to remember itself. Gradient descent is a skater finding the low spot in a rink after the Zamboni.
          </p>

          <p>
            You don't need to see physics in skating to skate. But once you do, the ice feels like paper, and every jump is a sentence you are writing in real time — punctuation included.
          </p>

          <PullQuote color={p.accent}>
            A Fourier decomposition is just a bunch of circles teaching a curve how to remember itself.
          </PullQuote>

          <h2 className="display" style={{ fontSize: "2rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem" }}>Edges are vectors</h2>

          <p>
            The first thing a coach will tell you is to stop thinking about feet and start thinking about <em>edges</em>. There are four of them on a pair of skates: left inside, left outside, right inside, right outside.<span className="sidenote-number" style={{ color: p.accent }}>2</span>
            <span className="sidenote">
              <strong style={{ color: p.accent }}>2.</strong> "Edge" is also a verb in the sport. To <em>edge</em> a turn is to commit a specific edge to the ice; it implies intention, not just contact.
            </span>
            Each one is a half-vector. They have a direction (forward or backward) and a sign (inside or outside the curve). Skating is the practice of composing these eight things into legible sentences.
          </p>

          {/* Scrollytelling figure — interactive: which edge → which curve */}
          <Figure caption="Figure 1 · The four primary edges. Hover an edge to see the curve it traces." palette={p}>
            <EdgeDiagram palette={p} />
          </Figure>

          <p>
            The math is genuinely useful. A turn on an outside edge is a circular arc whose radius is set by the lean angle of the ankle and the speed at which you arrive. <span className="mono" style={{ background: "rgba(0,0,0,0.04)", padding: "0 4px" }}>r = v² / (g · tan θ)</span>. You memorize this without ever being told it; you call it "the feeling of a deep edge".
          </p>

          <h2 className="display" style={{ fontSize: "2rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem" }}>The Fourier of a figure</h2>

          <p>
            In the old days of the sport — and the reason it is still called <em>figure</em> skating — competitors would trace shapes in the ice and be judged on how close two repetitions of the same shape lay to each other. The compulsory figures.<span className="sidenote-number" style={{ color: p.accent }}>3</span>
            <span className="sidenote">
              <strong style={{ color: p.accent }}>3.</strong> Removed from competition in 1990. The sport has not entirely recovered from the trade.
            </span>
            A figure is a closed curve. A closed curve, decomposed in the Fourier sense, is a sum of rotating circles. Which means a perfect figure-eight is, mathematically, a particular cocktail of circular motions. Which means the body of a skater performing one is, in some honest sense, a low-dimensional analog computer for a Fourier series.
          </p>

          <Figure caption="Figure 2 · A Fourier reconstruction of a figure-eight, 1 to 14 epicycles. The motif at left is the same approximation, animated." palette={p}>
            <FourierFigure palette={p} />
          </Figure>

          <p>
            I am not saying skaters are doing math while they skate. I am saying skating is a physical proof that math is a language the body already speaks; we just translate it into chalk and Greek letters and call it a different thing.
          </p>

          <PullQuote color={p.accent}>
            Skating is a physical proof that math is a language the body already speaks.
          </PullQuote>

          <h2 className="display" style={{ fontSize: "2rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem" }}>What the ice teaches</h2>

          <p>
            What I have learned, and have tried to bring back to my work as an engineer, is this: precision is not severity. A bracket turn is precise. It is also forgiving — the ice gives, the boot gives, the ankle gives. You make a small adjustment ten times rather than a large one once.
          </p>

          <p>
            I have started writing software the same way. Tighten the loop. Make the smallest adjustment you can detect. Let the system tell you when you are leaning too far. Trust the surface to push back.
          </p>

          <p style={{ marginTop: "2.4rem", color: p.muted, fontStyle: "italic" }}>
            — written between two practice sessions at Streatham, on a Tuesday.
          </p>

        </div>

        {/* Marginalia rail (fixed-position note that moves with reading) */}
      </article>

      {/* End matter */}
      <section style={{ maxWidth: 760, margin: "0 auto", padding: "2rem 2rem 4rem", borderTop: `1px solid ${p.line}` }}>
        <div className="ui caps" style={{ color: p.muted, marginBottom: "1rem" }}>Read next</div>

}

function PullQuote({ children, color }) {
  return (
    <blockquote style={{ margin: "3rem -2rem", padding: "1rem 2rem", borderLeft: `2px solid ${color}`, fontFamily: "var(--f-display)", fontSize: "1.95rem", lineHeight: 1.2, fontStyle: "italic", fontVariationSettings: '"opsz" 144, "SOFT" 100, "wght" 320', color: "inherit", textWrap: "balance" }}>
      {children}
    </blockquote>

}

function Figure({ children, caption, palette }) {
  const ref = useR(null);
  const [on, setOn] = useS(false);
  useEff(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setOn(true); }, { threshold: 0.3 });
    obs.observe(el); return () => obs.disconnect();
  }, []);
  return (
    <figure ref={ref} style={{ margin: "2.4rem -3rem", transform: on ? "translateY(0)" : "translateY(20px)", opacity: on ? 1 : 0, transition: "all 720ms var(--ease-out)" }}>
      <div style={{ background: "rgba(0,0,0,0.025)", padding: "1.4rem", border: `1px solid ${palette.line}` }}>
        {children}
      </div>
      <figcaption style={{ marginLeft: "1.4rem" }}>{caption}</figcaption>
    </figure>
  );
}

function EdgeDiagram({ palette }) {
  const [hover, setHover] = useS(null);
  const p = palette;
  const edges = [
    { id: "lo", label: "Left Outside", color: p.accent, path: "M 60 100 C 100 60, 200 60, 240 100" },
    { id: "li", label: "Left Inside", color: p.muted, path: "M 60 140 C 100 180, 200 180, 240 140" },
    { id: "ro", label: "Right Outside", color: p.accent, path: "M 320 100 C 360 60, 460 60, 500 100", reverse: true },
    { id: "ri", label: "Right Inside", color: p.muted, path: "M 320 140 C 360 180, 460 180, 500 140", reverse: true },
  ];
  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "1rem", alignItems: "center" }}>
      <svg viewBox="0 0 560 260" style={{ width: "100%", height: 240 }}>
        <line x1="20" y1="120" x2="540" y2="120" stroke={p.muted} strokeDasharray="3 4" opacity="0.5" />
        {edges.map(e => (
          <g key={e.id} onMouseEnter={() => setHover(e.id)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }}>
            <path d={e.path} fill="none" stroke={hover === e.id ? p.accent : e.color} strokeWidth={hover === e.id ? 2.4 : 1.4} strokeLinecap="round" style={{ transition: "all 240ms var(--ease-out)" }} />
            {/* skate marker */}
            <circle cx={e.id.startsWith("l") ? 60 : 320} cy={e.id.endsWith("o") ? 100 : 140} r="4" fill={e.color} />
          </g>

function usePreciseScroll() {
  const [pct, setPct] = React.useState(0);
  React.useEffect(() => {
    const onS = () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      setPct(max > 0 ? Math.round((window.scrollY / max) * 100) : 0);
    };
    window.addEventListener("scroll", onS, { passive: true });
    onS();
    return () => window.removeEventListener("scroll", onS);
  }, []);
  return pct;
}

function useIsMobile(breakpoint = 768) {
  const [isMobile, setIsMobile] = React.useState(() => typeof window !== "undefined" && window.innerWidth <= breakpoint);
  React.useEffect(() => {
    const mq = window.matchMedia(`(max-width: ${breakpoint}px)`);
    const onChange = (e) => setIsMobile(e.matches);
    setIsMobile(mq.matches);
    if (mq.addEventListener) mq.addEventListener("change", onChange);
    else mq.addListener(onChange);
    return () => {
      if (mq.removeEventListener) mq.removeEventListener("change", onChange);
      else mq.removeListener(onChange);
    };
  }, [breakpoint]);
  return isMobile;
}

function useIsTouch() {
  const [isTouch, setIsTouch] = React.useState(() => typeof window !== "undefined" && window.matchMedia && window.matchMedia("(hover: none)").matches);
  React.useEffect(() => {
    if (!window.matchMedia) return;
    const mq = window.matchMedia("(hover: none)");
    const onChange = (e) => setIsTouch(e.matches);
    setIsTouch(mq.matches);
    if (mq.addEventListener) mq.addEventListener("change", onChange);
    else mq.addListener(onChange);
    return () => {
      if (mq.removeEventListener) mq.removeEventListener("change", onChange);
      else mq.removeListener(onChange);
    };
  }, []);
  return isTouch;
}

function useViewportSize() {
  const [size, setSize] = React.useState(() => ({
    w: typeof window !== "undefined" ? window.innerWidth : 0,
    h: typeof window !== "undefined" ? window.innerHeight : 0,
  }));
  React.useEffect(() => {
    const onResize = () => setSize({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener("resize", onResize, { passive: true });
    onResize();
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return size;
}

function useCursorCoords() {
  const [coords, setCoords] = React.useState({ x: 0, y: 0 });
  React.useEffect(() => {
    let last = 0;
    const onMove = (e) => {
      const now = performance.now();
      if (now - last < 100) return; // 10Hz
      last = now;
      setCoords({ x: e.clientX, y: e.clientY });
    };
    window.addEventListener("mousemove", onMove, { passive: true });
    return () => window.removeEventListener("mousemove", onMove);
  }, []);
  return coords;
}

function useTelemetry() {
  // returns the [label, value] tuple to slot into IndexRail telemetry.
  // desktop → live cursor coords; touch → live viewport WxH (always fresh, no fake 0,0).
  const isTouch = useIsTouch();
  const coords = useCursorCoords();
  const viewport = useViewportSize();
  if (isTouch) {
    return ["viewport", `${String(viewport.w).padStart(4, "0")}×${String(viewport.h).padStart(4, "0")}`];
  }
  return ["cursor", `${String(coords.x).padStart(4, "0")}, ${String(coords.y).padStart(4, "0")}`];
}

function cursorTelemetry({ x, y }) {
  return ["cursor", `${String(x).padStart(4, "0")}, ${String(y).padStart(4, "0")}`];
}

function JayaSwarm({ palette: p }) {
  const [running, setRunning] = React.useState(true);
  const [popSize, setPopSize] = React.useState(30);
  const [crossover, setCrossover] = React.useState(0.4);
  const [seed, setSeed] = React.useState(1);
  const [pop, setPop] = React.useState(null);
  const [gen, setGen] = React.useState(0);

  // landscape: f(x, y) = -((x-0.7)^2 + (y-0.4)^2). Best at (0.7, 0.4) → fitness 0.
  const target = { x: 0.7, y: 0.4 };
  const fit = React.useCallback((c) => -((c.x - target.x) ** 2 + (c.y - target.y) ** 2), []);

  // (re)seed population whenever popSize or seed changes
  React.useEffect(() => {
    let s = seed * 9001 + 17;
    const r = () => { s = (s * 1103515245 + 12345) % 2147483647; return s / 2147483647; };
    const next = Array.from({ length: popSize }, () => ({ x: r(), y: r() }));
    setPop(next);
    setGen(0);
  }, [popSize, seed]);

  // step the JAYA + crossover update on a 90ms tick when running
  React.useEffect(() => {
    if (!running || !pop) return;
    const id = setInterval(() => {
      setPop(prev => {
        if (!prev) return prev;
        let bestI = 0, worstI = 0, bestF = -Infinity, worstF = Infinity;
        for (let i = 0; i < prev.length; i++) {
          const f = fit(prev[i]);
          if (f > bestF) { bestF = f; bestI = i; }
          if (f < worstF) { worstF = f; worstI = i; }
        }
        const xb = prev[bestI], xw = prev[worstI];
        return prev.map((c, i) => {
          // JAYA update on each coordinate
          const r1x = Math.random(), r2x = Math.random();
          const r1y = Math.random(), r2y = Math.random();
          let nx = c.x + r1x * (xb.x - Math.abs(c.x)) - r2x * (xw.x - Math.abs(c.x));
          let ny = c.y + r1y * (xb.y - Math.abs(c.y)) - r2y * (xw.y - Math.abs(c.y));
          // single-point crossover with a random partner, fired with probability `crossover`
          if (Math.random() < crossover) {
            const partner = prev[(i + 1 + Math.floor(Math.random() * (prev.length - 1))) % prev.length];
            // swap one coordinate at random
            if (Math.random() < 0.5) nx = partner.x; else ny = partner.y;
          }
          return {
            x: Math.max(0.02, Math.min(0.98, nx)),
            y: Math.max(0.02, Math.min(0.98, ny)),
          };
        });
      });
      setGen(g => g + 1);
    }, 90);
    return () => clearInterval(id);
  }, [running, pop, crossover, fit]);

  const W = 420, H = 260;
  const rings = [0.08, 0.18, 0.28, 0.4];
  const bestFitness = pop ? Math.max(...pop.map(fit)) : 0;
  const ctrlInputStyle = { width: "100%", accentColor: p.accent };
  const ctrlLabelStyle = { fontFamily: "var(--f-mono)", fontSize: 10, color: p.muted, letterSpacing: "0.04em", display: "flex", justifyContent: "space-between", marginBottom: 2 };
  const ctrlBlock = { marginBottom: 12 };

  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "1rem", alignItems: "start" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 240, background: `color-mix(in oklch, ${p.paper} 88%, white)`, border: `1px solid ${p.line}` }}>
        {rings.map((r, i) => (
          <ellipse key={i} cx={target.x * W} cy={(1 - target.y) * H} rx={r * W * 0.9} ry={r * H * 0.9} fill="none" stroke={p.muted} strokeOpacity={0.18} strokeDasharray="2 4" />
        ))}
        <circle cx={target.x * W} cy={(1 - target.y) * H} r="4" fill={p.accent} />
        <text x={target.x * W + 8} y={(1 - target.y) * H + 4} fontFamily="var(--f-mono)" fontSize="9" fill={p.accent}>x_b</text>
        {pop && pop.map((pt, i) => (
          <circle key={i} cx={pt.x * W} cy={(1 - pt.y) * H} r="3" fill={p.ink} opacity={0.7} style={{ transition: "all 240ms var(--ease-out)" }} />
        ))}
        <text x="10" y={H - 8} fontFamily="var(--f-ui)" fontSize="10" fill={p.muted} className="mono">gen {gen}</text>
      </svg>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 12, lineHeight: 1.5, color: p.ink }}>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 10 }}>Controls</div>

        <div style={ctrlBlock}>
          <div style={ctrlLabelStyle}><span>population</span><span style={{ color: p.ink }}>{popSize}</span></div>
          <input type="range" min={10} max={60} step={2} value={popSize} onChange={e => setPopSize(+e.target.value)} style={ctrlInputStyle} />
        </div>

        <div style={ctrlBlock}>
          <div style={ctrlLabelStyle}><span>crossover</span><span style={{ color: p.ink }}>{crossover.toFixed(2)}</span></div>
          <input type="range" min={0} max={1} step={0.05} value={crossover} onChange={e => setCrossover(+e.target.value)} style={ctrlInputStyle} />
        </div>

        <div style={{ display: "flex", gap: 6, marginTop: 14, marginBottom: 14 }}>
          <button onClick={() => setRunning(r => !r)} style={{ flex: 1, fontFamily: "var(--f-mono)", fontSize: 10, padding: "4px 6px", border: `1px solid ${p.line}`, background: "transparent", color: p.accent, cursor: "pointer", letterSpacing: "0.06em" }}>{running ? "PAUSE" : "RUN"}</button>
          <button onClick={() => setSeed(s => s + 1)} style={{ flex: 1, fontFamily: "var(--f-mono)", fontSize: 10, padding: "4px 6px", border: `1px solid ${p.line}`, background: "transparent", color: p.accent, cursor: "pointer", letterSpacing: "0.06em" }}>RESEED</button>
        </div>

        <div className="mono" style={{ borderTop: `1px solid ${p.line}`, paddingTop: 10, fontSize: 10, display: "grid", gridTemplateColumns: "auto 1fr", columnGap: 8, rowGap: 4, color: p.ink }}>
          <span style={{ color: p.muted }}>best f</span><span>{bestFitness.toFixed(4)}</span>
          <span style={{ color: p.muted }}>gen</span><span>{gen}</span>
        </div>
      </div>
    </div>
  );
}

function BiomarkerScatter({ palette: p }) {
  // intensities in 0..1, mapped to clinical units 0..10 for display
  const [tx, setTx] = React.useState(0.475); // CD4 threshold (clinical 4.39 ≈ 0.475)
  const [ty, setTy] = React.useState(0.475); // CD8 threshold (clinical 5.65 ≈ 0.475 in our normalised space)
  const [drag, setDrag] = React.useState(null); // "x" | "y" | null
  const svgRef = React.useRef(null);

  const cells = React.useMemo(() => {
    let s = 9;
    const r = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    const groups = [
      { range: [0.55, 0.95, 0.55, 0.95], n: 14, color: "#8B5A89" },
      { range: [0.55, 0.95, 0.05, 0.40], n: 18, color: "#5B7A4F" },
      { range: [0.05, 0.40, 0.55, 0.95], n: 16, color: p.accent },
      { range: [0.05, 0.40, 0.05, 0.40], n: 28, color: p.muted },
    ];
    const out = [];
    groups.forEach(g => {
      for (let i = 0; i < g.n; i++) {
        out.push({ x: g.range[0] + r() * (g.range[1] - g.range[0]), y: g.range[2] + r() * (g.range[3] - g.range[2]) });
      }
    });
    return out;
  }, [p.accent, p.muted]);

  // classify each cell against the live thresholds
  const classified = cells.map(c => ({ ...c, k: (c.x > tx ? 1 : 0) | ((c.y > ty ? 1 : 0) << 1) }));
  // counts: k = (cd4High) | (cd8High << 1) → 0=double-neg, 1=CD4+, 2=CD8+, 3=CD4+CD8+
  const counts = [0, 0, 0, 0];
  classified.forEach(c => counts[c.k]++);
  const total = classified.length;

  const W = 420, H = 320;
  const px = (v) => 50 + v * (W - 70);
  const py = (v) => H - 40 - v * (H - 70);
  const pxToV = (vp) => (vp - 50) / (W - 70);
  const pyToV = (vp) => 1 - (vp - py(1)) / (py(0) - py(1));

  const onPointer = (e) => {
    if (!drag || !svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const sx = ((e.clientX - rect.left) / rect.width) * W;
    const sy = ((e.clientY - rect.top) / rect.height) * H;
    if (drag === "x") setTx(Math.max(0.05, Math.min(0.95, pxToV(sx))));
    else if (drag === "y") setTy(Math.max(0.05, Math.min(0.95, pyToV(sy))));
  };

  const groups = [
    { k: 3, label: "CD4+ CD8+ (double-positive)", color: "#8B5A89" },
    { k: 1, label: "CD4+ only",                   color: "#5B7A4F" },
    { k: 2, label: "CD8+ only",                   color: p.accent },
    { k: 0, label: "double−",                     color: p.muted },
  ];

  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "1rem", alignItems: "start" }}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 280, cursor: drag ? "grabbing" : "default", userSelect: "none", touchAction: "none" }}
           onPointerMove={onPointer} onPointerUp={() => setDrag(null)} onPointerLeave={() => setDrag(null)} onPointerCancel={() => setDrag(null)}>
        <line x1={px(0)} y1={py(0)} x2={px(1)} y2={py(0)} stroke={p.muted} strokeWidth="1" />
        <line x1={px(0)} y1={py(0)} x2={px(0)} y2={py(1)} stroke={p.muted} strokeWidth="1" />
        <text x={px(1)} y={py(0) + 18} textAnchor="end" fontFamily="var(--f-ui)" fontSize="10" fill={p.muted}>CD4 expression →</text>
        <text x={px(0) - 6} y={py(1) - 4} textAnchor="end" fontFamily="var(--f-ui)" fontSize="10" fill={p.muted}>CD8 ↑</text>
        {classified.map((c, i) => {
          const fill = groups.find(g => g.k === c.k).color;
          return <circle key={i} cx={px(c.x)} cy={py(c.y)} r={3} fill={fill} opacity={0.85} style={{ transition: "fill 200ms" }} />;
        })}
        {/* draggable threshold lines (wider hit areas for touch) */}
        <line x1={px(tx)} y1={py(0)} x2={px(tx)} y2={py(1)} stroke={p.accent} strokeDasharray="4 3" strokeWidth="1.2" opacity="0.7" />
        <rect x={px(tx) - 14} y={py(0)} width={28} height={py(1) - py(0)} fill="transparent" style={{ cursor: "ew-resize", touchAction: "none" }} onPointerDown={(e) => { e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId); setDrag("x"); }} />
        {/* visible drag handle on the CD4 line */}
        <circle cx={px(tx)} cy={py(0.5)} r={6} fill={p.paper} stroke={p.accent} strokeWidth="1.5" pointerEvents="none" />
        <circle cx={px(tx)} cy={py(0.5)} r={2.5} fill={p.accent} pointerEvents="none" />
        <line x1={px(0)} y1={py(ty)} x2={px(1)} y2={py(ty)} stroke={p.accent} strokeDasharray="4 3" strokeWidth="1.2" opacity="0.7" />
        <rect x={px(0)} y={py(ty) - 14} width={px(1) - px(0)} height={28} fill="transparent" style={{ cursor: "ns-resize", touchAction: "none" }} onPointerDown={(e) => { e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId); setDrag("y"); }} />
        {/* visible drag handle on the CD8 line */}
        <circle cx={px(0.5)} cy={py(ty)} r={6} fill={p.paper} stroke={p.accent} strokeWidth="1.5" pointerEvents="none" />
        <circle cx={px(0.5)} cy={py(ty)} r={2.5} fill={p.accent} pointerEvents="none" />
        <text x={px(tx)} y={py(1) - 6} textAnchor="middle" fontFamily="var(--f-mono)" fontSize="9" fill={p.accent}>CD4 &gt; {(tx * 10).toFixed(2)}</text>
        <text x={px(0) - 6} y={py(ty) - 4} textAnchor="end" fontFamily="var(--f-mono)" fontSize="9" fill={p.accent}>CD8 &gt; {(ty * 10).toFixed(2)}</text>
      </svg>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 12, lineHeight: 1.55 }}>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 8 }}>Quadrants · drag the dashed lines</div>
        {groups.map(g => {
          const pct = total ? (counts[g.k] / total) * 100 : 0;
          return (
            <div key={g.k} style={{ padding: "5px 0", color: p.ink }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ width: 10, height: 10, borderRadius: "50%", background: g.color, flexShrink: 0 }} />
                <span style={{ flex: 1, fontSize: 11 }}>{g.label}</span>
                <span className="mono" style={{ fontSize: 10, color: p.muted }}>{counts[g.k]} · {pct.toFixed(0)}%</span>
              </div>
              <div style={{ height: 2, background: p.line, marginTop: 4, position: "relative" }}>
                <div style={{ position: "absolute", inset: 0, width: `${pct}%`, background: g.color, transition: "width 180ms var(--ease-out)" }} />
              </div>
            </div>
          );
        })}
        <div style={{ marginTop: 10, fontSize: 10, color: p.muted, lineHeight: 1.5 }}>Slide CD4 from 4.39 to 4.50 — the "double-positive" count drops by a fifth.</div>
      </div>
    </div>
  );
}

function ConsensusGrid({ palette: p }) {
  // three clustering methods over the same 8x8 patch, then a consensus blend
  const W = 480, H = 200;
  const cells = React.useMemo(() => {
    let s = 21;
    const r = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    return Array.from({ length: 64 }, (_, i) => ({ i, r: r(), s: r(), t: r() }));
  }, []);
  const methods = [
    { label: "Birch", pick: (c) => c.r > 0.62 ? 1 : c.r > 0.32 ? 2 : 0 },
    { label: "Agglomerative", pick: (c) => c.s > 0.58 ? 1 : c.s > 0.30 ? 2 : 0 },
    { label: "Spectral", pick: (c) => c.t > 0.60 ? 1 : c.t > 0.34 ? 2 : 0 },
  ];
  const palette3 = [p.muted, p.accent, "#8B5A89"];
  // consensus: majority vote across the three methods per cell
  const consensus = cells.map(c => {
    const votes = [0, 0, 0];
    methods.forEach(m => votes[m.pick(c)]++);
    let max = 0, idx = 0, agree = 0;
    votes.forEach((v, i) => { if (v > max) { max = v; idx = i; } });
    agree = max / 3;
    return { idx, agree };
  });
  const cell = 18, gap = 1;
  const grid = (offset, picker) => (
    <g transform={`translate(${offset}, 30)`}>
      {cells.map((c, i) => {
        const x = (i % 8) * (cell + gap);
        const y = Math.floor(i / 8) * (cell + gap);
        const k = picker(c);
        return <rect key={i} x={x} y={y} width={cell} height={cell} fill={palette3[k]} opacity={0.78} />;
      })}
    </g>
  );
  const consensusGrid = (offset) => (
    <g transform={`translate(${offset}, 30)`}>
      {cells.map((c, i) => {
        const x = (i % 8) * (cell + gap);
        const y = Math.floor(i / 8) * (cell + gap);
        const cn = consensus[i];
        return <rect key={i} x={x} y={y} width={cell} height={cell} fill={palette3[cn.idx]} opacity={0.4 + cn.agree * 0.6} />;
      })}
    </g>
  );
  const labels = ["Birch", "Agglomerative", "Spectral", "Consensus"];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 200 }}>
      {[0, 120, 240, 360].map((off, i) => (
        <g key={i}>
          <text x={off + 76} y={20} textAnchor="middle" fontFamily="var(--f-mono)" fontSize="10" fill={i === 3 ? p.accent : p.muted}>{labels[i]}</text>
          {i < 3 ? grid(off + 8, methods[i].pick) : consensusGrid(off + 8)}
        </g>
      ))}
      <text x="60" y={H - 6} fontFamily="var(--f-ui)" fontSize="9" fill={p.muted}>three views, then a vote — opacity = agreement</text>
    </svg>
  );
}

    "All Too Well (10 Min)", "Cruel Summer", "August", "Cardigan", "Anti-Hero",
    "Mirrorball", "Style", "Out of the Woods", "Champagne Problems", "The 1",
    "Daylight", "Exile", "Willow", "Lavender Haze",
  ];

  const songs = React.useMemo(() => {
    let s = 13;
    const r = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    const out = [];
    for (let i = 0; i < titles.length; i++) {
      const a = r() * Math.PI * 2;
      out.push({
        x: cx + Math.cos(a) * (radius + 50 + r() * 30),
        y: cy + Math.sin(a) * (radius + 40 + r() * 30),
        title: titles[i],
      });
    }
    return out;
  }, [cx, cy]);

  // each engine connects deterministically to a fixed subset of songs
  const linksByEngine = React.useMemo(() => Object.fromEntries(engines.map((e, ei) => {
    const set = new Set();
    for (let k = 0; k < 5; k++) set.add((ei * 3 + k * 2 + 1) % songs.length);
    return [e.id, [...set]];
  })), [songs.length]);

  // votes per song = count of currently-enabled engines that surface it
  const votes = songs.map((_, idx) => engines.reduce((acc, e) => acc + (enabled[e.id] && linksByEngine[e.id].includes(idx) ? 1 : 0), 0));

  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "1rem", alignItems: "start" }}>
      <div style={{ position: "relative" }}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 300, background: `color-mix(in oklch, ${p.paper} 88%, white)`, border: `1px solid ${p.line}` }}>
          {engines.map(e => {
            if (!enabled[e.id]) return null;
            const ex = cx + Math.cos(e.angle * Math.PI / 180) * radius;
            const ey = cy + Math.sin(e.angle * Math.PI / 180) * radius;
            return (
              <g key={e.id} style={{ transition: "opacity 240ms" }}>
                {linksByEngine[e.id].map((sIdx, j) => (
                  <line key={j} x1={ex} y1={ey} x2={songs[sIdx].x} y2={songs[sIdx].y} stroke={e.color} strokeWidth={votes[sIdx] >= 2 ? 1.4 : 0.6} strokeOpacity={hover === sIdx ? 0.9 : 0.45} />
                ))}
              </g>
            );
          })}
          <circle cx={cx} cy={cy} r="14" fill={p.paper} stroke={p.ink} strokeWidth="1.5" />
          <text x={cx} y={cy + 4} textAnchor="middle" fontFamily="var(--f-mono)" fontSize="9" fill={p.ink}>q</text>
          {engines.map(e => {
            const ex = cx + Math.cos(e.angle * Math.PI / 180) * radius;
            const ey = cy + Math.sin(e.angle * Math.PI / 180) * radius;
            const on = enabled[e.id];
            return (
              <g key={e.id} onClick={() => setEnabled(s => ({ ...s, [e.id]: !s[e.id] }))} style={{ cursor: "pointer", opacity: on ? 1 : 0.3, transition: "opacity 220ms" }}>
                <line x1={cx} y1={cy} x2={ex} y2={ey} stroke={p.muted} strokeOpacity={0.25} />
                <circle cx={ex} cy={ey} r="14" fill={on ? p.paper : "transparent"} stroke={e.color} strokeWidth="1.6" />
                <text x={ex} y={ey + 3} textAnchor="middle" fontFamily="var(--f-mono)" fontSize="8" fill={e.color}>{e.short}</text>
              </g>
            );
          })}
          {songs.map((s, i) => votes[i] === 0 ? null : (
            <g key={i} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }}>
              <circle cx={s.x} cy={s.y} r={votes[i] >= 2 ? 4.5 : 3} fill={votes[i] >= 2 ? p.accent : p.muted} opacity={hover === i ? 1 : 0.85} />
              {hover === i && <circle cx={s.x} cy={s.y} r={9} fill="none" stroke={p.accent} strokeWidth="1" strokeOpacity="0.6" />}
            </g>
          ))}
        </svg>
        <div className="mono" style={{ position: "absolute", left: 8, bottom: 8, fontSize: 10, color: hover === null ? p.muted : p.ink, padding: "2px 6px", background: `color-mix(in oklch, ${p.paper} 92%, white)`, border: `1px solid ${p.line}`, minWidth: 180 }}>
          {hover === null ? "hover a song · click an engine to toggle" : `♪ ${songs[hover].title} · ${votes[hover]}/${engines.filter(e => enabled[e.id]).length} surfaced`}
        </div>
      </div>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 12, lineHeight: 1.55 }}>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 8 }}>Engines · click to toggle</div>
        {engines.map(e => (
          <div key={e.id} onClick={() => setEnabled(s => ({ ...s, [e.id]: !s[e.id] }))} style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 0", cursor: "pointer", color: enabled[e.id] ? p.ink : p.muted, transition: "color 220ms" }}>
            <span style={{ width: 12, height: 12, border: `1px solid ${e.color}`, background: enabled[e.id] ? e.color : "transparent", flexShrink: 0, position: "relative" }} />
            <span style={{ flex: 1, fontSize: 11, textDecoration: enabled[e.id] ? "none" : "line-through" }}>{e.label}</span>
          </div>
        ))}
        <div style={{ marginTop: 10, fontSize: 10, color: p.muted, lineHeight: 1.5 }}>Filled songs = surfaced by ≥2 enabled engines. Toggle one off and the consensus shifts.</div>
      </div>
    </div>
  );
}
