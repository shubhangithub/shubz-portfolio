  const [weights, setWeights] = React.useState({ lyrics: 0.30, vae: 0.20, graph: 0.20, ncf: 0.15, ssl: 0.15 });
  const [hover, setHover] = React.useState(null);

  // synthetic song scores per engine (deterministic)
  const songs = React.useMemo(() => {
    let s = 77;
    const r = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    return [
      { title: "All Too Well (10 Min)", scores: { lyrics: 0.92, vae: 0.55, graph: 0.78, ncf: 0.60, ssl: 0.45 } },
      { title: "August",               scores: { lyrics: 0.65, vae: 0.88, graph: 0.50, ncf: 0.72, ssl: 0.80 } },
      { title: "Anti-Hero",            scores: { lyrics: 0.40, vae: 0.70, graph: 0.85, ncf: 0.90, ssl: 0.55 } },
      { title: "Cardigan",             scores: { lyrics: 0.85, vae: 0.75, graph: 0.42, ncf: 0.35, ssl: 0.68 } },
      { title: "Cruel Summer",         scores: { lyrics: 0.50, vae: 0.82, graph: 0.65, ncf: 0.78, ssl: 0.90 } },
      { title: "Mirrorball",           scores: { lyrics: 0.78, vae: 0.60, graph: 0.30, ncf: 0.42, ssl: 0.72 } },
    ];
  }, []);

  // compute ensemble score for each song
  const ranked = songs.map(song => {
    const total = Object.values(weights).reduce((a, b) => a + b, 0) || 1;
    const score = engineDefs.reduce((acc, e) => acc + (weights[e.id] / total) * song.scores[e.id], 0);
    // consensus boost: count engines with score > 0.6
    const surfaced = engineDefs.filter(e => song.scores[e.id] > 0.6).length;
    const boost = surfaced >= 2 ? 0.10 : 0;
    return { ...song, score: score + boost, surfaced };
  }).sort((a, b) => b.score - a.score);

  const sliderStyle = { width: "100%", height: 4 };

  return (
    <div className="v4-diagram-pair" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1rem", alignItems: "start" }}>
      <div>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 8 }}>Engine weights · drag to rebalance</div>
        {engineDefs.map(e => (
          <div key={e.id} style={{ marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "var(--f-mono)", fontSize: 10, color: p.muted, marginBottom: 2 }}>
              <span style={{ color: e.color }}>{e.label}</span>
              <span style={{ color: p.ink }}>{weights[e.id].toFixed(2)}</span>
            </div>
            <input type="range" min={0} max={0.5} step={0.01} value={weights[e.id]} onChange={ev => setWeights(w => ({ ...w, [e.id]: +ev.target.value }))} style={{ ...sliderStyle, accentColor: e.color }} />
          </div>
        ))}
        <div className="mono" style={{ fontSize: 9, color: p.muted, marginTop: 4 }}>final_score = Σ w_i · s_i + consensus_boost</div>
      </div>
      <div>
        <div className="caps mono" style={{ color: p.muted, fontSize: 10, letterSpacing: "0.1em", marginBottom: 8 }}>Ranking · updates live</div>
        {ranked.map((song, i) => {
          const isHov = hover === song.title;
          return (
            <div key={song.title} onMouseEnter={() => setHover(song.title)} onMouseLeave={() => setHover(null)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", borderBottom: `1px solid ${p.line}`, cursor: "pointer", transition: "background 200ms", background: isHov ? `color-mix(in oklch, ${p.accent} 6%, transparent)` : "transparent" }}>
              <span className="mono" style={{ fontSize: 10, color: p.muted, width: 16 }}>{i + 1}</span>
              <span style={{ flex: 1, fontFamily: "var(--f-ui)", fontSize: 11, color: p.ink, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{song.title}</span>
              <span className="mono" style={{ fontSize: 10, color: p.accent }}>{song.score.toFixed(2)}</span>
            </div>
          );
        })}
        {hover && (() => {
          const song = songs.find(s => s.title === hover);
          if (!song) return null;
          return (
            <div style={{ marginTop: 8, fontSize: 10, color: p.muted, lineHeight: 1.5, fontFamily: "var(--f-ui)" }}>
              {engineDefs.map(e => (
                <span key={e.id} style={{ marginRight: 8 }}>
                  <span style={{ color: e.color }}>{e.label}</span>
                  <span className="mono" style={{ marginLeft: 3 }}>{song.scores[e.id].toFixed(2)}</span>
                </span>
              ))}
            </div>
          );
        })()}
        {!hover && <div style={{ marginTop: 8, fontSize: 10, color: p.muted, lineHeight: 1.5 }}>Hover a song to see per-engine scores. Drag a weight to watch the ranking shift.</div>}
      </div>
    </div>
  );
}

function TrendSignalFlow({ palette: p }) {
  const [t, setT] = React.useState(0);
  React.useEffect(() => {
    const id = setInterval(() => setT(v => (v + 1) % 200), 60);
    return () => clearInterval(id);
  }, []);
  const W = 520, H = 280;
  const sources = [
    { id: "gt",   label: "Google Trends",     color: p.accent },
    { id: "bs",   label: "Bluesky firehose", color: "#8B5A89" },
    { id: "pt",   label: "Pinterest trends", color: "#5B7A4F" },
    { id: "rd",   label: "Reddit mentions",  color: "#C68A4F" },
    { id: "yt",   label: "YouTube volume",   color: "#4F7A8B" },
  ];
  // synthetic signal lines per source
  const path = (i, phase) => {
    const points = [];
    for (let x = 0; x <= 200; x += 4) {
      const y = 30 + i * 36
        + Math.sin((x + phase) * 0.06 + i) * 6
        + Math.sin((x + phase) * 0.13 + i * 1.7) * 3.5;
      points.push(`${x === 0 ? "M" : "L"} ${20 + x} ${y}`);
    }
    return points.join(" ");
  };
  // composite + forecast
  const compositePath = () => {
    const points = [];
    const baseY = 100;
    for (let x = 0; x <= 320; x += 4) {
      const sumOsc = sources.reduce((acc, _, i) => acc + Math.sin((x + t * 2) * 0.05 + i * 1.3) * (i % 2 ? 5 : 4), 0);
      // upward trend + oscillation
      const trend = x * 0.18;
      const y = baseY + sumOsc - trend * 0.25;
      points.push(`${x === 0 ? "M" : "L"} ${240 + x * 0.5} ${y + 30}`);
    }
    return points.join(" ");
  };
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: "0.5rem" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 260 }}>
        {/* source lanes */}
        {sources.map((s, i) => (
          <g key={s.id}>
            <text x="10" y={36 + i * 36} fontFamily="var(--f-ui)" fontSize="10" fill={s.color} textAnchor="start">{s.label}</text>
            <path d={path(i, t * 2)} stroke={s.color} strokeWidth="1.4" fill="none" opacity={0.75} />
          </g>
        ))}
        {/* merge bracket */}
        <path d={`M 220 30 L 240 130 L 220 230`} stroke={p.muted} strokeWidth="1" fill="none" opacity={0.5} strokeDasharray="3 3" />
        {/* composite + forecast */}
        <line x1="395" y1="20" x2="395" y2={H - 30} stroke={p.muted} strokeDasharray="2 4" opacity="0.4" />
        <text x="395" y="14" textAnchor="middle" fontFamily="var(--f-mono)" fontSize="9" fill={p.muted}>now</text>
        <text x={395 + 40} y={H - 14} fontFamily="var(--f-mono)" fontSize="9" fill={p.accent}>→ 30-day forecast</text>
        <path d={compositePath()} stroke={p.accent} strokeWidth="1.8" fill="none" />
        {/* moving pulse on composite */}
        <circle r="3" fill={p.accent}>
          <animateMotion dur="3s" repeatCount="indefinite" path={compositePath()} />
        </circle>
      </svg>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 11, color: p.muted, textAlign: "center" }}>five sources → composite → Holt-Winters forecast</div>
    </div>
  );
}

function LMSRPriceCurve({ palette: p }) {
  const W = 460, H = 240;
  const b = 100; // liquidity parameter
  const [q, setQ] = React.useState(0);
  const [view, setView] = React.useState("price"); // "price" | "cost"
  const [dragging, setDragging] = React.useState(false);
  const svgRef = React.useRef(null);

  // marginal price (probability of YES) — sigmoid in q
  const price = (q) => 1 / (1 + Math.exp(-q / b));
  // log-cost C(q) = b · ln(e^{q/b} + 1). Normalised by 4b for plot scale.
  const cost = (q) => (b * Math.log(Math.exp(q / b) + 1)) / (4 * b);
  const f = view === "price" ? price : cost;

  const left = 40, right = W - 30, top = 30, bottom = H - 40;
  const qMin = -200, qMax = 400;
  const xToPx = (x) => left + ((x - qMin) / (qMax - qMin)) * (right - left);
  const pxToQ = (px) => qMin + ((px - left) / (right - left)) * (qMax - qMin);
  const yToPx = (y) => bottom - y * (bottom - top);

  const pts = [];
  for (let qi = qMin; qi <= qMax; qi += 5) {
    pts.push(`${qi === qMin ? "M" : "L"} ${xToPx(qi)} ${yToPx(f(qi))}`);
  }

  const onPointer = (e) => {
    if (!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const px = ((e.clientX - rect.left) / rect.width) * W;
    setQ(Math.max(qMin, Math.min(qMax, Math.round(pxToQ(px)))));
  };
  const onDown = (e) => { setDragging(true); onPointer(e); };
  const onMove = (e) => { if (dragging) onPointer(e); };
  const onUp = () => setDragging(false);

  const cursorY = yToPx(f(q));
  const cursorX = xToPx(q);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 6, marginBottom: 6, fontFamily: "var(--f-mono)", fontSize: 10 }}>
        {[["price", "marginal price"], ["cost", "log-cost"]].map(([id, label]) => (
          <button key={id} onClick={() => setView(id)} style={{ all: "unset", cursor: "pointer", padding: "2px 8px", border: `1px solid ${view === id ? p.accent : p.line}`, color: view === id ? p.accent : p.muted, letterSpacing: "0.04em" }}>{label}</button>
        ))}
      </div>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 240, cursor: dragging ? "grabbing" : "grab", userSelect: "none", touchAction: "none" }}
           onPointerDown={(e) => { e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId); onDown(e); }}
           onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp} onPointerCancel={onUp}>
        <line x1={left} y1={bottom} x2={right} y2={bottom} stroke={p.muted} strokeWidth="1" />
        <line x1={left} y1={top} x2={left} y2={bottom} stroke={p.muted} strokeWidth="1" />
        {view === "price" && <line x1={left} y1={yToPx(0.5)} x2={right} y2={yToPx(0.5)} stroke={p.muted} strokeDasharray="3 4" opacity="0.4" />}
        <text x={right} y={bottom + 16} textAnchor="end" fontFamily="var(--f-ui)" fontSize="10" fill={p.muted}>net YES shares (q) →</text>
        <text x={left - 6} y={top - 6} textAnchor="end" fontFamily="var(--f-ui)" fontSize="10" fill={p.muted}>{view === "price" ? "price (probability)" : "log-cost (norm.)"}</text>
        {view === "price" && <text x={left - 6} y={yToPx(0.5) + 4} textAnchor="end" fontFamily="var(--f-mono)" fontSize="9" fill={p.muted}>0.5</text>}
        <path d={pts.join(" ")} stroke={p.accent} strokeWidth="2" fill="none" />

        {/* draggable cursor line + marker */}
        <line x1={cursorX} y1={top} x2={cursorX} y2={bottom} stroke={p.ink} strokeWidth="0.6" strokeDasharray="2 3" opacity="0.5" />
        <circle cx={cursorX} cy={cursorY} r="5" fill={p.accent} stroke={p.paper} strokeWidth="1.5" />

        <text x={right - 4} y={top + 14} textAnchor="end" fontFamily="var(--f-mono)" fontSize="9" fill={p.muted}>LMSR · b = {b}</text>
        <g fontFamily="var(--f-mono)" fontSize="10">
          <text x={cursorX + 8} y={cursorY - 10} fill={p.ink}>q = {q}</text>
          <text x={cursorX + 8} y={cursorY + 4} fill={p.muted}>{view === "price" ? `p = ${price(q).toFixed(3)}` : `C̃ = ${cost(q).toFixed(3)}`}</text>
        </g>
      </svg>
    </div>
  );
}

function JayaEssay({ palette: p }) {
  return (
    <>
      <p className="drop-cap" style={{ fontSize: "1.18rem", lineHeight: 1.72, margin: "0 0 1.2rem" }}>
        The thing they don't tell you about a "parameter-free" optimizer is that it has no parameters because <em>you</em> haven't added them yet.<span className="sidenote-number" style={{ color: p.accent }}>1</span> JAYA — Sanskrit for victory, named by R. Venkata Rao in 2016 — needs only a population size and a stopping rule, and that minimalism is exactly what makes it interesting to break.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>1.</strong> "Parameter-free" almost always means "the parameters are baked in." It's a design choice you cannot tune, which is a parameter pretending to be a virtue.
        </span>
      </p>

      <p>In the summer of 2022 I was a research intern with Prof. Jayaraman Valadi at FLAME University, working on feature selection for protein-function identification with four other students.<span className="sidenote-number" style={{ color: p.accent }}>2</span> The task: given a dataset with hundreds of attributes per protein, find the small subset that carries maximum information — and discard the rest before the classifier overfits on noise. JAYA had a reputation for being good at this kind of stochastic search. We wanted to know if a couple of targeted modifications could push it further.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>2.</strong> The other four were Nandini Gandhi, Oom Rawat, Hrushikesh Bhosale, and Aamod Sane. The poster ended up listing all of us — feature-selection work isn't really a one-person sport.
        </span>
      </p>

      <PullQuote color={p.accent}>"Parameter-free" almost always means the parameters are baked in.</PullQuote>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§01</span>
        <span>JAYA, briefly</span>
      </h2>

      <p>JAYA's update rule fits in a tweet. For each candidate <span className="mono">x_i</span> in the population, you nudge it toward the current best <span className="mono">x_b</span> and away from the current worst <span className="mono">x_w</span>:</p>

      <p style={{ textAlign: "center", margin: "1.4rem 0", fontFamily: "var(--f-mono)", fontSize: "0.95rem", color: p.ink, padding: "0.8rem", border: `1px dashed ${p.line}`, background: `color-mix(in oklch, ${p.paper} 80%, white)` }}>
        x_i' = x_i + r₁ (x_b − |x_i|) − r₂ (x_w − |x_i|)
      </p>

      <p>where <span className="mono">r₁</span> and <span className="mono">r₂</span> are uniform random in <span className="mono">[0,1]</span>. That's it. No inertia term. No crossover rate. No mutation rate. The only knobs are how many candidates and how long to run.<span className="sidenote-number" style={{ color: p.accent }}>3</span> This is an honestly good design.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>3.</strong> Compared with PSO (which needs an inertia weight, a cognitive coefficient, and a social coefficient) or GA (crossover rate, mutation rate, selection scheme), JAYA is dramatically less fiddly to set up. You can run it in twenty lines of Python.
        </span>
      </p>

      <p>It is also a design that throws away most of what genetic algorithms learned in the 1970s about searching combinatorial spaces. Crossover lets two candidates trade genes. Mutation prevents premature convergence on a local optimum. JAYA replaces both with "be more like the best, less like the worst," which is closer to gradient descent than evolution.</p>

      <Figure caption="A 14-candidate JAYA population on a smooth landscape. The cluster moves toward the marked optimum each generation; nothing else is doing the work." palette={p}>
        <JayaSwarm palette={p} />
      </Figure>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§02</span>
        <span>Two modifications</span>
      </h2>

      <p>Our modifications were aimed at two things the original JAYA doesn't account for when doing feature selection.</p>

      <p>First, <strong>the fitness function</strong>. Vanilla JAYA, used for feature selection, will happily score a 50-feature subset and a 5-feature subset on accuracy alone — and accuracy almost always rewards more features, at least until the classifier overfits and falls off the cliff. We defined a fitness function that characterises the trade-off between subset size and accuracy, so the algorithm is rewarded for finding smaller subsets that still classify well. This was the modification that did the most work.</p>

      <Figure caption="Feature selection as a trade-off: each dot is a candidate subset. x = how many features, y = how accurate. The dashed line is the fitness threshold — drag it to see which candidates survive. Over generations, the population drifts toward smaller, more accurate subsets." palette={p}>
        <FeatureSelectionViz palette={p} />
      </Figure>

      <p>Second, <strong>elitism</strong>: preserving the best individuals across iterations rather than letting them be overwritten by the stochastic update. Without it, a good solution found early can be lost to random drift in later generations. With it, the population has a floor — the best solution so far is always in the mix.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§03</span>
        <span>Three protein datasets</span>
      </h2>

      <p>We tested on three datasets, each posing a different feature-selection challenge:</p>

      <ol style={{ margin: "1.2rem 0", paddingLeft: "1.4rem", lineHeight: 1.7 }}>
        <li><strong>Apolipoprotein identification</strong> — distinguishing apolipoproteins from other plasma proteins.</li>
        <li><strong>Cancer-related protein identification</strong> — proteins associated with tumour pathways.</li>
        <li><strong>Toxin protein identification</strong> — protein toxins versus non-toxic background.</li>
      </ol>

      <p>The classifier was a Random Forest, kept stable across runs so the differences would come from the feature selection, not the model. The result: the improved JAYA obtained improvements either in the size of the selected attribute subset, or in accuracy, or both — depending on the dataset.<span className="sidenote-number" style={{ color: p.accent }}>4</span>
        <span className="sidenote">
          <strong style={{ color: p.accent }}>4.</strong> The wins were dataset-dependent, which is a way of saying <em>your mileage may vary</em> — and also that feature selection is always a conversation between the algorithm and the structure of the data it's searching.
        </span>
      </p>

      <p>We presented the work as poster PP-28 at INBIX'22, the Indian Conference on Bioinformatics, at VFSTR. The conclusion, as we wrote it: a simple algorithm like JAYA with an appropriate fitness function and preserved elite solutions can provide good performance in feature-selection tasks. That sentence is less exciting than it sounds, and more useful than it looks.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§04</span>
        <span>What "improved" means</span>
      </h2>

      <p>Three years on, I think the lesson isn't really about JAYA. It's about "parameter-free" as a claim. A parameter-free algorithm makes a strong design choice — to not expose certain knobs to the user — and that choice is itself a parameter, just one you can't tune. When the choice is right, the simplicity is a gift. When it's wrong, you spend time grafting the missing knobs back on, and the elegance was always borrowed.</p>

      <PullQuote color={p.accent}>The honest version is to say what your algorithm is committed to, and what it leaves open.</PullQuote>

      <p>The highest-leverage modification wasn't anything exotic — it was rewriting the objective. Re-asking <em>what</em> you're optimising for tends to outperform re-engineering <em>how</em>. The fitness function that penalises large subsets did more than any operator change could. Elitism kept the search honest. Together, they turned a parameter-free algorithm into a slightly-less-parameter-free algorithm that knew what it was looking for.</p>

      <p>The poster is still up at <a href="https://github.com/Shubzthub/inbix22" target="_blank" rel="noreferrer" className="link-underline" style={{ color: p.accent }}>github.com/Shubzthub/inbix22</a>.</p>

      <p style={{ marginTop: "2.4rem", color: p.muted, fontStyle: "italic", paddingTop: "1.4rem", borderTop: `1px solid ${p.line}` }}>— written between two stops at the British Library, on a Wednesday.</p>
    </>
  );
}

function ThresholdEssay({ palette: p }) {
  return (
    <>
      <p className="drop-cap" style={{ fontSize: "1.18rem", lineHeight: 1.72, margin: "0 0 1.2rem" }}>
        The slide came up at week six of the MFoCS.<span className="sidenote-number" style={{ color: p.accent }}>1</span> A scatter plot of single cells from a tumour sample, axes labelled CD4 and CD8. The clinician giving the talk circled a region with a laser pointer and called those cells "positive," like that settled the matter. What I wanted to ask — and didn't, because you learn quickly at Oxford that the second-year student is not the one who gets to question the consultant — was: <em>where, exactly, did you draw that line?</em>
        <span className="sidenote">
          <strong style={{ color: p.accent }}>1.</strong> MFoCS thesis, Oxford · Lady Margaret Hall, 2024 — "Analysing and Advancing Automated Immune Biomarker Detection." Multiplex immunofluorescence data on tumour-associated immune populations.
        </span>
      </p>

      <p>That question became my thesis. Two tumour files from two distinct patients — one around 9,500 cells, the other around 5,500 — six immune markers per cell, and for each marker, a threshold that a pathologist had drawn by eye on a log-transformed intensity histogram. Move that line half a unit and the "positive" population shifts noticeably. Move it the other way and you import background noise. The biology hasn't changed. The category has.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§01</span>
        <span>Six markers, one panel</span>
      </h2>

      <p>The dataset was a multiplex immunofluorescence panel of six markers — CD66b, CD56, CD4, CTLA-4, CD8, and CD20 — measured on tumour-infiltrating lymphocytes from two distinct patients.<span className="sidenote-number" style={{ color: p.accent }}>2</span> Each cell is a 6-vector of fluorescence intensities. The clinical workflow is to drop a threshold per marker and read off proportions in each gate. CD66b marks neutrophils. CD4 and CD8 split helper from cytotoxic T cells. CD20 picks out B cells. CTLA-4 flags exhausted T cells. CD56 marks natural killer cells. Together, the six markers give you a rough picture of how the immune system is engaging the tumour.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>2.</strong> Two tumour files from distinct patients, selected after discarding files with spatial artefacts from slide scanning. Each accompanied by a pathologist's ground truth — thresholds set by expert review of histograms.
        </span>
      </p>

      <p>A cell sitting just inside the CD4+ gate and a cell sitting deep inside it count the same. The gate is binary. The biology is not. That gap is where the interesting problems live.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§02</span>
        <span>Four ways to draw a line</span>
      </h2>

      <p>The question I spent most of the summer on: can an algorithm draw the threshold as well as the pathologist? I tried four approaches, each with a different idea about what "the right place" means.</p>

      <p><strong>Otsu</strong> looks for a valley. It treats the intensity histogram as two classes and finds the threshold that maximises the between-class variance — the point where the two populations are most cleanly separated. It works beautifully on markers with a clear bimodal distribution. On anything else, it guesses.</p>

      <p><strong>IsoData</strong> iterates. Start with the mean intensity, split the data, recalculate each half's mean, set the threshold to the average of the two means, repeat until stable. It converges quickly and handles skewed distributions better than Otsu. It became the default thresholding method for later stages of the thesis — not because it won every marker, but because it lost gracefully on the ones it didn't win.</p>

      <p><strong>A modified Gaussian mixture model</strong> fits two bell curves to the distribution and sets the threshold where the curves cross.<span className="sidenote-number" style={{ color: p.accent }}>3</span> For markers like CD56, where the distribution has an awkward shoulder rather than a clean valley, the GMM outperformed everything else. I ended up writing a custom variant that handled cases where the standard fit returned more than two components — collapsing the extras into the nearest Gaussian before picking the crossing point.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>3.</strong> Standard GMM fits K Gaussians via expectation-maximisation. The threshold is the point where the posterior probabilities of the two components are equal. The custom modification handles the K &gt; 2 case by merging components before thresholding.
        </span>
      </p>

      <p><strong>Minimum cross-entropy</strong> takes an information-theoretic view: find the threshold that minimises the cross-entropy between the original histogram and a thresholded version of it. Elegant in theory. In practice, it was the most sensitive to distributional shape and the least stable across markers.</p>

      <Figure caption="Pick a marker to see where each method draws the line. On well-separated markers (CD66b), they converge. On ambiguous ones (CTLA-4), they scatter." palette={p}>
        <ThresholdMethods palette={p} />
      </Figure>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§03</span>
        <span>The marker that broke everything</span>
      </h2>

      <p>CTLA-4 broke every method I tried. Its expression distribution is not bimodal — it's flat, spread, ambiguous. There is no valley for Otsu to find. IsoData converges to a threshold that's stable but not particularly meaningful. The GMM fits two wide, overlapping Gaussians and picks a crossing point that's as much a coin flip as a classification. Minimum cross-entropy was worst of all.</p>

      <Figure caption="CD66b (left) has a clean valley — all methods agree within a narrow band. CTLA-4 (right) has no valley. The methods scatter across the distribution, each guessing differently." palette={p}>
        <CtlaDistribution palette={p} />
      </Figure>

      <p>The pathologist's threshold for CTLA-4 is the only stable anchor, and it's arrived at by looking at the histogram and making a judgement call.<span className="sidenote-number" style={{ color: p.accent }}>4</span> There's nothing wrong with that — it's how clinical immunology works, and it works. But it does mean that "automated detection" has a hard ceiling on this marker: you can automate the easy calls, and for the hard ones you're still relying on exactly the kind of expert judgement you were trying to replace.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>4.</strong> CTLA-4 is an immune checkpoint receptor — it down-regulates T-cell activation. Its expression is continuous and context-dependent, which is exactly why it resists binary gating. The biology is genuinely ambiguous, and the histogram reflects that.
        </span>
      </p>

      <PullQuote color={p.accent}>You can automate the easy calls. For the hard ones, you're still relying on the judgement you were trying to replace.</PullQuote>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§04</span>
        <span>What 0.11 units hides</span>
      </h2>

      <p>The number that stuck with me: move the CD4 gate from 4.39 to 4.50 — less than three percent of the intensity range — and the "positive" population shrinks visibly. The cells that vanish were sitting just inside the boundary. They weren't confidently positive; they were categorically positive, which is a different thing entirely.</p>

      <Figure caption="Drag the gate on a CD4-like distribution. The positive/negative split updates in real-time. Small moves in the threshold produce large swings in the population count." palette={p}>
        <GateSensitivity palette={p} />
      </Figure>

      <p>This isn't a failure of the methods. It's the nature of the problem. When the underlying distribution has cells clustering around the threshold — which it always does, because biological expression is continuous — any binary gate will be fragile at the boundary. The gate is not a measurement. It's a decision wearing a lab coat.</p>

      <p>IsoData was the most reliable method overall. The custom GMM earned its complexity for markers with awkward shoulders. Otsu was fine when the valley was clean and useless when it wasn't. Minimum cross-entropy was a good idea that didn't survive contact with real data. And CTLA-4 taught me that some markers simply resist automation — not because the algorithms are bad, but because the biology is genuinely ambiguous.</p>

      <PullQuote color={p.accent}>The gate is not a measurement. It's a decision wearing a lab coat.</PullQuote>

      <p>The companion essay — <em>Clustering with a conscience</em> — picks up where thresholding stops: what happens when you try to classify cells by their full six-marker profiles, not one marker at a time.</p>

      <p style={{ marginTop: "2.4rem", color: p.muted, fontStyle: "italic", paddingTop: "1.4rem", borderTop: `1px solid ${p.line}` }}>— written from the King's Cross flat, on a Tuesday that felt like a Thursday.</p>
    </>
  );
}

function ConstraintClusterEssay({ palette: p }) {
  return (
    <>
      <p className="drop-cap" style={{ fontSize: "1.18rem", lineHeight: 1.72, margin: "0 0 1.2rem" }}>
        The first time I ran a standard clustering algorithm on the tumour data, it returned a cluster of cells that were simultaneously CD66b-positive and CD4-positive.<span className="sidenote-number" style={{ color: p.accent }}>1</span> Neutrophils that are also helper T cells. That doesn't happen in biology — CD66b is a granulocyte marker and CD4 is a lymphocyte marker, and a cell is one or the other, not both. The algorithm didn't know that. It saw two intensities that happened to be high and grouped them together, because statistically, they looked close.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>1.</strong> This is the second essay from my MFoCS thesis (Oxford, 2024). The first — <em>Where the gate falls</em> — covers the thresholding problem: where to draw the line on a single marker. This one is about what happens when you try to classify cells by all six markers at once.
        </span>
      </p>

      <p>The thresholding essay ended with a question: what happens when you stop classifying one marker at a time and try to see the full six-dimensional profile? Clustering is the answer. It's also where everything gets harder, because the algorithms don't know immunology and the immunologists don't write clustering algorithms.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§01</span>
        <span>Why not just threshold?</span>
      </h2>

      <p>Thresholding treats each marker independently. You draw a gate on CD4, another on CD8, another on CD66b, and classify each cell by its binary profile — the vector of which markers it's above-threshold for. It works, and for most of the clinical workflow it's enough.</p>

      <p>But it misses relationships. A cell expressing both CD4 and CTLA-4 is a regulatory T cell in a specific activation state — that combination means something different from the sum of its parts.<span className="sidenote-number" style={{ color: p.accent }}>2</span> Clustering in six-dimensional marker space lets you find these profiles without pre-specifying what to look for. The idea is that the structure is already in the data; you just need an algorithm that can see it.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>2.</strong> CD4+CTLA-4+ cells are often regulatory T cells showing immune checkpoint activity — they're suppressing the immune response rather than helping it. The co-expression pattern is the signal, not either marker alone.
        </span>
      </p>

      <p>The problem is that "see it" means very different things to different algorithms.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§02</span>
        <span>What the textbook misses</span>
      </h2>

      <p>I ran seven clustering algorithms on the same data. The results were instructive in the way that a tour of failure modes usually is.</p>

      <p>KMeans assumes clusters are spherical and roughly equal-sized. Immune cell populations are neither. HDBSCAN is density-based and good at finding arbitrarily shaped clusters, but it labelled too many cells as noise — cells that the pathologist would have confidently assigned. Mean-Shift was sensitive to its bandwidth parameter; a small change would either merge everything into two clusters or fragment into dozens. Affinity Propagation and BIRCH each had their strengths but shared a common weakness: they had no concept of biological plausibility.</p>

      <p>The most consistent performer, to my surprise, was agglomerative clustering — the simplest hierarchical method. Bottom-up merging, Ward's linkage, nothing fancy. It didn't know immunology either, but it happened to respect the local density structure of the data well enough to produce biologically sensible clusters most of the time.</p>

      <p>The gap between "most of the time" and "all of the time" is where the interesting work lives. Every standard method occasionally produced clusters containing biologically impossible co-expression patterns — cells that no pathologist would group together.</p>

      <Figure caption="Six markers, six nodes. Red edges are pairs that cannot co-express (neutrophil markers on lymphocytes). Amber edges are pairs that rarely co-express. A standard clustering algorithm doesn't see any of this." palette={p}>
        <ViolationNetwork palette={p} />
      </Figure>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§03</span>
        <span>Teaching the distance metric</span>
      </h2>

      <p>The idea that became the novel contribution of the thesis was this: if you know that certain marker pairs can't co-express, encode that knowledge directly into the clustering algorithm.<span className="sidenote-number" style={{ color: p.accent }}>3</span> Not as a post-hoc filter — not "run the clustering and then throw away the impossible results" — but as a structural constraint that shapes how the algorithm measures similarity between cells in the first place.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>3.</strong> The approach draws on constrained clustering (Wagstaff, 2011) and spectral methods (Ng, Jordan, and Weiss, 2001). The specific combination — co-expression penalties embedded in the similarity matrix of a spectral clustering step — is, as far as I could find, new to this application.
        </span>
      </p>

      <p>I built a penalty system with two tiers. "Cannot-link" constraints: CD66b and CD4 should never appear together in the same cell, so if two cells both express these markers, push them apart in similarity space. "Less-likely-to-link" constraints: CD4 and CD8 co-expression is rare but not impossible, so apply a lighter penalty. These penalties modify the similarity matrix before spectral clustering even begins — the algorithm sees a landscape where biologically impossible neighbours are further apart than the raw intensities suggest.</p>

      <p>On top of this, I added a variance-based protection for the "no marker" cluster — the large population of cells expressing nothing above threshold.<span className="sidenote-number" style={{ color: p.accent }}>4</span> These cells are homogeneous and quiet; standard algorithms would sometimes merge them with an active population simply because the merge happened to minimise some global objective. The penalty ensured that merging the "no marker" cluster with a high-variance neighbour was expensive, preserving its integrity.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>4.</strong> The "no marker" cluster is often the largest single population in a tumour sample — cells the immune system hasn't engaged, or cells whose markers are below the detection threshold. Losing it to a merge destroys the baseline.
        </span>
      </p>

      <Figure caption="Toggle between standard and constraint-aware clustering. In the standard view, the dashed ring marks biologically impossible cells merged into the wrong cluster. The constraint-aware view separates them." palette={p}>
        <ConstraintEffect palette={p} />
      </Figure>

      <PullQuote color={p.accent}>The algorithm sees a landscape where biologically impossible neighbours are further apart than the raw intensities suggest.</PullQuote>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§04</span>
        <span>The honest result</span>
      </h2>

      <p>The constraint-aware pipeline beat most of the textbook methods. It did not beat plain agglomerative clustering.</p>

      <Figure caption="Relative performance of seven methods plus our approach. Scale is relative, not absolute. Our method sits second — ahead of the textbooks, behind the simplest hierarchy." palette={p}>
        <MethodRanking palette={p} />
      </Figure>

      <p>That result deserves an honest reading. The novel algorithm introduces a pipeline with multiple stages — outlier detection, constraint penalties, variance protection, post-clustering refinement — and each stage has its own parameters.<span className="sidenote-number" style={{ color: p.accent }}>5</span> Nine user-defined knobs in total. Finding the right combination for a specific dataset requires extensive tuning, and I didn't solve that problem in the scope of the thesis. The parameter space we created is its own problem.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>5.</strong> Outlier contamination thresholds (2), constraint penalty weights (2), penalty damping (1), RBF kernel scale (1), variance threshold (1), variance ratio (1), target cluster count (1). Each influences the result; the interactions are not independent.
        </span>
      </p>

      <p>Agglomerative clustering, by contrast, has one meaningful choice: the linkage criterion. Ward's linkage, the standard choice, happened to work well on this data. No constraints, no penalties, no pipeline. Sometimes the simplest method wins because it has the fewest ways to be wrong.</p>

      <PullQuote color={p.accent}>Sometimes the simplest method wins because it has the fewest ways to be wrong.</PullQuote>

      <p>I think the contribution isn't the ranking. It's the idea that domain knowledge — "these markers can't co-express" — can be encoded structurally, not just used as a post-hoc filter. The approach beat five of seven standard methods, and on the biological plausibility of individual clusters, it was arguably the best. The overall metric didn't reflect that because metrics reward getting everything approximately right, not getting the hard cases exactly right.</p>

      <p>The thesis sits in the Oxford repository. The approach — constraints in the similarity matrix, variance-based cluster protection, staged outlier handling — is general enough for other mIF panels with different marker sets. Whether it's worth the parameter-tuning tax depends on how much you care about the hard cases.</p>

      <p style={{ marginTop: "2.4rem", color: p.muted, fontStyle: "italic", paddingTop: "1.4rem", borderTop: `1px solid ${p.line}` }}>— written from the Lady Margaret Hall library, the week after submission.</p>
    </>
  );
}

function SixEnginesEssay({ palette: p }) {
  return (
    <>
      <p className="drop-cap" style={{ fontSize: "1.18rem", lineHeight: 1.72, margin: "0 0 1.2rem" }}>
        I am, mortifyingly, the kind of Taylor Swift listener who has opinions about which 2019 demos should have stayed unreleased.<span className="sidenote-number" style={{ color: p.accent }}>1</span> So when I built a recommender for her catalogue I was the worst possible audience: any model that surfaced something obvious would feel patronising, and any model that surfaced something stupid would feel personal.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>1.</strong> The original Lover demos. Don't @ me.
        </span>
      </p>

      <p>The constraint, then, was: build something whose <em>recommendations themselves</em> would be the test. If I rolled it out to friends and they said "yeah, that one too," good. If they said "why this," bad. The architecture had to earn that, not the other way around.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§01</span>
        <span>Six engines, one query</span>
      </h2>

      <p>I ended up with six recommendation models, each looking at a different facet of a song. Five base engines plus an ensemble that learned how to weight them.</p>

      <ol style={{ margin: "1.2rem 0", paddingLeft: "1.4rem", lineHeight: 1.7 }}>
        <li><strong>Lyrics-Transformer.</strong> Sentence-BERT embeddings over Genius-scraped lyrics. Cosine similarity in the 384-D embedding space.</li>
        <li><strong>Audio VAE.</strong> A variational autoencoder over Spotify audio features, compressed to a 16-dimensional latent.<span className="sidenote-number" style={{ color: p.accent }}>2</span> Distance in latent space picks up sonic neighbours.</li>
        <li><strong>Graph node2vec.</strong> Build a song-co-listen graph, run node2vec for 64-D embeddings, retrieve nearest neighbours.</li>
        <li><strong>Neural Collab Filtering.</strong> Classic two-tower model on user-song interactions.</li>
        <li><strong>Contrastive SSL.</strong> Self-supervised pretext: same song, two augmentations of its audio, pull together; different songs, push apart.</li>
        <li><strong>Ensemble.</strong> Weighted blend of the five, with a consensus boost for songs surfaced by ≥2 engines.</li>
      </ol>

      <p style={{ fontSize: "0.85rem", color: p.muted, marginTop: "-0.5rem", lineHeight: 1.55 }}>
        <strong style={{ color: p.accent }}>2.</strong> The compression ratio matters: 384 raw audio descriptors → 16 latent dims. Anything that survives that bottleneck is doing real work.
      </p>

      <Figure caption="A query song q routes to six engines; each surfaces ~3 candidates. Songs touched by multiple engines (filled) get a consensus boost in the final ranking." palette={p}>
        <RecEngineSwarm palette={p} />
      </Figure>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§02</span>
        <span>The dataset that made it tractable</span>
      </h2>

      <p>The engines run on Taylor's full discography — every era, including Vault tracks — with editorial bridges to neighbouring artists.<span className="sidenote-number" style={{ color: p.accent }}>3</span> The bridges are metadata, not embeddings: the six engines compute similarity within Taylor's catalogue, and the editorial layer maps outward to artists who share lyrical or sonic DNA. Without that layer, every recommendation would be intra-catalogue — suggesting an album shuffle dressed up as intelligence.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>3.</strong> Editorial bridges to Kacey Musgraves, Maggie Rogers, Olivia Rodrigo, Gracie Abrams, Lana Del Rey, HAIM, Phoebe Bridgers, Carly Rae Jepsen, Paramore, and others. The mapping is hand-curated — each bridge has a reason.
        </span>
      </p>

      <p>The original was an R/Shiny app I'd written in 2023 — pretty, slow, single-user. The rebuild is a TypeScript + Next.js frontend on Vercel with a FastAPI backend on Render, serving real recommendations in under 200ms.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§02b</span>
        <span>Why the ensemble works</span>
      </h2>

      <p>Each engine has a failure mode that the others compensate for. Lyrics-only will surface "songs that mention rain" when you wanted "songs that <em>feel like</em> rain." Audio-only will surface acoustic ballads when you wanted lyrical heartbreak. Collaborative filtering will surface whatever's popular this week. The ensemble is less a fusion of strengths than an averaging-out of weaknesses.</p>

      <Figure caption="Final score is a fixed-weight blend with a small consensus boost for cross-engine agreement. The weights are tuned by leave-one-out on a small held-out playlist." palette={p}>
        <EnsembleConsensus palette={p} />
      </Figure>

      <PullQuote color={p.accent}>The ensemble is less a fusion of strengths than an averaging-out of weaknesses.</PullQuote>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§03</span>
        <span>What the demo actually feels like</span>
      </h2>

      <p>Type a song. Six engines return their picks in parallel. The UI shows you the ensemble's top 10, but lets you toggle "show me what each engine thought" so you can see the disagreements. The disagreements are usually the interesting part: the lyrics engine wants you to listen to <em>The Manuscript</em>; the audio VAE thinks you'd rather have <em>You're On Your Own, Kid</em>; the graph engine sends you somewhere unexpected. They're all defensible, in their own register.</p>

      <p>The site is at <a href="https://shubz-taylor-recommendation-engine.vercel.app" target="_blank" rel="noreferrer" className="link-underline" style={{ color: p.accent }}>shubz-taylor-recommendation-engine.vercel.app</a>. Bring your own opinions about the Lover demos.</p>

      <p style={{ marginTop: "2.4rem", color: p.muted, fontStyle: "italic", paddingTop: "1.4rem", borderTop: `1px solid ${p.line}` }}>— written on the train back from a Tortoise live show.</p>
    </>
  );
}

function FashionEssay({ palette: p }) {
  return (
    <>
      <p className="drop-cap" style={{ fontSize: "1.18rem", lineHeight: 1.72, margin: "0 0 1.2rem" }}>
        Fashion forecasting is what you call it when you're respectable.<span className="sidenote-number" style={{ color: p.accent }}>1</span> What it actually is, most weeks, is someone arguing about whether barrel-leg jeans survive the autumn. The instinct is real. The methodology is improvised. I built a platform to make the instinct legible — to the person having it, and to anyone willing to put virtual money on it.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>1.</strong> "Trend" sits oddly in this sentence. The industry word; carrying both "what's in" and "what's measurable." A platform should be able to handle both.
        </span>
      </p>

      <p>The thing I've built is an ML-powered trend intelligence platform — part computer vision, part forecasting pipeline, part trading simulator. Upload an outfit photo and it tells you what you're wearing, what collection it's closest to, and what the colour palette says. Browse runway breakdowns from Prada to Miu Miu. Track hundreds of trend terms across categories. Then, if you're feeling brave, trade on them with virtual currency and see if your instincts beat the model's.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§01</span>
        <span>Five signals, one composite</span>
      </h2>

      <p>The forecasting half of the platform reads from five data sources and merges them into a composite trend score per term:</p>

      <ol style={{ margin: "1.2rem 0", paddingLeft: "1.4rem", lineHeight: 1.7 }}>
        <li>Google Trends search volume (via trendspyg) — the broadest signal, noisiest at the long tail. 25% weight.</li>
        <li>Bluesky firehose — real-time social mentions, completely open, no rate limits. 25% weight.</li>
        <li>Pinterest trend endpoints — what's being saved and pinned in fashion categories. 20% weight.</li>
        <li>Reddit — social mentions from fashion subreddits (r/fashion, r/femalefashionadvice, r/streetwear). 15% weight.</li>
        <li>YouTube Data API — video counts and view velocity for fashion content. 15% weight.</li>
      </ol>

      <p>None of these is reliable on its own. Search volume spikes on a single celebrity sighting; Reddit threads over-index on whatever's contrarian this week; Bluesky is growing but the fashion community is still thin; Pinterest skews aspirational. <em>Together</em>, fed into a Holt exponential smoothing model, they're tolerable.<span className="sidenote-number" style={{ color: p.accent }}>2</span>
        <span className="sidenote">
          <strong style={{ color: p.accent }}>2.</strong> Holt smoothing gives a baseline level and a velocity term — is this trend rising, flat, or fading? No seasonality modelling yet; the data isn't deep enough for that. 250-odd fashion terms tracked across colours, silhouettes, aesthetics, and fabrics.
        </span>
      </p>

      <Figure caption="Five source signals merge into a composite, then a 30-day forecast extends past 'now'. Each lane is independently noisy; the composite smooths out single-source spikes." palette={p}>
        <TrendSignalFlow palette={p} />
      </Figure>

      <PullQuote color={p.accent}>None of these is reliable on its own. Together, they're tolerable.</PullQuote>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§02</span>
        <span>The Trend Exchange</span>
      </h2>

      <p>A forecast is a number. A trade is a number with skin in the game — even when the skin is virtual. The platform's Trend Exchange gives you S$1,000 in StyleCoins and lets you go long on trends you think are rising or short on trends you think are fading. Your portfolio tracks P&L in real time against the model's own house predictions.</p>

      <p>The pricing mechanism is LMSR — Hanson's logarithmic market scoring rule.<span className="sidenote-number" style={{ color: p.accent }}>3</span> Same maths as Manifold Markets. The advantage is automatic liquidity: even with a single trader, the market quotes a price. As you buy YES shares on "barrel-leg jeans," the price rises; the more you buy, the steeper it gets. The liquidity parameter <span className="mono">b</span> controls how much a given trade moves the market.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>3.</strong> Hanson, R. (2003). "Combinatorial Information Market Design." The cost function is C(q) = b · log(Σ exp(q_i / b)). The platform uses b = 100, which means a 10-share buy on a 50/50 market moves the price about 5 points. Virtual currency, real accountability.
        </span>
      </p>

      <Figure caption="LMSR price for a YES share rises as net YES position grows. Steeper around p = 0.5, asymptotic at the bounds. b = 100 controls how much the price moves per unit volume." palette={p}>
        <LMSRPriceCurve palette={p} />
      </Figure>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§03</span>
        <span>What the camera sees</span>
      </h2>

      <p>The feature I didn't plan to build but that ended up being the most fun: upload a photo of an outfit, and the platform breaks it down. Gemini Flash detects individual garments, classifies the style, extracts the colour palette, and matches what you're wearing against runway collections from eight major houses — Prada, Chanel, Saint Laurent, Gucci, Miu Miu, and three more. The Runway Decoder page does the same in reverse: browse a collection and see its colour distributions and silhouette breakdowns, cross-referenced against real-time search data.</p>

      <p>Computer vision on fashion data is more interesting than it sounds, because the categories are soft. A "barrel-leg jean" and a "wide-leg trouser" overlap in silhouette but not in cultural signal. The model has to learn that the distinction matters — and that it shifts every season.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§04</span>
        <span>What I'm optimising for</span>
      </h2>

      <p>Calibration, mostly. A trend platform that says "this will be big" 100 times wants the things it predicted to actually be big roughly 70 times when its confidence says 0.7, 30 times when its confidence says 0.3. The platform tracks this with Brier scores — public, falsifiable, with target dates. That's the only honest measure. Everything else — engagement, trades-on-platform, "feels right" — is downstream.</p>

      <PullQuote color={p.accent}>Calibration, mostly.</PullQuote>

      <p>The platform is live at <a href="https://fashion-web-psi.vercel.app" target="_blank" rel="noreferrer" className="link-underline" style={{ color: p.accent }}>fashion-web-psi.vercel.app</a>. Next.js, serverless, deployed on Vercel's edge. The fashion calendar is unforgiving, the data is sparse, and the categories are soft — but there's something genuinely interesting about trying to make quantitative what an industry has always priced in private.</p>

      <p style={{ marginTop: "2.4rem", color: p.muted, fontStyle: "italic", paddingTop: "1.4rem", borderTop: `1px solid ${p.line}` }}>— written between meetings, on a stolen Friday afternoon.</p>
    </>
  );
}

function MayEssay({ palette: p }) {
  return (
    <>
      <p className="drop-cap" style={{ fontSize: "1.18rem", lineHeight: 1.72, margin: "0 0 1.2rem" }}>
        During the First World War, fishing in the Adriatic more or less stopped.<span className="sidenote-number" style={{ color: p.accent }}>1</span> When it resumed, the marine biologist Umberto D'Ancona noticed something odd in the catch records from Fiume, Trieste, and Venice: the proportion of predator fish — sharks, rays, the things with teeth — had gone <em>up</em> during the war years, not down. Fewer boats, more predators. He couldn't explain it with the data alone, so he asked his father-in-law, the mathematician Vito Volterra, to try.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>1.</strong> Alfred Lotka arrived at the same equations a year earlier (1925, "Elements of Physical Biology"), working from autocatalytic chemistry rather than fisheries. Volterra published independently in 1926. Both names stuck. Lotka wasn't thrilled.
        </span>
      </p>

      <p>Volterra wrote two equations. They describe a system in which prey grow exponentially when left alone, predators die exponentially when they can't eat, and every encounter between the two has a chance of converting a prey into a predator. That's all. No territory, no seasons, no disease — just growth, death, and the rate at which one becomes the other.</p>

      <p style={{ textAlign: "center", margin: "1.4rem 0", fontFamily: "var(--f-mono)", fontSize: "0.95rem", color: p.ink, padding: "0.8rem", border: `1px dashed ${p.line}`, background: `color-mix(in oklch, ${p.paper} 80%, white)` }}>
        dx/dt = αx − βxy &nbsp;&nbsp;&nbsp; dy/dt = δxy − γy
      </p>

      <p>The remarkable thing is what these two lines produce: a closed orbit in the phase plane. Prey rise, predators follow, prey crash, predators starve, prey recover — and the cycle repeats exactly, forever. The populations chase each other around a loop that never settles and never breaks.</p>

      {/* full interactive figure — locked to May */}
      <div style={{ margin: "2rem 0", padding: "0.8rem", border: `1px solid ${p.line}`, background: `color-mix(in oklch, ${p.paper} 88%, white)` }}>
        <LotkaVolterra
          width={520}
          height={360}
          accent={p.accent}
          ink={p.ink}
          muted={p.muted}
          line={p.line}
          theme={SEASONAL_THEMES[4]}
          monthName="May"
        />
      </div>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§01</span>
        <span>What the sliders teach</span>
      </h2>

      <p>Drag β — the predation rate — upward, and predators eat more per encounter. The orbit tightens. The equilibrium shifts. Prey spend less time at their peak before the crash arrives. Drag γ — predator mortality — upward, and predators die faster between meals. The equilibrium prey population rises; the equilibrium predator population falls.</p>

      <p>This is Volterra's answer to D'Ancona's fishery puzzle. Fishing is, mathematically, an increase in predator mortality γ. When fishing stopped during the war, γ dropped — and the equilibrium shifted toward more predators and fewer prey.<span className="sidenote-number" style={{ color: p.accent }}>2</span> The proportion of predator fish in the catch went up not despite the boats being gone, but because of it. The loop explains the paradox.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>2.</strong> The system has a conserved quantity: V(x,y) = δx − γ ln(x) + βy − α ln(y). Its level curves are the closed orbits. Same structure as a Hamiltonian in classical mechanics — the system is conservative, and energy is neither created nor destroyed.
        </span>
      </p>

      <p>The catch — and there is always a catch with models this clean — is that those closed orbits are structurally unstable. Any perturbation breaks the exact closure. Add a hard winter, a disease, a fishing boat with a schedule, and the orbit drifts. The ninety years of lynx and snowshoe hare pelts from the Hudson Bay Company (1845–1935) show cycles of eight to eleven years, but they're not closed loops.<span className="sidenote-number" style={{ color: p.accent }}>3</span> They spiral. They shift. The model is a starting point, not a destination.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>3.</strong> The lynx-hare data has a further wrinkle: lynx peaks sometimes <em>lead</em> hare peaks, which the Lotka–Volterra model cannot produce. Real ecology is messier than two equations — vegetation cycles, parasites, and starvation thresholds all play roles the model ignores.
        </span>
      </p>

      <PullQuote color={p.accent}>The model is a starting point, not a destination — but you have to start somewhere, and Volterra started with a question from his son-in-law about fish.</PullQuote>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§02</span>
        <span>For Robert May</span>
      </h2>

      <p>Robert May took models like this one and asked a different question: not "do the orbits close?" but "what happens when they don't?" His 1976 paper in <em>Nature</em> — "Simple mathematical models with very complicated dynamics" — showed that even the one-dimensional logistic map, the simplest possible population model, can produce chaos.<span className="sidenote-number" style={{ color: p.accent }}>4</span> Period-doubling cascades. Apparent randomness from a deterministic rule. The paper changed how ecologists, physicists, and mathematicians think about complexity. It is one of the most cited papers in the history of science.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>4.</strong> The logistic map: x<sub>n+1</sub> = rx<sub>n</sub>(1 − x<sub>n</sub>). For r &lt; 3 it converges to a fixed point. For r ≈ 3.57 it goes chaotic. The route from order to chaos follows a universal constant — Feigenbaum's δ ≈ 4.669 — that appears in systems far removed from ecology.
        </span>
      </p>

      <p>May was an Australian physicist who became arguably the most important theoretical ecologist of the twentieth century. Chief Scientific Adviser to the UK government. President of the Royal Society. Baron May of Oxford. He died on 28 April 2020, aged eighty-four.</p>

      <p>The figure on this page runs every May. May 22 is the International Day for Biological Diversity — the Convention on Biological Diversity was adopted on that date in 1992, at the Rio Earth Summit. The loop keeps running. The populations keep chasing each other. And somewhere in the model, between the prey that rise and the predators that follow, there is still something worth watching: the moment just before the crash, when the numbers say <em>this cannot last</em> and the system says <em>watch me</em>.</p>

      <p style={{ marginTop: "2.4rem", color: p.muted, fontStyle: "italic", paddingTop: "1.4rem", borderTop: `1px solid ${p.line}` }}>— written the week the loop came back around, in a flat that overlooks no wilderness at all.</p>
    </>
  );
}

/* ===== components/app.jsx ===== */
/* global React, ReactDOM, CustomCursor, HomeV4, WritingIndexV4, ArticleV4, WorkV4, NowV4, ContactV4, PALETTE_V4 */

// useState, useEffect are in scope from motif.jsx

function App() {
  const [route, setRoute] = useState({ page: "home", slug: null });
  const [cursorColor, setCursorColor] = useState(PALETTE_V4.accent);

  function navigate(page, slug = null) {
    if (document.startViewTransition) {
      document.startViewTransition(() => setRoute({ page, slug }));
    } else {
      setRoute({ page, slug });
    }
    setTimeout(() => window.scrollTo({ top: 0, behavior: "instant" }), 10);
  }

  const p = PALETTE_V4;
  const sharedProps = { palette: p, onNavigate: navigate, setCursorColor };

  let page;
  if (route.page === "writing") page = <WritingIndexV4 {...sharedProps} />;
  else if (route.page === "essay") page = <ArticleV4 slug={route.slug || "jaya"} {...sharedProps} />;
  else if (route.page === "work") page = <WorkV4 {...sharedProps} />;
  else if (route.page === "now") page = <NowV4 {...sharedProps} />;
  else if (route.page === "contact") page = <ContactV4 {...sharedProps} />;
  else page = <HomeV4 onNavigate={navigate} setCursorColor={setCursorColor} />;

  return (
    <>
      <a href="#main" className="skip-link">Skip to content</a>
      <CustomCursor color={cursorColor} />
      {page}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
