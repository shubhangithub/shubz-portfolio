function TrendSignalFlow({ palette: p }) {
  const [t, setT] = React.useState(0);
  React.useEffect(() => {
    const id = setInterval(() => setT(v => (v + 1) % 200), 60);
    return () => clearInterval(id);
  }, []);
  const W = 520, H = 280;
  const sources = [
    { id: "ig",   label: "Instagram saves",  color: p.accent },
    { id: "tt",   label: "TikTok mentions",  color: "#8B5A89" },
    { id: "rt",   label: "Resale velocity",  color: "#5B7A4F" },
    { id: "se",   label: "Search trends",    color: "#C68A4F" },
    { id: "ed",   label: "Editorial buzz",   color: "#4F7A8B" },
  ];
  // synthetic signal lines per source
  const path = (i, phase) => {
    const points = [];
    for (let x = 0; x <= 200; x += 4) {
      const y = 30 + i * 36
        + Math.sin((x + phase) * 0.06 + i) * 6
        + Math.sin((x + phase) * 0.13 + i * 1.7) * 3.5;
      points.push(`${x === 0 ? "M" : "L"} ${20 + x} ${y}`);
    }
    return points.join(" ");
  };
  // composite + forecast
  const compositePath = () => {
    const points = [];
    const baseY = 100;
    for (let x = 0; x <= 320; x += 4) {
      const sumOsc = sources.reduce((acc, _, i) => acc + Math.sin((x + t * 2) * 0.05 + i * 1.3) * (i % 2 ? 5 : 4), 0);
      // upward trend + oscillation
      const trend = x * 0.18;
      const y = baseY + sumOsc - trend * 0.25;
      points.push(`${x === 0 ? "M" : "L"} ${240 + x * 0.5} ${y + 30}`);
    }
    return points.join(" ");
  };
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: "0.5rem" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 260 }}>
        {/* source lanes */}
        {sources.map((s, i) => (
          <g key={s.id}>
            <text x="10" y={36 + i * 36} fontFamily="var(--f-ui)" fontSize="10" fill={s.color} textAnchor="start">{s.label}</text>
            <path d={path(i, t * 2)} stroke={s.color} strokeWidth="1.4" fill="none" opacity={0.75} />
          </g>
        ))}
        {/* merge bracket */}
        <path d={`M 220 30 L 240 130 L 220 230`} stroke={p.muted} strokeWidth="1" fill="none" opacity={0.5} strokeDasharray="3 3" />
        {/* composite + forecast */}
        <line x1="395" y1="20" x2="395" y2={H - 30} stroke={p.muted} strokeDasharray="2 4" opacity="0.4" />
        <text x="395" y="14" textAnchor="middle" fontFamily="var(--f-mono)" fontSize="9" fill={p.muted}>now</text>
        <text x={395 + 40} y={H - 14} fontFamily="var(--f-mono)" fontSize="9" fill={p.accent}>→ 30-day forecast</text>
        <path d={compositePath()} stroke={p.accent} strokeWidth="1.8" fill="none" />
        {/* moving pulse on composite */}
        <circle r="3" fill={p.accent}>
          <animateMotion dur="3s" repeatCount="indefinite" path={compositePath()} />
        </circle>
      </svg>
      <div style={{ fontFamily: "var(--f-ui)", fontSize: 11, color: p.muted, textAlign: "center" }}>five sources → composite → Holt-Winters forecast</div>
    </div>
  );
}

function LMSRPriceCurve({ palette: p }) {
  const W = 460, H = 240;
  const b = 100; // liquidity parameter
  const [q, setQ] = React.useState(0);
  const [view, setView] = React.useState("price"); // "price" | "cost"
  const [dragging, setDragging] = React.useState(false);
  const svgRef = React.useRef(null);

  // marginal price (probability of YES) — sigmoid in q
  const price = (q) => 1 / (1 + Math.exp(-q / b));
  // log-cost C(q) = b · ln(e^{q/b} + 1). Normalised by 4b for plot scale.
  const cost = (q) => (b * Math.log(Math.exp(q / b) + 1)) / (4 * b);
  const f = view === "price" ? price : cost;

  const left = 40, right = W - 30, top = 30, bottom = H - 40;
  const qMin = -200, qMax = 400;
  const xToPx = (x) => left + ((x - qMin) / (qMax - qMin)) * (right - left);
  const pxToQ = (px) => qMin + ((px - left) / (right - left)) * (qMax - qMin);
  const yToPx = (y) => bottom - y * (bottom - top);

  const pts = [];
  for (let qi = qMin; qi <= qMax; qi += 5) {
    pts.push(`${qi === qMin ? "M" : "L"} ${xToPx(qi)} ${yToPx(f(qi))}`);
  }

  const onPointer = (e) => {
    if (!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const px = ((e.clientX - rect.left) / rect.width) * W;
    setQ(Math.max(qMin, Math.min(qMax, Math.round(pxToQ(px)))));
  };
  const onDown = (e) => { setDragging(true); onPointer(e); };
  const onMove = (e) => { if (dragging) onPointer(e); };
  const onUp = () => setDragging(false);

  const cursorY = yToPx(f(q));
  const cursorX = xToPx(q);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 6, marginBottom: 6, fontFamily: "var(--f-mono)", fontSize: 10 }}>
        {[["price", "marginal price"], ["cost", "log-cost"]].map(([id, label]) => (
          <button key={id} onClick={() => setView(id)} style={{ all: "unset", cursor: "pointer", padding: "2px 8px", border: `1px solid ${view === id ? p.accent : p.line}`, color: view === id ? p.accent : p.muted, letterSpacing: "0.04em" }}>{label}</button>
        ))}
      </div>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 240, cursor: dragging ? "grabbing" : "grab", userSelect: "none", touchAction: "none" }}
           onPointerDown={(e) => { e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId); onDown(e); }}
           onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp} onPointerCancel={onUp}>
        <line x1={left} y1={bottom} x2={right} y2={bottom} stroke={p.muted} strokeWidth="1" />
        <line x1={left} y1={top} x2={left} y2={bottom} stroke={p.muted} strokeWidth="1" />
        {view === "price" && <line x1={left} y1={yToPx(0.5)} x2={right} y2={yToPx(0.5)} stroke={p.muted} strokeDasharray="3 4" opacity="0.4" />}
        <text x={right} y={bottom + 16} textAnchor="end" fontFamily="var(--f-ui)" fontSize="10" fill={p.muted}>net YES shares (q) →</text>
        <text x={left - 6} y={top - 6} textAnchor="end" fontFamily="var(--f-ui)" fontSize="10" fill={p.muted}>{view === "price" ? "price (probability)" : "log-cost (norm.)"}</text>
        {view === "price" && <text x={left - 6} y={yToPx(0.5) + 4} textAnchor="end" fontFamily="var(--f-mono)" fontSize="9" fill={p.muted}>0.5</text>}
        <path d={pts.join(" ")} stroke={p.accent} strokeWidth="2" fill="none" />

        {/* draggable cursor line + marker */}
        <line x1={cursorX} y1={top} x2={cursorX} y2={bottom} stroke={p.ink} strokeWidth="0.6" strokeDasharray="2 3" opacity="0.5" />
        <circle cx={cursorX} cy={cursorY} r="5" fill={p.accent} stroke={p.paper} strokeWidth="1.5" />

        <text x={right - 4} y={top + 14} textAnchor="end" fontFamily="var(--f-mono)" fontSize="9" fill={p.muted}>LMSR · b = {b}</text>
        <g fontFamily="var(--f-mono)" fontSize="10">
          <text x={cursorX + 8} y={cursorY - 10} fill={p.ink}>q = {q}</text>
          <text x={cursorX + 8} y={cursorY + 4} fill={p.muted}>{view === "price" ? `p = ${price(q).toFixed(3)}` : `C̃ = ${cost(q).toFixed(3)}`}</text>
        </g>
      </svg>
    </div>
  );
}

function JayaEssay({ palette: p }) {
  return (
    <>
      <p className="drop-cap" style={{ fontSize: "1.18rem", lineHeight: 1.72, margin: "0 0 1.2rem" }}>
        The thing they don't tell you about a "parameter-free" optimizer is that it has no parameters because <em>you</em> haven't added them yet.<span className="sidenote-number" style={{ color: p.accent }}>1</span> JAYA — Sanskrit for victory, named by R. Venkata Rao in 2016 — needs only a population size and a stopping rule, and that minimalism is exactly what makes it interesting to break.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>1.</strong> "Parameter-free" almost always means "the parameters are baked in." It's a design choice you cannot tune, which is a parameter pretending to be a virtue.
        </span>
      </p>

      <p>In the summer of 2022 I was a research intern with Prof. Jayaraman Valadi at FLAME University, working on protein-function classification with four other students.<span className="sidenote-number" style={{ color: p.accent }}>2</span> The task: pick a small subset of features (out of thousands per protein) such that a downstream classifier hits respectable accuracy without overfitting. JAYA had a reputation for being good at this. We wanted to know if we could make it better by giving it some of the parameters it had bragged about not needing.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>2.</strong> The other four were Nandini Gandhi, Oom Rawat, Hrushikesh Bhosale, and Aamod Sane. The poster ended up listing all of us — feature-selection work isn't really a one-person sport, even when each of us was running our own variant on a corner of the design space.
        </span>
      </p>

      <PullQuote color={p.accent}>"Parameter-free" almost always means the parameters are baked in.</PullQuote>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§01</span>
        <span>JAYA, briefly</span>
      </h2>

      <p>JAYA's update rule fits in a tweet. For each candidate <span className="mono">x_i</span> in the population, you nudge it toward the current best <span className="mono">x_b</span> and away from the current worst <span className="mono">x_w</span>:</p>

      <p style={{ textAlign: "center", margin: "1.4rem 0", fontFamily: "var(--f-mono)", fontSize: "0.95rem", color: p.ink, padding: "0.8rem", border: `1px dashed ${p.line}`, background: `color-mix(in oklch, ${p.paper} 80%, white)` }}>
        x_i' = x_i + r₁ (x_b − |x_i|) − r₂ (x_w − |x_i|)
      </p>

      <p>where <span className="mono">r₁</span> and <span className="mono">r₂</span> are uniform random in <span className="mono">[0,1]</span>. That's it. No inertia term. No crossover rate. No mutation rate. The only knobs are how many candidates and how long to run.<span className="sidenote-number" style={{ color: p.accent }}>3</span> This is an honestly good design.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>3.</strong> Compared with PSO (which needs an inertia weight, a cognitive coefficient, and a social coefficient) or GA (crossover rate, mutation rate, selection scheme), JAYA is dramatically less fiddly to set up. You can run it in twenty lines of Python.
        </span>
      </p>

      <p>It is also a design that throws away most of what genetic algorithms learned in the 1970s about searching combinatorial spaces. Crossover lets two candidates trade genes. Mutation prevents premature convergence on a local optimum. JAYA replaces both with "be more like the best, less like the worst," which is closer to gradient descent than evolution.</p>

      <Figure caption="A 14-candidate JAYA population on a smooth landscape. The cluster moves toward the marked optimum each generation; nothing else is doing the work." palette={p}>
        <JayaSwarm palette={p} />
      </Figure>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§02</span>
        <span>Adding crossover</span>
      </h2>

      <p>Our modification was unsubtle. After each JAYA update, we ran the candidates through a one-point crossover with probability <span className="mono">p_c</span>, then through a per-feature flip mutation with probability <span className="mono">p_m</span>. We tried several combinations.</p>

      <p>The best variant — call it JAYA-XM — looked like this:</p>

      <ol style={{ margin: "1.2rem 0", paddingLeft: "1.4rem", lineHeight: 1.7 }}>
        <li>JAYA update on the whole population.</li>
        <li>Pair candidates and crossover at a single random feature index, <span className="mono">p_c = 0.7</span>.</li>
        <li>Per-feature flip mutation, <span className="mono">p_m = 0.05</span>.</li>
        <li>Elitism: carry the top two candidates unchanged into the next generation.</li>
      </ol>

      <p>Now the algorithm has parameters. Three of them. The "parameter-free" branding is gone. The hope was that what we lost in elegance we'd gain in accuracy on real protein data.</p>

      <p>The other modification was less visible but probably did more work: we changed the fitness function. Vanilla JAYA, as published, will happily score a 50-feature subset and a 5-feature subset on accuracy alone — and accuracy almost always rewards more features, at least until the classifier overfits and falls off the cliff. We rewrote the fitness to penalise subset size:</p>

      <p style={{ textAlign: "center", margin: "1.4rem 0", fontFamily: "var(--f-mono)", fontSize: "0.95rem", color: p.ink, padding: "0.8rem", border: `1px dashed ${p.line}`, background: `color-mix(in oklch, ${p.paper} 80%, white)` }}>
        fitness = α · accuracy − β · |subset| / N
      </p>

      <p>with <span className="mono">α</span> and <span className="mono">β</span> chosen so a one-point accuracy gain was worth roughly ten extra features. Below that ratio you were paying for noise. The trade-off was the actual contribution of the work; the crossover and mutation were the showy half.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§03</span>
        <span>Three protein datasets</span>
      </h2>

      <p>We tested on three feature-rich protein-function datasets, each with its own personality:</p>

      <ol style={{ margin: "1.2rem 0", paddingLeft: "1.4rem", lineHeight: 1.7 }}>
        <li><strong>Apolipoprotein identification</strong> — distinguishing apolipoproteins from other plasma proteins. Classic two-class, moderately separable.</li>
        <li><strong>Cancer-related protein identification</strong> — proteins associated with tumour pathways. Class imbalance is the obvious failure mode here; a model that always says "no" can score in the 80s.</li>
        <li><strong>Toxin protein identification</strong> — protein toxins versus non-toxic background. Smaller dataset, sharper signal in a few key residues.</li>
      </ol>

      <p>The classifier was a Random Forest, kept stable across runs so the differences would come from the feature selection, not the model. We compared vanilla JAYA, JAYA-XM, and a few intermediate variants — JAYA with crossover only (no mutation), JAYA with elitism only, and so on. Eight cells in the cross.</p>

      <p>The headline result: JAYA-XM hit <strong style={{ color: p.accent }}>96% accuracy</strong> on the best of the three datasets, beating vanilla JAYA by a few points and matching the best published results we could find at the time. On the other two it was within a point of vanilla — the wins were dataset-dependent, which is a way of saying <em>your mileage may vary</em>.</p>

      <p>What didn't make the poster, but should have: the fitness-function change cut subset sizes by roughly half on every dataset, with no measurable accuracy loss. So even on the runs where JAYA-XM "tied" vanilla on accuracy, it was using fewer features to get there. For a downstream user — someone trying to build a wet-lab assay around the selected markers — that's the win that actually matters.</p>

      <p>We presented the work as a poster at the Indian Conference on Bioinformatics in October 2022, at VFSTR.<span className="sidenote-number" style={{ color: p.accent }}>4</span> The conversation around the poster mostly happened at the elbow — bioinformaticians asking what dataset, statisticians asking what's the variance over repeats, one optimization person quietly noting that we'd just rebuilt a 1990s memetic algorithm from a 2016 starting point. He was right. He also said it didn't matter. He was right about that too.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>4.</strong> Vignan's Foundation for Science, Technology and Research, Andhra Pradesh. The conference room had stunning posters, weak coffee, and a conversation density I haven't matched at any London meetup since.
        </span>
      </p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§04</span>
        <span>Where it earned its keep</span>
      </h2>

      <p>Three modifications, three different reasons they helped — and only the third was the one I expected.</p>

      <p><strong>Crossover</strong> let candidates swap whole columns of the feature mask, which on protein data effectively means "trade your guesses about whole functional regions of the molecule." When two candidates had each found a different useful chunk, crossover combined them; when both were on weak ground, it produced a weaker child and elitism quietly killed it. Useful. Not transformative.</p>

      <p><strong>Mutation</strong> at <span className="mono">p_m = 0.05</span> was barely visible most of the time, then crucial in the last 20% of generations when the population was cosying up to a local optimum. Without it, vanilla JAYA-with-crossover plateaued early and stopped improving. With it, you got another two or three accuracy points after the curve had visibly flattened.</p>

      <p><strong>The fitness penalty</strong> on subset size did the most work, and we almost left it out. The first version of JAYA-XM I implemented inherited vanilla's accuracy-only fitness; the subsets it selected were huge — averaging 40-something features on the apolipoprotein task — and barely better than smaller selections. Adding the size penalty pulled the average subset to 18 features without changing the accuracy. That's the kind of result you'd accept from a much fancier method.</p>

      <p>The lesson, if there is one: when a "parameter-free" algorithm doesn't quite fit your problem, the temptation is to add the fancy operators back — crossover, mutation, all the genetic-algorithm furniture. But the highest-leverage knob is usually the objective itself. Re-asking what you're actually optimising for tends to outperform re-engineering how.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§05</span>
        <span>What 96% means</span>
      </h2>

      <p>Three years on, I think the lesson isn't really about JAYA. It's about "parameter-free" as a claim. A parameter-free algorithm makes a strong design choice — to not expose certain knobs to the user — and that choice is itself a parameter, just one you can't tune. When the choice is right, the simplicity is a gift. When it's wrong, you spend time grafting the missing knobs back on, and the elegance was always borrowed.</p>

      <PullQuote color={p.accent}>The honest version is to say what your algorithm is committed to, and what it leaves open.</PullQuote>

      <p>JAYA is committed to a population, a best-and-worst signal, and a uniform sampling distribution. It leaves open everything else. We added back crossover and mutation because the problem we were solving has structure — features correlate, subsets matter — that a pure best/worst signal can't see.</p>

      <p>The repo is still up, lightly dusted, at <a href="https://github.com/shubhangithub/inbix22" target="_blank" rel="noreferrer" className="link-underline" style={{ color: p.accent }}>github.com/shubhangithub/inbix22</a>.</p>

      <p style={{ marginTop: "2.4rem", color: p.muted, fontStyle: "italic", paddingTop: "1.4rem", borderTop: `1px solid ${p.line}` }}>— written between two stops at the British Library, on a Wednesday.</p>
    </>
  );
}

function BiomarkersEssay({ palette: p }) {
  return (
    <>
      <p className="drop-cap" style={{ fontSize: "1.18rem", lineHeight: 1.72, margin: "0 0 1.2rem" }}>
        The slide came up at week six.<span className="sidenote-number" style={{ color: p.accent }}>1</span> A scatter plot of single cells from a tumour sample, axes labelled CD4 and CD8 — two well-known T-cell markers — and a clean four-quadrant story. The clinician giving the talk circled the upper-right corner with a laser pointer and called those cells "double-positive," like that settled the matter. It did not.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>1.</strong> MFoCS thesis, Oxford · Lady Margaret Hall, 2024 — "Analysing and Advancing Automated Immune Biomarker Detection." Flow cytometry data on tumour-associated immune populations.
        </span>
      </p>

      <p>My thesis took that scatter plot seriously and asked a more boring question: <em>where exactly do you put the threshold?</em> Move the CD4 cutoff from 4.39 to 4.50 and the "double-positive" population shrinks by a fifth. Move it the other way and you import a slice of background noise. The biology is the same. The category is not.</p>

      <PullQuote color={p.accent}>The biology is the same. The category is not.</PullQuote>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§01</span>
        <span>Six markers, one panel</span>
      </h2>

      <p>The dataset was a flow cytometry panel of six markers — CD4, CD8, FoxP3, CTLA4, PD1, Ki67 — measured on tumour-infiltrating lymphocytes across a small cohort of patient samples.<span className="sidenote-number" style={{ color: p.accent }}>2</span> Each cell is a 6-vector. Each sample is roughly 20,000 cells. Each clinician wants a clean answer about which subpopulations are present and at what proportion.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>2.</strong> CD4/CD8 split helper vs cytotoxic T cells. FoxP3 marks regulatory T cells. CTLA4 and PD1 are exhaustion markers. Ki67 is proliferation. Each tells a different fragment of a story about how the immune system is engaging the tumour.
        </span>
      </p>

      <Figure caption="Cells in CD4 × CD8 space. The dashed lines are the clinical thresholds (4.39, 5.65). Slide them and the four populations resize." palette={p}>
        <BiomarkerScatter palette={p} />
      </Figure>

      <p>The clinical workflow is to drop a threshold per marker — chosen by eye on log-transformed intensity histograms — and read off the proportions in each gate. It works. It also throws away most of the geometry. A cell sitting just inside the CD4+ gate and a cell sitting deep inside it count the same. Nuance lives below the resolution of a bin.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§02</span>
        <span>Three clusterings, one consensus</span>
      </h2>

      <p>The cleaner question is unsupervised: <em>given the cells in 6-D marker space, what populations actually exist?</em> The answer depends on the clustering algorithm, and that's the problem. Birch is fast and tends to split. Agglomerative respects local density. Spectral catches non-convex shapes. Run them on the same cells and you get three different stories.</p>

      <p>So I ran all three, then took a consensus.<span className="sidenote-number" style={{ color: p.accent }}>3</span> A cell's cluster identity is the majority vote across the three methods, and the confidence is the agreement fraction. Cells where all three methods agree are robust. Cells where two-of-three agree are interesting boundary cases. Cells where each method picks a different label are background — or a real subpopulation that nobody's named yet.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>3.</strong> Consensus clustering as proposed by Monti et al. (2003). The trick isn't picking the "right" algorithm — it's getting an honest measure of how stable a partition is across reasonable algorithmic choices.
        </span>
      </p>

      <Figure caption="Three clustering methods on the same 8×8 patch, then a majority-vote consensus. Opacity in the rightmost panel encodes agreement strength." palette={p}>
        <ConsensusGrid palette={p} />
      </Figure>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§03</span>
        <span>What CTLA4 told us</span>
      </h2>

      <p>The most useful single number from the project: a binary classifier for CTLA4-high cells, trained on the other five markers, hit an F1 of 0.70 at threshold tuning.<span className="sidenote-number" style={{ color: p.accent }}>4</span> Translation: from the easier-to-measure surface markers, you can recover most of an exhaustion signal that's normally read off a separate stain. That's not a discovery, but it's a small dent in the cost of running the panel.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>4.</strong> 5-fold cross-validation; gradient-boosted trees; class-balanced. F1 of 0.70 isn't clinical-grade, but for a six-marker panel on a small cohort it suggests the joint signal is real.
        </span>
      </p>

      <p>The bigger lesson — and the one I think generalises — is that thresholds in biology are decisions, not measurements. A scatter plot with a gate drawn on it looks like data. It is, partly. But the gate is a choice: someone, somewhere, decided that 4.39 was the boundary between negative and positive. That choice is rarely re-examined. Re-examining it was most of the thesis.</p>

      <PullQuote color={p.accent}>Thresholds in biology are decisions, not measurements.</PullQuote>

      <p>The full thesis ("Analysing and Advancing Automated Immune Biomarker Detection") sits in the Oxford repository. The code lives at <a href="https://github.com/shubhangithub" target="_blank" rel="noreferrer" className="link-underline" style={{ color: p.accent }}>github.com/shubhangithub</a>, in the <span className="mono">biomarker-discovery</span> repo (private — message me).</p>

      <p style={{ marginTop: "2.4rem", color: p.muted, fontStyle: "italic", paddingTop: "1.4rem", borderTop: `1px solid ${p.line}` }}>— written from the King's Cross flat, the day before viva.</p>
    </>
  );
}

function SixEnginesEssay({ palette: p }) {
  return (
    <>
      <p className="drop-cap" style={{ fontSize: "1.18rem", lineHeight: 1.72, margin: "0 0 1.2rem" }}>
        I am, mortifyingly, the kind of Taylor Swift listener who has opinions about which 2019 demos should have stayed unreleased.<span className="sidenote-number" style={{ color: p.accent }}>1</span> So when I built a recommender for her catalogue I was the worst possible audience: any model that surfaced something obvious would feel patronising, and any model that surfaced something stupid would feel personal.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>1.</strong> The original Lover demos. Don't @ me.
        </span>
      </p>

      <p>The constraint, then, was: build something whose <em>recommendations themselves</em> would be the test. If I rolled it out to friends and they said "yeah, that one too," good. If they said "why this," bad. The architecture had to earn that, not the other way around.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§01</span>
        <span>Six engines, one query</span>
      </h2>

      <p>I ended up with six recommendation models, each looking at a different facet of a song. Five base engines plus an ensemble that learned how to weight them.</p>

      <ol style={{ margin: "1.2rem 0", paddingLeft: "1.4rem", lineHeight: 1.7 }}>
        <li><strong>Lyrics-Transformer.</strong> A small fine-tuned transformer over Genius-scraped lyrics. Cosine similarity in CLS-token space.</li>
        <li><strong>Audio VAE.</strong> A variational autoencoder over Spotify audio features, compressed to a 16-dimensional latent.<span className="sidenote-number" style={{ color: p.accent }}>2</span> Distance in latent space picks up sonic neighbours.</li>
        <li><strong>Graph node2vec.</strong> Build a song-co-listen graph, run node2vec for 64-D embeddings, retrieve nearest neighbours.</li>
        <li><strong>Neural Collab Filtering.</strong> Classic two-tower model on user-song interactions.</li>
        <li><strong>Contrastive SSL.</strong> Self-supervised pretext: same song, two augmentations of its audio, pull together; different songs, push apart.</li>
        <li><strong>Ensemble.</strong> Weighted blend of the five, with a consensus boost for songs surfaced by ≥2 engines.</li>
      </ol>

      <p style={{ fontSize: "0.85rem", color: p.muted, marginTop: "-0.5rem", lineHeight: 1.55 }}>
        <strong style={{ color: p.accent }}>2.</strong> The compression ratio matters: 384 raw audio descriptors → 16 latent dims. Anything that survives that bottleneck is doing real work.
      </p>

      <Figure caption="A query song q routes to six engines; each surfaces ~3 candidates. Songs touched by multiple engines (filled) get a consensus boost in the final ranking." palette={p}>
        <RecEngineSwarm palette={p} />
      </Figure>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§02</span>
        <span>The dataset that made it tractable</span>
      </h2>

      <p>801 songs total: 341 from Taylor's discography (all eras, including Vault tracks), 460 from a hand-curated cross-artist set chosen to neighbour her in lyrical or sonic space.<span className="sidenote-number" style={{ color: p.accent }}>3</span> The cross-artist songs are what make the recommender useful — without them every output would be intra-catalogue, which is the same as suggesting an album shuffle.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>3.</strong> Phoebe Bridgers, boygenius, Lorde, Aimee Mann, Joni Mitchell, Carole King for the lyrical neighbourhood. Jack Antonoff and Aaron Dessner productions for the sonic neighbourhood.
        </span>
      </p>

      <p>The original was an R/Shiny app I'd written in 2023 — pretty, slow, single-user. The 2025 rebuild is a TypeScript + Next.js + Python-API stack that loads in under a second and serves real recommendations in ~150ms.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§02b</span>
        <span>Why the ensemble works</span>
      </h2>

      <p>Each engine has a failure mode that the others compensate for. Lyrics-only will surface "songs that mention rain" when you wanted "songs that <em>feel like</em> rain." Audio-only will surface acoustic ballads when you wanted lyrical heartbreak. Collaborative filtering will surface whatever's popular this week. The ensemble is less a fusion of strengths than an averaging-out of weaknesses.</p>

      <Figure caption="Final score is a fixed-weight blend with a small consensus boost for cross-engine agreement. The weights are tuned by leave-one-out on a small held-out playlist." palette={p}>
        <EnsembleConsensus palette={p} />
      </Figure>

      <PullQuote color={p.accent}>The ensemble is less a fusion of strengths than an averaging-out of weaknesses.</PullQuote>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§03</span>
        <span>What the demo actually feels like</span>
      </h2>

      <p>Type a song. Six engines return their picks in parallel. The UI shows you the ensemble's top 10, but lets you toggle "show me what each engine thought" so you can see the disagreements. The disagreements are usually the interesting part: the lyrics-transformer wants you to listen to <em>The Manuscript</em>; the audio VAE thinks you'd rather have <em>You're On Your Own, Kid</em>; the graph engine sends you to a Phoebe Bridgers deep cut. They're all defensible, in their own register.</p>

      <p>The site is at <a href="https://shubz-taylor-rec-engine.vercel.app" target="_blank" rel="noreferrer" className="link-underline" style={{ color: p.accent }}>shubz-taylor-rec-engine.vercel.app</a>. Bring your own opinions about the Lover demos.</p>

      <p style={{ marginTop: "2.4rem", color: p.muted, fontStyle: "italic", paddingTop: "1.4rem", borderTop: `1px solid ${p.line}` }}>— written on the train back from a Tortoise live show.</p>
    </>
  );
}

function FashionEssay({ palette: p }) {
  return (
    <>
      <p className="drop-cap" style={{ fontSize: "1.18rem", lineHeight: 1.72, margin: "0 0 1.2rem" }}>
        Fashion forecasting is what you call it when you're respectable.<span className="sidenote-number" style={{ color: p.accent }}>1</span> What it actually is, most weeks, is a few people in a Slack channel arguing about whether scarves-as-tops survives the autumn. The instinct is real. The methodology is improvised. We thought a prediction market sitting on top of a few timeseries models might make the instinct legible — to the people having it, and to the buyers who have to act on it.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>1.</strong> "Trend" sits oddly in this sentence. The industry word; carrying both "what's in" and "what's measurable." A market should be able to handle both.
        </span>
      </p>

      <p>The thing we're building is a markets-style platform for fashion micro-trends: scoot scarves, cherry-red bags, "tomato-girl summer," whatever has half-named itself in the last fortnight. Traders take positions on whether the trend continues. Prices reveal a soft consensus in advance of the resale data catching up. That's the bet.</p>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§01</span>
        <span>Five signals, one composite</span>
      </h2>

      <p>The forecasting half of the platform reads from five sources and merges them into a single trend index per item:</p>

      <ol style={{ margin: "1.2rem 0", paddingLeft: "1.4rem", lineHeight: 1.7 }}>
        <li>Instagram saves and tagged-post velocity.</li>
        <li>TikTok mentions and sound-overlay use.</li>
        <li>Resale-platform velocity (Depop, Vestiaire, Vinted).</li>
        <li>Search trend volume.</li>
        <li>Editorial buzz — manually scored from a small set of trade publications.</li>
      </ol>

      <p>None of these is reliable on its own. Instagram saves spike on a single influencer post; TikTok mentions over-index on Gen Z; resale velocity lags by ~3 weeks; search trends are noisy at the long tail; editorial buzz is biased. <em>Together</em>, in a Holt-Winters-style level + trend decomposition, they're tolerable.<span className="sidenote-number" style={{ color: p.accent }}>2</span>
        <span className="sidenote">
          <strong style={{ color: p.accent }}>2.</strong> Holt-Winters because we want a baseline level and a velocity term, but we don't (yet) have enough signal to model annual seasonality cleanly. When we do, we'll graduate to STL or Prophet.
        </span>
      </p>

      <Figure caption="Five source signals merge into a composite, then a 30-day forecast extends past 'now'. Each lane is independently noisy; the composite smooths out single-source spikes." palette={p}>
        <TrendSignalFlow palette={p} />
      </Figure>

      <PullQuote color={p.accent}>None of these is reliable on its own. Together, they're tolerable.</PullQuote>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§02</span>
        <span>Why a market sits on top</span>
      </h2>

      <p>A forecast is a number. A market is a number with skin in the game. The forecasting models give us a baseline; the market lets traders disagree, and price-in things the model can't see — a designer cameo at fashion week, a celebrity dating rumour, a TikTok creator pivoting genre.</p>

      <p>The market mechanism is LMSR — Hanson's logarithmic market scoring rule.<span className="sidenote-number" style={{ color: p.accent }}>3</span> The advantage over a CLOB (continuous limit order book) is that LMSR provides automatic liquidity even when the market is thin, which it always is at launch. The disadvantage is that the price function is exponential in net shares, so you have to think carefully about the liquidity parameter <span className="mono">b</span>.
        <span className="sidenote">
          <strong style={{ color: p.accent }}>3.</strong> Hanson, R. (2003). "Combinatorial Information Market Design." A market maker that quotes prices via a cost function C(q) = b · log(Σ exp(q_i / b)). Automatic liquidity, bounded loss, well-calibrated to subjective probabilities.
        </span>
      </p>

      <Figure caption="Price for a YES share rises as net YES position grows. Steeper around p = 0.5, asymptotic at the bounds. b controls how much the price moves per unit volume." palette={p}>
        <LMSRPriceCurve palette={p} />
      </Figure>

      <h2 className="display" style={{ fontSize: "1.9rem", fontWeight: 400, marginTop: "3rem", marginBottom: "1rem", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span className="mono" style={{ fontSize: 12, color: p.muted, letterSpacing: "0.1em" }}>§03</span>
        <span>What we're optimising for</span>
      </h2>

      <p>Calibration, mostly. A trend platform that says "this will be big" 100 times wants the things it predicted to actually be big roughly 70 times when its prices say 0.7, 30 times when its prices say 0.3. That's the only honest measure. Everything else — engagement, traders-on-platform, "feels right" — is downstream.</p>

      <p>The team is small. The data is sparse. The fashion calendar is unforgiving. But there's something genuinely interesting about the corner of the world where statistical timeseries models meet a community that has always priced things in private — at fashion-week dinners, in trade-publication editorial meetings, on group chats. We're trying to make that pricing public, and quantitative, without ruining what makes it work.</p>

      <PullQuote color={p.accent}>Calibration, mostly.</PullQuote>

      <p>If you're an early-stage trader, designer, or buyer who wants to look at the alpha, write to me at <a href="mailto:shubhangis@duck.com" className="link-underline" style={{ color: p.accent }}>shubhangis@duck.com</a>.</p>

      <p style={{ marginTop: "2.4rem", color: p.muted, fontStyle: "italic", paddingTop: "1.4rem", borderTop: `1px solid ${p.line}` }}>— written between meetings, on a stolen Friday afternoon.</p>
    </>
  );
}

Object.assign(window, { WritingIndexV4, ArticleV4, WorkV4, NowV4, ContactV4, PreciseTopBar, PreciseNav, IndexRail, PreciseFooter });


/* ===== components/app.jsx ===== */
/* global React, ReactDOM, CustomCursor, HomeV1, HomeV2, HomeV3, HomeV4, WritingIndex, Article, WritingIndexV4, ArticleV4, WorkV4, NowV4, ContactV4, PALETTE_V1, PALETTE_V2, PALETTE_V3, PALETTE_V4 */

// useState, useEffect are in scope from motif.jsx

function App() {
  const [route, setRoute] = useState({ page: "home", slug: null });
  const [cursorColor, setCursorColor] = useState(PALETTE_V4.accent);

  function navigate(page, slug = null) {
    if (document.startViewTransition) {
      document.startViewTransition(() => setRoute({ page, slug }));
    } else {
      setRoute({ page, slug });
    }
    setTimeout(() => window.scrollTo({ top: 0, behavior: "instant" }), 10);
  }

  const p = PALETTE_V4;
  const sharedProps = { palette: p, onNavigate: navigate, setCursorColor };

  let page;
  if (route.page === "writing") page = <WritingIndexV4 {...sharedProps} />;
  else if (route.page === "essay") page = <ArticleV4 slug={route.slug || "jaya"} {...sharedProps} />;
  else if (route.page === "work") page = <WorkV4 {...sharedProps} />;
  else if (route.page === "now") page = <NowV4 {...sharedProps} />;
  else if (route.page === "contact") page = <ContactV4 {...sharedProps} />;
  else page = <HomeV4 onNavigate={navigate} setCursorColor={setCursorColor} />;

  return (
    <>
      <a href="#main" className="skip-link">Skip to content</a>
      <CustomCursor color={cursorColor} />
      {page}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);


</script>
